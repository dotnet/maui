# Runs the evaluate-pr-tests skill via Copilot CLI on PRs that add or modify tests.
#
# Security model (modeled after dotnet/skills evaluation.yml):
#   - COPILOT_GITHUB_TOKEN: fine-grained PAT with "Copilot Requests" permission only
#   - MAUI_BOT_TOKEN: PAT from MauiBot account for posting PR comments (falls back to github.token)
#   - github.token: used for reactions and commit statuses (built-in, no PAT)
#   - Fork PRs: require "/evaluate-tests" comment from user with write+ permission
#   - File access: restricted to $GITHUB_WORKSPACE via --add-dir
#   - Tool access: only bash, view, grep, glob, edit allowed (no git push, no network)
#   - Workflow YAML: always from base branch (issue_comment trigger enforces this)
#   - Pinned action SHAs: prevent supply-chain attacks
#   - persist-credentials: false on all checkouts

name: Evaluate PR Tests

on:
  # Same-repo PRs: automatic trigger on test file changes
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/Controls/tests/**'
      - 'src/Core/tests/**'
      - 'src/Essentials/test/**'
      # Self-trigger: allows testing the workflow from its own PR
      - '.github/workflows/copilot-evaluate-tests.yml'
      - '.github/scripts/Post-CopilotComment.ps1'

  # Fork PRs: manual trigger via "/evaluate-tests" comment from maintainer
  issue_comment:
    types: [created]

  # Manual trigger for any PR
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to evaluate'
        required: true
        type: number

  # Allow overriding the target PR on pull_request triggers (for testing)
  # When the workflow self-triggers, it evaluates itself by default.
  # Set target_pr via the API to evaluate a different PR from this branch.
  # Example: gh api repos/dotnet/maui/actions/workflows/copilot-evaluate-tests.yml/dispatches \
  #   -f ref=feature/copilot-evaluate-tests-workflow -f inputs[pr_number]=30450

concurrency:
  group: evaluate-tests-${{ github.event.pull_request.number || github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

# Workflow-level permissions kept minimal; jobs declare their own.
permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # Gate: Validate trigger and determine PR context
  # ============================================================
  # Skip early for issue_comment events that aren't /evaluate-tests on a PR.
  # This check is at the YAML level (GitHub expression engine, not shell) so
  # the comment body is never passed to any run: block — eliminating injection risk.
  gate:
    name: Validate trigger
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/evaluate-tests'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.context.outputs.pr_number }}
      head_sha: ${{ steps.context.outputs.head_sha }}
      should_run: ${{ steps.context.outputs.should_run }}
    steps:
      - name: Check commenter permissions (issue_comment only)
        if: github.event_name == 'issue_comment'
        id: perms
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${COMMENT_USER}/permission" --jq '.permission' 2>/dev/null || echo "none")
          echo "Commenter ${COMMENT_USER} has permission: ${PERMISSION}"
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" && "$PERMISSION" != "maintain" ]]; then
            echo "::error::User ${COMMENT_USER} does not have write access (has: ${PERMISSION})"
            exit 1
          fi

      - name: Add eyes reaction (issue_comment only)
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -X POST -f content='eyes' || true

      - name: Resolve PR context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          PR_NUMBER_FROM_PR: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$PR_HEAD_REPO" != "$PR_BASE_REPO" ]]; then
              echo "Fork PR detected — skipping (use /evaluate-tests comment)"
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "pr_number=${PR_NUMBER_FROM_PR}" >> $GITHUB_OUTPUT
            echo "head_sha=${PR_HEAD_SHA}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT

          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            HEAD_SHA=$(gh api "repos/${REPO}/pulls/${ISSUE_NUMBER}" --jq '.head.sha')
            echo "pr_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
            echo "head_sha=${HEAD_SHA}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT

          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            HEAD_SHA=$(gh api "repos/${REPO}/pulls/${DISPATCH_PR_NUMBER}" --jq '.head.sha')
            echo "pr_number=${DISPATCH_PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "head_sha=${HEAD_SHA}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout PR code (for static analysis)
        if: steps.context.outputs.should_run == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.context.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false
          path: pr-code

      - name: Pre-fetch PR context for Copilot CLI
        if: steps.context.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          mkdir -p /tmp/pr-context

          # PR metadata (title, description, labels, base branch)
          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json title,body,labels,baseRefName,headRefName,files,additions,deletions \
            > /tmp/pr-context/pr-metadata.json

          # PR diff (the actual code changes)
          gh pr diff "$PR_NUMBER" --repo "$REPO" \
            > /tmp/pr-context/pr-diff.patch

          # PR file list with status
          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json files --jq '.files[] | "\(.path)\t\(.additions)+\t\(.deletions)-"' \
            > /tmp/pr-context/pr-files.txt

          echo "PR context fetched:"
          echo "  Diff size: $(wc -c < /tmp/pr-context/pr-diff.patch) bytes"
          echo "  Files changed: $(wc -l < /tmp/pr-context/pr-files.txt)"

      - name: Run Gather-TestContext.ps1 (static analysis)
        if: steps.context.outputs.should_run == 'true'
        env:
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        working-directory: pr-code
        run: |
          # Determine base branch from PR metadata
          BASE_BRANCH=$(jq -r '.baseRefName' /tmp/pr-context/pr-metadata.json)
          echo "Running Gather-TestContext.ps1 against base: origin/${BASE_BRANCH}"

          # The script writes to CustomAgentLogsTmp/TestEvaluation/context.md
          pwsh .github/skills/evaluate-pr-tests/scripts/Gather-TestContext.ps1 \
            -BaseBranch "origin/${BASE_BRANCH}" 2>&1 || true

          # Copy output to pr-context artifact (if generated)
          if [[ -f "CustomAgentLogsTmp/TestEvaluation/context.md" ]]; then
            cp CustomAgentLogsTmp/TestEvaluation/context.md /tmp/pr-context/test-context.md
            echo "✅ Test context report generated ($(wc -l < /tmp/pr-context/test-context.md) lines)"
          else
            echo "⚠️ Gather-TestContext.ps1 did not produce output"
            echo "# Test Context Report\n\nScript did not produce output. Manual analysis required." \
              > /tmp/pr-context/test-context.md
          fi

      - name: Upload PR context
        if: steps.context.outputs.should_run == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-context
          path: /tmp/pr-context/
          retention-days: 1

  # ============================================================
  # Evaluate: Run Copilot CLI with evaluate-pr-tests skill
  # ============================================================
  evaluate:
    name: Evaluate tests
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout workflow branch (has skills + scripts)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download PR context from gate job
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pr-context
          path: /tmp/pr-context/

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@latest

      - name: Check for Copilot token
        id: token-check
        env:
          HAS_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN != '' }}
        run: |
          if [[ "$HAS_TOKEN" != "true" ]]; then
            echo "::warning::COPILOT_GITHUB_TOKEN secret is not configured. Skipping evaluation."
            echo "has_token=false" >> $GITHUB_OUTPUT
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Run evaluate-pr-tests skill
        if: steps.token-check.outputs.has_token == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.gate.outputs.pr_number }}
        run: |
          # Build the prompt — point CLI at pre-fetched PR context + pre-generated analysis
          PROMPT="Evaluate the tests added in PR #${PR_NUMBER}. \
          All context has been pre-fetched for you — do NOT try to run scripts or gh commands. \
          Read these files in order: \
          1. /tmp/pr-context/test-context.md — automated test analysis report (conventions, anti-patterns, file categorization) \
          2. /tmp/pr-context/pr-metadata.json — PR title, description, labels, base branch \
          3. /tmp/pr-context/pr-diff.patch — the actual code changes \
          4. /tmp/pr-context/pr-files.txt — changed file list \
          Then use the evaluate-pr-tests skill instructions to produce a structured 9-criteria report. \
          Do NOT attempt to run Gather-TestContext.ps1 — its output is already in test-context.md."

          # Run Copilot CLI in non-interactive mode with sandboxed permissions
          copilot \
            -p "$PROMPT" \
            --model claude-sonnet-4 \
            --silent \
            --allow-tool bash \
            --allow-tool view \
            --allow-tool grep \
            --allow-tool glob \
            --allow-tool lsp \
            --add-dir "$GITHUB_WORKSPACE" \
            --add-dir "/tmp/pr-context" \
            --output-format text \
            2>/dev/null | tee /tmp/copilot-output.txt

          # Ensure we got output
          if [[ ! -s /tmp/copilot-output.txt ]]; then
            echo "⚠️ Copilot CLI produced no output" > /tmp/copilot-output.txt
          fi

      - name: Write token-missing notice
        if: steps.token-check.outputs.has_token == 'false'
        run: |
          echo "⚠️ **COPILOT_GITHUB_TOKEN** secret is not configured." > /tmp/copilot-output.txt
          echo "" >> /tmp/copilot-output.txt
          echo "The evaluate-pr-tests workflow requires a fine-grained PAT with **Copilot Requests** permission." >> /tmp/copilot-output.txt
          echo "Add it as a repository secret named \`COPILOT_GITHUB_TOKEN\` to enable this workflow." >> /tmp/copilot-output.txt

      - name: Upload evaluation output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evaluate-tests-output
          path: |
            /tmp/copilot-output.txt
            CustomAgentLogsTmp/TestEvaluation/
          retention-days: 14

  # ============================================================
  # Comment: Post results on the PR
  # ============================================================
  comment:
    name: Post results
    needs: [gate, evaluate]
    if: always() && needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout base branch (for comment script)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: .github/scripts

      - name: Download evaluation output
        if: needs.evaluate.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: evaluate-tests-output
          path: /tmp/evaluation/
        continue-on-error: true

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.MAUI_BOT_TOKEN || github.token }}
          PR_NUMBER: ${{ needs.gate.outputs.pr_number }}
          EVALUATE_RESULT: ${{ needs.evaluate.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: pwsh
        run: |
          .github/scripts/Post-CopilotComment.ps1 `
            -PrNumber $env:PR_NUMBER `
            -EvaluateResult $env:EVALUATE_RESULT `
            -OutputFile "/tmp/evaluation/tmp/copilot-output.txt" `
            -RunUrl $env:RUN_URL

      - name: Remove eyes reaction (issue_comment trigger)
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          REACTION_ID=$(gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            --jq '.[] | select(.content == "eyes" and .user.login == "github-actions[bot]") | .id' | head -1 || echo "")
          if [[ -n "$REACTION_ID" && "$REACTION_ID" != "null" ]]; then
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions/${REACTION_ID}" \
              -X DELETE || true
          fi
