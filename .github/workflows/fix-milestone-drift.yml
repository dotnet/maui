name: Fix Milestone Drift

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Single PR number to check/fix (leave empty for tag-based mode)'
        required: false
        type: string
      tag:
        description: 'Release tag to analyze (e.g., "10.0.50"). Auto-detected for single PR.'
        required: false
        type: string
      apply:
        description: 'Apply milestone changes (default: dry-run only)'
        required: false
        type: boolean
        default: false
      create_issue:
        description: 'Create a GitHub issue with the drift report'
        required: false
        type: boolean
        default: true

permissions:
  issues: write
  pull-requests: read

jobs:
  fix-milestones:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run milestone drift check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=()

          if [ -n "${{ inputs.pr_number }}" ]; then
            ARGS+=('-PrNumber' '${{ inputs.pr_number }}')
          fi

          if [ -n "${{ inputs.tag }}" ]; then
            ARGS+=('-Tag' '${{ inputs.tag }}')
          fi

          if [ "${{ inputs.apply }}" = "true" ]; then
            ARGS+=('-Apply')
          fi

          if [ "${{ inputs.create_issue }}" = "true" ]; then
            ARGS+=('-CreateIssue')
          fi

          ARGS+=('-RepoPath' '.' '-Verbose')

          printf 'Running: pwsh -File .github/scripts/Fix-MilestoneDrift.ps1'
          printf ' %q' "${ARGS[@]}"
          echo
          pwsh -File .github/scripts/Fix-MilestoneDrift.ps1 "${ARGS[@]}"
