name: Set Milestone on PR Merge

on:
  pull_request_target:
    types: [closed]
    branches: [main, net*.0, inflight/*, release/*]

permissions:
  issues: write
  pull-requests: read

jobs:
  set-milestone:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set milestone from Versions.props
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pwsh -File .github/scripts/Fix-MilestoneDrift.ps1 \
            -PrNumber '${{ github.event.pull_request.number }}' \
            -RepoPath . \
            -Apply \
            -Verbose
