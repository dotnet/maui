name: PR Review Queue

on:
  schedule:
    - cron: "0 8 * * 1-5"  # Weekdays at 8:00 UTC
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '.github/workflows/pr-review-queue.yml'
      - '.github/skills/find-reviewable-pr/**'
      - '.github/scripts/Query-AutoRerunCandidates.ps1'
      - '.github/scripts/Resolve-RerunEligibility.ps1'
      - '.github/scripts/shared/Update-AgentLabels.ps1'

permissions:
  contents: read

concurrency:
  group: pr-review-queue-${{ github.event_name }}-${{ github.event.pull_request.number || 'scheduled' }}
  cancel-in-progress: true

jobs:
  generate-report:
    runs-on: ubuntu-latest
    # Guard: only run in dotnet/maui — prevents the scheduled run from firing
    # in forks and pinging fork owners with duplicate queue issues.
    if: github.repository_owner == 'dotnet' && github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: read
      repository-projects: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate PR review queue
        id: generate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pwsh .github/skills/find-reviewable-pr/scripts/query-reviewable-prs.ps1 \
            -Category all \
            -OutputFormat markdown \
            > pr-review-queue-raw.md 2>pr-query-errors.txt
          rc=$?
          set -e

          if [ $rc -ne 0 ]; then
            echo "::error::Query script failed"
            cat pr-query-errors.txt
            exit 1
          fi

          # Strip Write-Host progress lines — keep only markdown
          sed -n '/^<!-- PR_REVIEW_QUEUE_BEGIN -->/,$p' pr-review-queue-raw.md > pr-review-queue-body.md

          if [ ! -s pr-review-queue-body.md ]; then
            echo "::error::Query produced empty output"
            cat pr-query-errors.txt
            exit 1
          fi

          echo "Generated report:"
          head -20 pr-review-queue-body.md

      - name: Close previous queue issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list \
            --repo ${{ github.repository }} \
            --search '"[PR Review Queue]" in:title' \
            --state open \
            --json number \
            --jq '.[].number' | \
          xargs -I{} gh issue close {} --repo ${{ github.repository }} --reason "not planned" 2>/dev/null || true

      - name: Create queue issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "[PR Review Queue] $(date -u '+%Y-%m-%d')" \
            --body-file pr-review-queue-body.md \
            --label "report" \
            --label "s/triaged"

      # Autonomously apply s/agent-ready-for-rerun to PRs with genuinely new
      # PR-author activity since their last AI review — the same deterministic
      # signal as a maintainer's `/review rerun`. The hourly rerun-review-scanner
      # then picks these up and re-reviews them. Failures here are surfaced as a
      # warning and never block the queue issue that was already created above.
      - name: Auto-label rerun-ready PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set +e
          pwsh .github/scripts/Query-AutoRerunCandidates.ps1 \
            -Owner "$REPO_OWNER" \
            -Repo "$REPO_NAME" \
            -OutputPath auto-rerun-decisions.json
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "::warning::Auto-rerun labeling step failed (rc=$rc); the queue issue was still created."
          fi

  # Dry-run on PRs: validate the script works without creating issues
  validate:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'dotnet' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR review queue script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pwsh .github/skills/find-reviewable-pr/scripts/query-reviewable-prs.ps1 \
            -Category all \
            -OutputFormat markdown \
            > pr-review-queue-raw.md 2>pr-query-errors.txt
          rc=$?
          set -e

          if [ $rc -ne 0 ]; then
            echo "::error::Query script failed"
            cat pr-query-errors.txt
            exit 1
          fi

          sed -n '/^<!-- PR_REVIEW_QUEUE_BEGIN -->/,$p' pr-review-queue-raw.md > pr-review-queue-body.md

          if [ ! -s pr-review-queue-body.md ]; then
            echo "::error::Query produced empty output"
            cat pr-query-errors.txt
            exit 1
          fi

          echo "✅ Validation passed — report preview:"
          cat pr-review-queue-body.md

      - name: Validate auto-rerun labeler (dry-run)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set +e
          pwsh .github/scripts/Query-AutoRerunCandidates.ps1 \
            -Owner "$REPO_OWNER" \
            -Repo "$REPO_NAME" \
            -DryRun \
            -OutputPath auto-rerun-decisions.json
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "::error::Auto-rerun labeler dry-run failed"
            exit 1
          fi
          echo "✅ Auto-rerun labeler dry-run passed:"
          cat auto-rerun-decisions.json
