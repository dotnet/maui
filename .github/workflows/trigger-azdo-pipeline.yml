# Trigger an Azure DevOps pipeline from GitHub Actions using OIDC (no PAT).
# See .github/docs/trigger-azdo-pipeline-setup.md for the one-time identity setup guide.

name: Trigger AzDO Pipeline

on:
  push:
    branches:
      - 'dev/jankrivanek/test-azdo-trigger'  # Temporary: auto-trigger for testing
    paths:
      - '.github/workflows/trigger-azdo-pipeline.yml'
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: 'AzDO pipeline definition ID'
        required: true
        default: '302'
      project:
        description: 'AzDO project name'
        required: true
        default: 'public'
      organization:
        description: 'AzDO organization name'
        required: true
        default: 'dnceng-public'

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Get OIDC Token
        id: oidc
        run: |
          echo "Requesting OIDC token from GitHub..."
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to get OIDC token"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "Got OIDC token (length: ${#OIDC_TOKEN})"
          echo "oidc_token=${OIDC_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Exchange for AzDO Token
        id: token
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.oidc_token }}
        run: |
          echo "Exchanging OIDC token for Azure AD token..."
          AZURE_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZDO_TRIGGER_TENANT_ID }}/oauth2/v2.0/token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.AZDO_TRIGGER_CLIENT_ID }}" \
            -d "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            -d "client_assertion=${OIDC_TOKEN}" \
            -d "scope=499b84ac-1321-427f-aa17-267ca6975798/.default")

          AZDO_TOKEN=$(echo "$AZURE_RESPONSE" | jq -r '.access_token')
          if [ -z "$AZDO_TOKEN" ] || [ "$AZDO_TOKEN" = "null" ]; then
            echo "::error::Failed to get Azure AD token"
            echo "$AZURE_RESPONSE" | jq 'del(.access_token)' 2>/dev/null || echo "$AZURE_RESPONSE"
            exit 1
          fi
          echo "::add-mask::${AZDO_TOKEN}"
          echo "Got AzDO bearer token"
          echo "azdo_token=${AZDO_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Trigger AzDO Pipeline
        env:
          AZDO_TOKEN: ${{ steps.token.outputs.azdo_token }}
          PIPELINE_ID: ${{ inputs.pipeline_id || '302' }}
          PROJECT: ${{ inputs.project || 'public' }}
          ORGANIZATION: ${{ inputs.organization || 'dnceng-public' }}
        run: |
          API_URL="https://dev.azure.com/${ORGANIZATION}/${PROJECT}/_apis/pipelines/${PIPELINE_ID}/runs?api-version=7.1"

          echo "Triggering pipeline ${PIPELINE_ID} in ${ORGANIZATION}/${PROJECT}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${API_URL}" \
            -H "Authorization: Bearer ${AZDO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}')

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          RESPONSE_BODY=$(echo "${RESPONSE}" | head -n -1)

          echo "HTTP Status: ${HTTP_CODE}"

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
            RUN_ID=$(echo "${RESPONSE_BODY}" | jq -r '.id')
            PIPELINE_NAME=$(echo "${RESPONSE_BODY}" | jq -r '.pipeline.name')
            echo "Pipeline '${PIPELINE_NAME}' triggered successfully!"
            echo "  Run ID: ${RUN_ID}"
            echo "  View:   https://dev.azure.com/${ORGANIZATION}/${PROJECT}/_build/results?buildId=${RUN_ID}"
          else
            echo "::error::Failed to trigger pipeline. HTTP ${HTTP_CODE}"
            echo "${RESPONSE_BODY}" | jq . 2>/dev/null || echo "${RESPONSE_BODY}"
            exit 1
          fi
