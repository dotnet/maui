      - >-
        area-infrastructure is preferred over area-tooling for agent-infra/skill changes
        (area-tooling is for the dev-build/MSBuild/workload surface that ships to users).
      - No platform/* label is applied.
    constraints: { max_duration: 5m, expect_skills: [agentic-labeler] }

  # ───────────────────────────────────────────────────────────────────────
  # 21 — Maps PR -> exact area-controls-map (not invented area-maps)  (source: PR #35476)
  # ───────────────────────────────────────────────────────────────────────
  - name: maps-exact-label-name
