      - No platform/* label is applied — the change is cross-platform source-gen code.
    constraints: { max_duration: 5m, expect_skills: [agentic-labeler] }

  # ───────────────────────────────────────────────────────────────────────
  # 18 — ISSUE: [dnceng-bot] codeflow -> area-infrastructure (NOT noop)  (source: issue #34197)
