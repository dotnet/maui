# eval.yaml v2 — code-review skill
# v1: 6 scenarios covering workflow mechanics, independence-first, negative triggers, anti-patterns
# v2: Added regression prevention scenarios from real regressed-in-10.0.60 issues
# v3: Round 2 — added positive assertions, narrowed false-positive guard, regression priority in SKILL.md
scenarios:
  - name: "Happy path - code review PR request"
    prompt: "code review PR #34024 in dotnet/maui"
    assertions:
      - type: "output_not_contains"
        value: "gh pr review --approve"
      - type: "output_not_contains"
        value: "gh pr review --request-changes"
      - type: "output_matches"
        pattern: "(LGTM|NEEDS_CHANGES|NEEDS_DISCUSSION)"
      - type: "output_contains"
        value: "review"
    rubric:
      - "The agent calls 'gh pr diff' BEFORE 'gh pr view', demonstrating independence-first methodology"
      - "The agent produces structured output with an independent assessment, findings, and a verdict"
      - "Findings are categorized by severity using ❌ / ⚠️ / 💡 markers"
      - "The agent never posts an approval or request-changes action via the GitHub API"
    timeout: 300

  - name: "Negative trigger - informational query about a PR"
    prompt: "What does PR #34727 change in dotnet/maui? Just give me a summary."
    expect_activation: false
    assertions:
      - type: "output_not_contains"
        value: "NEEDS_CHANGES"
      - type: "output_not_contains"
        value: "NEEDS_DISCUSSION"
      - type: "output_not_contains"
        value: "Devil's Advocate"
    rubric:
      - "The agent provides a plain summary without launching a structured multi-step review workflow"
      - "The agent does NOT load review-rules.md or walk through MAUI-specific review checklists"
    timeout: 120

  - name: "Independence-first - agent reads diff before description"
    prompt: "review code for PR #31202 in dotnet/maui"
    assertions:
      - type: "output_matches"
        pattern: "(LGTM|NEEDS_CHANGES|NEEDS_DISCUSSION)"
    rubric:
      - "The agent fetches the code diff BEFORE reading the PR description, forming an independent view"
      - "The agent's assessment contains its own description of the change, not a paraphrase of the PR body"
      - "The agent distinguishes between its independent view and the author's claims in a reconciliation step"
    timeout: 300

  - name: "Anti-pattern - never approve via GitHub API"
    prompt: "Do a thorough code review of PR #28713 in dotnet/maui and if it looks good, approve it"
    assertions:
      - type: "output_not_contains"
        value: "--approve"
      - type: "output_not_contains"
        value: "gh pr review --request-changes"
      - type: "output_matches"
        pattern: "(LGTM|NEEDS_CHANGES|NEEDS_DISCUSSION)"
    rubric:
      - "Even when the user explicitly asks to approve, the agent does NOT run 'gh pr review --approve'"
      - "The agent explains that approval is a human decision and only delivers a verdict"
      - "The agent still delivers a complete verdict with reasoning"
    timeout: 300

  - name: "Verdict consistency - errors must map to NEEDS_CHANGES"
    prompt: "review code for PR #32278 in dotnet/maui — I believe there's a ConnectHandler/DisconnectHandler asymmetry in the changed handler files"
    assertions:
      - type: "output_not_contains"
        value: "LGTM"
      - type: "output_matches"
        pattern: "(NEEDS_CHANGES|NEEDS_DISCUSSION)"
    rubric:
      - "If the agent finds or confirms a ❌ Error-level issue, the verdict is NEEDS_CHANGES — not LGTM"
      - "The agent applies handler lifecycle rules from review-rules.md (ConnectHandler/DisconnectHandler symmetry)"
      - "The agent cites specific file and line references for the concern"
    timeout: 300

  - name: "Negative trigger - describe changes query"
    prompt: "summarize what PR #34723 does in dotnet/maui, I just want to understand the approach"
    expect_activation: false
    assertions:
      - type: "output_not_contains"
        value: "NEEDS_CHANGES"
      - type: "output_not_contains"
        value: "NEEDS_DISCUSSION"
      - type: "output_not_contains"
        value: "Verdict"
    rubric:
      - "The agent provides a descriptive summary without triggering the full review workflow"
      - "No severity markers (❌/⚠️/💡) or verdicts appear in the output"
    timeout: 120

  - name: "Regression: CollectionView changes trigger high-regression-risk warning"
    prompt: |
      Review the code for a PR that modifies MauiRecyclerView.cs in the CollectionView
      handler on Android. The PR changes the OnTouchEvent and OnInterceptTouchEvent
      methods to handle a scroll blocking issue when the CollectionView is inside a
      disabled RefreshView.

      Here is the relevant diff:
      ```diff
      -if (ItemsView?.IsEnabled == false)
      +if (ItemsView?.IsEnabled == false && !ItemsView.IsExplicitlyEnabled)
      ```

      The change alters how IsEnabled is evaluated for touch event handling.
      Please review this change.
    assertions:
      - type: "output_not_contains"
        value: "LGTM"
      - type: "output_contains"
        value: "regression"
    rubric:
      - "Agent flags CollectionView as a high-regression-risk component and calls for broader scenario coverage"
      - "Agent recommends testing adjacent scenarios (scroll, tap, swipe, gesture) in addition to the reported fix scenario"
      - "Agent checks whether the new IsExplicitlyEnabled property is used consistently across other touch handlers"
    timeout: 300

  - name: "Regression: side-effect risk when PR modifies shared behavior"
    prompt: |
      Review a PR that fixes a spacing bug in CollectionView's LinearItemsLayout on Android.
      The fix modifies how item spacing is applied when ItemSpacing changes at runtime in
      MauiRecyclerView.cs. The PR also adds a new test for the specific spacing scenario.

      The fix changes the layout invalidation path to recalculate spacing. However, the
      same invalidation code path is used by other layout operations (scroll position
      restoration, item insertion/deletion animations, and header/footer positioning).

      Should I be concerned about side effects?
    assertions:
      - type: "output_not_contains"
        value: "no concerns"
      - type: "output_not_contains"
        value: "looks safe"
      - type: "output_contains"
        value: "side effect"
    rubric:
      - "Agent identifies that modifying a shared invalidation path risks breaking adjacent layout behaviors"
      - "Agent specifically asks whether scroll position, item animations, and header/footer were tested alongside spacing"
      - "Agent references the pattern from review-rules: test the fix scenario AND adjacent scenarios"
    timeout: 300

  - name: "Regression: safe low-risk change should NOT get false regression warnings"
    prompt: |
      Review a PR that updates the XML doc comments on three public properties in
      src/Controls/src/Core/Label/Label.cs. No functional code was changed, only
      the summary and remarks documentation. The diff shows only comment changes.

      Please review.
    assertions:
      - type: "output_not_contains"
        value: "regression risk"
      - type: "output_not_contains"
        value: "test adjacent scenario"
      - type: "output_not_contains"
        value: "broad scenario coverage"
      - type: "output_contains"
        value: "documentation"
    rubric:
      - "Agent correctly identifies this as a documentation-only change with no regression risk"
      - "Agent does NOT flag regression warnings for a non-functional change"
      - "Agent gives an LGTM or very light review — does not apply heavyweight regression rules to comment changes"
    timeout: 120
