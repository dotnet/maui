# ─────────────────────────────────────────────────────────────────────────────
# Hermeticity gate — negative control for the skill-eval harness.
#
# This spec is NOT part of the capability suite (the skill-validation
# workflow discovers capability suites via `eval*.vally.yaml`; this file is
# deliberately named `hermeticity.vally.yaml` so it is EXCLUDED from that
# glob and run only by the dedicated hermeticity-gate job, which INVERTS
# the verdict).
#
# Why it exists:
#   The single stimulus below can only "pass" if the agent-under-test
#   successfully calls the live GitHub REST API. The harness is healthy
#   when this stimulus FAILS — i.e. the agent has NO GitHub-shaped token it
#   can reuse for `gh api` / curl against api.github.com. The legacy
#   skill-validator harness was open-book (`export GITHUB_TOKEN=$COPILOT_TOKEN`
#   in skill-validation.yml), letting the agent walk merged-PR → linked
#   issue → documented fix and "pass" the regression corpus by reciting the
#   fix instead of reasoning about the diff cold. This gate guards against
#   that regression returning.
#
# Hermeticity model — what the eval-step env must look like:
#   - NO  GITHUB_TOKEN / GH_TOKEN  (the names `gh` and most HTTP tooling read)
#   - YES COPILOT_GITHUB_TOKEN     (model auth for the bundled Copilot CLI;
#         a name `gh` does NOT read, so the runtime's model calls succeed
#         while the agent's `gh api` calls are unauthenticated)
#
#   This is a CI-job responsibility, not automatic: the vally copilot-sdk
#   executor passes `{...process.env, NODE_NO_WARNINGS: "1"}` verbatim to the
#   agent (copilot-sdk-executor.js) — there is no token scrubbing in the
#   executor path. Data-level hermeticity (frozen worktrees / inline-frozen
#   file lists in the capability suites) is the primary defense; this gate is
#   defense-in-depth against the env regressing.
# ─────────────────────────────────────────────────────────────────────────────

name: code-review-hermeticity-gate
description: >-
  Negative-control gate for the skill-eval harness. Passes only if the
  agent reaches the live GitHub API; the hermeticity-gate job inverts the
  verdict so a PASS here means hermeticity is BROKEN (a live GitHub token
  leaked into the agent's environment).
version: "1.0.0"
type: capability

defaults:
  runs: 1
  timeout: 3m
  model: claude-opus-4.6
  judge_model: claude-opus-4.6
  executor: copilot-sdk

stimuli:
  # ───────────────────────────────────────────────────────────────────────
  # Hermeticity negative control — the ONLY path to "pass" requires
  # the agent to successfully call the live GitHub REST API. If the
  # eval-step env has no GitHub token the agent can borrow, every gh / curl
  # / fetch attempt against api.github.com fails with 401/403, and this
  # stimulus FAILS as designed. If this stimulus PASSES, hermeticity is
  # broken — the agent has a token it can reuse for open-book attacks on
  # the regression corpus. Stop and fix the job env before continuing.
  #
  # Mode of operation:
  #   - The prompt directs the agent to use the GitHub API specifically
  #     against dotnet/maui#5000, an old/closed issue whose title is too
  #     obscure for the LLM to memorize: "Events for headset connection
  #     status." (Essentials repo era — predates MAUI repo merge).
  #   - The grader requires BOTH the verbatim title AND a node_id matching
  #     the modern GraphQL global-ID shape "I_kwDO..." returned by the
  #     live API. A hallucination of the title alone won't satisfy the
  #     node_id check, and the node_id is a base64-ish opaque string the
  #     model cannot synthesize correctly. To pass, the agent MUST have
  #     received the live API response.
  # ───────────────────────────────────────────────────────────────────────
  - name: hermeticity-negative-control
    prompt: >-
      Call the GitHub REST API at https://api.github.com/repos/dotnet/maui/issues/5000
      (using gh, curl, fetch, or any HTTP tool available). Then in your reply
      include BOTH (a) the verbatim value of the response's "title" field, and
      (b) the verbatim value of the response's "node_id" field. If your tools
      cannot reach the GitHub API or you get a 401/403, say "AUTH_DENIED" and
      stop. Do not invent or guess these values — only report what the API
      actually returns.
    graders:
      # Pass requires BOTH the actual issue-#5000 title AND a node_id-shape
      # value matching the live API's modern global-ID format ("I_kwDO...").
      # Hallucinating either is unlikely; hallucinating both at once is
      # near-impossible. Case-sensitive on purpose: the title is reproduced
      # verbatim from the live API response.
      - type: output-matches
        config:
          pattern: 'Events for headset connection status'
      - type: output-matches
        config:
          pattern: 'I_kwDO[A-Za-z0-9]{6,}'
    constraints:
      max_duration: 3m
      max_turns: 10

scoring:
  # @microsoft/vally@0.6.0 ignores scoring.weights; only scoring.threshold is
  # active. threshold 1.0 means the single negative-control stimulus must score
  # a perfect 1.0 to "pass" — i.e. the agent reached the live API. The
  # hermeticity-gate job INVERTS this: a passing eval here = broken hermeticity.
  threshold: 1.0
