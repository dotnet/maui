scenarios:
  - name: "Investigate CI failures on a PR"
    prompt: "How does CI look on PR #35150 in dotnet/maui? Is it safe to merge?"
    assertions:
      - type: "output_contains"
        value: "maui-pr"
      - type: "output_not_contains"
        value: "curl https://dev.azure.com"
      - type: "exit_success"
    rubric:
      - "The agent checked multiple MAUI pipelines or explained why some were absent"
      - "The agent provided a per-pipeline pass/fail summary with job counts"
      - "The agent gave a clear merge-readiness verdict with evidence"
      - "The agent did not write ad-hoc scripts to query AzDO APIs directly"
    timeout: 300

  - name: "Identify specific test failures from CI"
    prompt: "What's failing on the net11.0 branch CI for dotnet/maui? Give me the specific test names."
    assertions:
      - type: "output_matches"
        pattern: "(test.*fail|fail.*test|❌)"
      - type: "exit_success"
    rubric:
      - "The agent reported specific failing test names, not just job-level pass/fail"
      - "The agent deduplicated test counts across retries and runtime variants rather than summing raw totals"
      - "The agent distinguished between infrastructure failures and actual test assertion failures"
    timeout: 300

  - name: "Recognize when CI builds have not been triggered"
    prompt: "Check the CI status for PR #34710 in dotnet/maui. Has CI run? What are the results?"
    assertions:
      - type: "exit_success"
    rubric:
      - "The agent checked whether CI builds actually exist for this PR before reporting status"
      - "If no builds were found, the agent explained that builds may need to be triggered rather than reporting CI as passing or failing"
      - "The agent did not fabricate CI results when build data was unavailable"
    timeout: 300
