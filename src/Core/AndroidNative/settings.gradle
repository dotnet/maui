        maven {
            url = 'https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-public-maven/maven/v1'
        }
    }
}

// NOTE: we can't use '.NET MAUI'
rootProject.name = "DOTNET MAUI"
include ':maui'
