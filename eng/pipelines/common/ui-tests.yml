parameters:
  androidPool: { }
  androidLinuxPool: { }
  iosPool: { }
  windowsPool: { }
  windowsBuildPool: { }
  macosPool: { }
  androidApiLevels: [ 30 ]
  androidApiLevelsExtended: [ 36 ] # API 36 for Material3 tests with Pixel 3 XL
  iosVersions: [ 'latest' ]
  provisionatorChannel: 'latest'
  defaultiOSVersion: '26.0'
  timeoutInMinutes: 180
  skipProvisioning: true
  BuildNativeAOT: false # Parameter to control whether NativeAOT artifacts should be built
  RunNativeAOT: false # Parameter to control whether NativeAOT UI tests should run
  categoryGroupsToTest:
    # Make sure that this list is always up-to-date with src/Controls/tests/TestCases.Shared.Tests/UITestCategories.cs
    # we might want to improve this somehow depending on how much the categories change over time
    # Note: Material3 is intentionally excluded from this list and has its own dedicated build and test stages below with a separate test filter
    - 'Accessibility,ActionSheet,ActivityIndicator,Animation,AppLinks'
    - 'Border,BoxView,Brush,Button'
    - 'CarouselView'
    - 'Cells,CheckBox,ContextActions,CustomRenderers,DatePicker,Dispatcher,DisplayAlert,DisplayPrompt,DragAndDrop'
    - 'CollectionView'
    - 'Entry'
    - 'Editor,Effects,Essentials,FlyoutPage,Focus,Fonts,Frame,Gestures,GraphicsView'
    - 'Image,ImageButton,IndicatorView,InputTransparent,IsEnabled,IsVisible'
    - 'Label'
    - 'Layout'
    - 'Lifecycle,ManualReview,Maps'
    - 'ListView'
    - 'Navigation'
    - 'Page,Performance,Picker,ProgressBar'
    - 'RadioButton,RefreshView'
    - 'SafeAreaEdges,Shadow'
    - 'ScrollView'
    - 'SearchBar,Shape,Slider'
    - 'SoftInput,Stepper,Switch,SwipeView'
    - 'Shell'
    - 'TabbedPage,TableView,TimePicker,TitleView,ToolbarItem,Triggers'
    - 'ViewBaseTests,VisualStateManager,Window'
    - 'WebView'

  projects:
    - name: name
      desc: Human Description
      android: /optional/path/to/android.csproj
      ios: /optional/path/to/ios.csproj
      winui: /optional/path/to/winui.csproj
      mac: /optional/path/to/mac.csproj
      app: /optional/path/to/app.csproj

stages:
  - stage: build_ui_tests_coreclr
    displayName: Build UITests CoreCLR Sample App
    dependsOn: []
    jobs:
      - job: build_ui_tests
        displayName: Build Sample App
        pool: ${{ parameters.androidPool }}
        variables:
          APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
        steps:
          - template: ui-tests-build-sample.yml
            parameters:
                runtimeVariant: "CoreCLR"
                skipProvisioning: ${{ parameters.skipProvisioning }}

  # Material3 Build Stage - Separate CoreCLR build with UseMaterial3=true (Android-only)
  - stage: build_ui_tests_material3
    displayName: Build UITests Material3 Sample App
    dependsOn: []
    jobs:
      - job: build_ui_tests_material3
        displayName: Build Sample App (Material3)
        workspace:
          clean: all
        pool: ${{ parameters.androidPool }}
        variables:
          APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
        steps:
          - template: ui-tests-build-sample.yml
            parameters:
                runtimeVariant: "CoreCLR"
                platform: android
                useMaterial3: true
                skipProvisioning: ${{ parameters.skipProvisioning }}
  
  # NativeAOT UI tests build stage - only run when BuildNativeAOT parameter is true
  - ${{ if eq(parameters.BuildNativeAOT, true) }}:
    - stage: build_ui_tests_nativeaot
      displayName: Build UITests NativeAOT Sample App
      dependsOn: []
      jobs:
        - job: build_ui_tests
          displayName: Build Sample App
          pool: ${{ parameters.androidPool }}
          variables:
            APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
          steps:
            - template: ui-tests-build-sample.yml
              parameters:
                  runtimeVariant: "NativeAOT"
                  platform: ios
                  skipProvisioning: ${{ parameters.skipProvisioning }}

  - stage: build_ui_tests_windows
    displayName: Build UITests Windows Sample App
    dependsOn: []
    jobs:
      - job: build_ui_tests
        displayName: Build Sample App (Windows)
        pool: ${{ parameters.windowsBuildPool }}
        variables:
          APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
        steps:
          - template: ui-tests-build-sample.yml
            parameters:
                platform: windows
                runtimeVariant: "CoreCLR"
                skipProvisioning: ${{ parameters.skipProvisioning }}

  # Windows CV1 Build Stage - Separate build with UseWindowsCollectionView2Handler=false
  - stage: build_ui_tests_windows_cv1
    displayName: Build UITests Windows CV1 Sample App
    dependsOn: []
    jobs:
      - job: build_ui_tests_windows_cv1
        displayName: Build Sample App (Windows CV1)
        workspace:
          clean: all
        pool: ${{ parameters.windowsBuildPool }}
        variables:
          APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
        steps:
          - template: ui-tests-build-sample.yml
            parameters:
                platform: windows
                runtimeVariant: "CoreCLR"
                useWindowsCV1: true
                skipProvisioning: ${{ parameters.skipProvisioning }}
  - stage: android_ui_tests_coreclr
    displayName: Android UITests CoreClr
    dependsOn: build_ui_tests_coreclr
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.android, '') }}:
          - ${{ each api in parameters.androidApiLevels }}:
            - ${{ if not(containsValue(project.androidApiLevelsExclude, api)) }}:
              - job: android_ui_tests_${{ project.name }}_${{ api }}
                strategy:
                  matrix:
                    ${{ each categoryGroup in parameters.categoryGroupsToTest }}:
                      ${{ categoryGroup }}:
                        CATEGORYGROUP: ${{ categoryGroup }}
                timeoutInMinutes: 240 # how long to run the job before automatically cancelling
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} (API ${{ api }})
                pool: ${{ parameters.androidLinuxPool }}
                variables:
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: android
                      version: ${{ api }}
                      path: ${{ project.android }}
                      app: ${{ project.app }}
                      ${{ if eq(api, 27) }}:
                        device: android-emulator-32_${{ api }}
                      ${{ if not(eq(api, 27)) }}:
                        device: android-emulator-64_${{ api }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      agentPoolAccessToken: ${{ parameters.agentPoolAccessToken }}
                      testFilter: $(CATEGORYGROUP)
                      headless: ${{ parameters.headless }}
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                      runtimeVariant: "CoreCLR"
                  
                  # Collect and publish Android snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'Android'
                      artifactName: 'uitest-snapshot-results-android-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  - stage: android_ui_tests_material3
    displayName: Android UITests Material3
    dependsOn: build_ui_tests_material3
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.android, '') }}:
          - ${{ each api in parameters.androidApiLevelsExtended }}:
            - ${{ if not(containsValue(project.androidApiLevelsExclude, api)) }}:
              - job: M3_android_ui_tests_${{ project.name }}_${{ api }}
                timeoutInMinutes: 240
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} Material3 (API ${{ api }})
                pool: ${{ parameters.androidLinuxPool }}
                variables:
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: android
                      version: ${{ api }}
                      path: ${{ project.android }}
                      app: ${{ project.app }}
                      ${{ if eq(api, 27) }}:
                        device: android-emulator-32_${{ api }}
                      ${{ if not(eq(api, 27)) }}:
                        device: android-emulator-64_${{ api }}
                      deviceType: "pixel_3_xl"
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant: "CoreCLR"
                      useMaterial3: true
                      testFilter: "Material3"
                      skipProvisioning: ${{ parameters.skipProvisioning }}

                  # Collect and publish Android Material3 snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'Android Material3'
                      artifactName: 'uitest-snapshot-results-android-material3-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  # Shell Renderer Test Stage - Tests using Shell renderer build (shares screenshots with regular Android)
  - stage: android_ui_tests_shell
    displayName: Android UITests Shell Renderer
    dependsOn: build_ui_tests_shell
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.android, '') }}:
          - ${{ each api in parameters.androidApiLevels }}:
            - ${{ if not(containsValue(project.androidApiLevelsExclude, api)) }}:
              - job: Shell_android_ui_tests_${{ project.name }}_${{ api }}
                timeoutInMinutes: 240
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} Shell (API ${{ api }})
                pool: ${{ parameters.androidLinuxPool }}
                variables:
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: android
                      version: ${{ api }}
                      path: ${{ project.android }}
                      app: ${{ project.app }}
                      ${{ if eq(api, 27) }}:
                        device: android-emulator-32_${{ api }}
                      ${{ if not(eq(api, 27)) }}:
                        device: android-emulator-64_${{ api }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      useAndroidShellRenderer: true
                      testFilter: "Shell"
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish Android Shell snapshot diffs (uses regular Android screenshot folder)
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'Android'
                      artifactName: 'uitest-snapshot-results-android-shell-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  - stage: ios_ui_tests_coreclr
    displayName: iOS UITests CoreCLR
    dependsOn: build_ui_tests_coreclr
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.ios, '') }}:
          - ${{ each version in parameters.iosVersions }}:
            - ${{ if not(containsValue(project.iosVersionsExclude, version)) }}:
              - job: ios_ui_tests_coreclr_${{ project.name }}_${{ replace(version, '.', '_') }}
                strategy:
                  matrix:
                    ${{ each categoryGroup in parameters.categoryGroupsToTest }}:
                      ${{ categoryGroup }}:
                        CATEGORYGROUP: ${{ categoryGroup }}
                timeoutInMinutes: ${{ parameters.timeoutInMinutes }} # how long to run the job before automatically cancelling
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} (v${{ version }})
                pool: ${{ parameters.iosPool }}
                variables:
                  REQUIRED_XCODE: $(DEVICETESTS_REQUIRED_XCODE)
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: ios
                      ${{ if eq(version, 'latest') }}:
                        version: 18.5
                      ${{ if ne(version, 'latest') }}:
                        version: ${{ version }}
                      path: ${{ project.ios }}
                      app: ${{ project.app }}
                      ${{ if and(eq(version, 'latest'), true) }}:
                        device: ios-simulator-64
                      ${{ if and(ne(version, 'latest'), true) }}:
                        device: ios-simulator-64_${{ version }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant : "CoreCLR"
                      testFilter: $(CATEGORYGROUP)
                      headless: ${{ parameters.headless }}
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish iOS snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'iOS'
                      artifactName: 'uitest-snapshot-results-ios-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  - stage: ios_ui_tests_coreclr_cv1
    displayName: iOS UITests CoreCLR CollectionView1
    dependsOn: build_ui_tests_coreclr
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.ios, '') }}:
          - ${{ each version in parameters.iosVersions }}:
            - ${{ if not(containsValue(project.iosVersionsExclude, version)) }}:
              - job: CV1_ios_ui_tests_coreclr_${{ project.name }}_${{ replace(version, '.', '_') }}
                timeoutInMinutes: ${{ parameters.timeoutInMinutes }} # how long to run the job before automatically cancelling
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} (v${{ version }})
                pool: ${{ parameters.iosPool }}
                variables:
                  REQUIRED_XCODE: $(DEVICETESTS_REQUIRED_XCODE)
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: ios
                      ${{ if eq(version, 'latest') }}:
                        version: 18.5
                      ${{ if ne(version, 'latest') }}:
                        version: ${{ version }}
                      path: ${{ project.ios }}
                      app: ${{ project.app }}
                      ${{ if eq(version, 'latest') }}:
                        device: ios-simulator-64
                      ${{ if ne(version, 'latest') }}:
                        device: ios-simulator-64_${{ version }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant : "CoreCLR"
                      testFilter: "CollectionView"
                      headless: ${{ parameters.headless }}
                      testConfigurationArgs: "CollectionView1"
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish iOS CV1 snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'iOS CV1'
                      artifactName: 'uitest-snapshot-results-ios-cv1-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  - stage: ios_ui_tests_coreclr_carv1
    displayName: iOS UITests CoreCLR CarouselView1
    dependsOn: build_ui_tests_coreclr
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.ios, '') }}:
          - ${{ each version in parameters.iosVersions }}:
            - ${{ if not(containsValue(project.iosVersionsExclude, version)) }}:
              - job: CARV1_ios_ui_tests_coreclr_${{ project.name }}_${{ replace(version, '.', '_') }}
                timeoutInMinutes: ${{ parameters.timeoutInMinutes }} # how long to run the job before automatically cancelling
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} (v${{ version }})
                pool: ${{ parameters.iosPool }}
                variables:
                  REQUIRED_XCODE: $(DEVICETESTS_REQUIRED_XCODE)
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: ios
                      ${{ if eq(version, 'latest') }}:
                        version: 18.5
                      ${{ if ne(version, 'latest') }}:
                        version: ${{ version }}
                      path: ${{ project.ios }}
                      app: ${{ project.app }}
                      ${{ if eq(version, 'latest') }}:
                        device: ios-simulator-64
                      ${{ if ne(version, 'latest') }}:
                        device: ios-simulator-64_${{ version }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant : "CoreCLR"
                      testFilter: "CarouselView"
                      headless: ${{ parameters.headless }}
                      testConfigurationArgs: "CollectionView1"
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish iOS CARV1 snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'iOS CARV1'
                      artifactName: 'uitest-snapshot-results-ios-carv1-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  - ${{ if and(eq(parameters.BuildNativeAOT, true), eq(parameters.RunNativeAOT, true)) }}:
    - stage: ios_ui_tests_nativeaot
      displayName: iOS UITests NativeAOT
      dependsOn: build_ui_tests_nativeaot
      jobs:
        - ${{ each project in parameters.projects }}:
          - ${{ if ne(project.ios, '') }}:
            - ${{ each version in parameters.iosVersions }}:
              - ${{ if not(containsValue(project.iosVersionsExclude, version)) }}:
                - job: ios_ui_tests_nativeaot_${{ project.name }}_${{ replace(version, '.', '_') }}
                  strategy:
                    matrix:
                      ${{ each categoryGroup in parameters.categoryGroupsToTest }}:
                        ${{ categoryGroup }}:
                          CATEGORYGROUP: ${{ categoryGroup }}
                  timeoutInMinutes: ${{ parameters.timeoutInMinutes }} # how long to run the job before automatically cancelling
                  workspace:
                    clean: all
                  displayName: ${{ coalesce(project.desc, project.name) }} (v${{ version }})
                  pool: ${{ parameters.iosPool }}
                  variables:
                    APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                  steps:
                    - template: ui-tests-steps.yml
                      parameters:
                        platform: ios
                        ${{ if eq(version, 'latest') }}:
                          version: ${{ parameters.defaultiOSVersion }}
                        ${{ if ne(version, 'latest') }}:
                          version: ${{ version }}
                        path: ${{ project.ios }}
                        app: ${{ project.app }}
                        ${{ if eq(version, 'latest') }}:
                          device: ios-simulator-64
                        ${{ if ne(version, 'latest') }}:
                          device: ios-simulator-64_${{ version }}
                        provisionatorChannel: ${{ parameters.provisionatorChannel }}
                        runtimeVariant : "NativeAOT"
                        testFilter: $(CATEGORYGROUP)
                        headless: ${{ parameters.headless }}
                        skipProvisioning: ${{ parameters.skipProvisioning }}

  - stage: winui_ui_tests
    displayName: WinUI UITests
    dependsOn: build_ui_tests_windows
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.winui, '') }}:
              - job: winui_ui_tests_${{ project.name }}
                strategy:
                  matrix:
                    # WebView is excluded on Windows: Appium driver cannot attach to WebView2
                    # (appium/appium#22217 / dotnet/maui#35334). Remove this filter once fixed.
                    ${{ each categoryGroup in parameters.categoryGroupsToTest }}:
                      ${{ if ne(categoryGroup, 'WebView') }}:
                        ${{ categoryGroup }}:
                          CATEGORYGROUP: ${{ categoryGroup }}
                timeoutInMinutes: ${{ parameters.timeoutInMinutes }} # how long to run the job before automatically cancelling
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }}
                pool: ${{ parameters.windowsPool }}
                variables:
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)\.appium\
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: windows
                      version: "10.0.19041.0"
                      device: windows10
                      path: ${{ project.winui }}
                      app: ${{ project.app }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant: "CoreCLR"
                      testFilter: $(CATEGORYGROUP)
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish Windows snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'Windows'
                      artifactName: 'uitest-snapshot-results-windows-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'

  # Windows CV1 UI Tests - Testing CollectionView with UseWindowsCollectionView2Handler=false
  - stage: winui_ui_tests_cv1
    displayName: WinUI UITests CV1
    dependsOn: build_ui_tests_windows_cv1
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.winui, '') }}:
              - job: CV1_winui_ui_tests_${{ project.name }}
                timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }} (CV1)
                pool: ${{ parameters.windowsPool }}
                variables:
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)\.appium\
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: windows
                      version: "10.0.19041.0"
                      device: windows10
                      path: ${{ project.winui }}
                      app: ${{ project.app }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant: "CoreCLR"
                      useWindowsCV1: true
                      testFilter: "CollectionView"
                      testConfigurationArgs: "UseWindowsCV1:true"
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish Windows CV1 snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'Windows CV1'
                      artifactName: 'uitest-snapshot-results-windows-cv1-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'
  - stage: maccatalyst_ui_tests_coreclr
    displayName: MacCatalyst UITests CoreCLR
    dependsOn: build_ui_tests_coreclr
    jobs:
      - ${{ each project in parameters.projects }}:
        - ${{ if ne(project.mac, '') }}:
              - job: maccatalyst_ui_tests_coreclr_${{ project.name }}
                strategy:
                  matrix:
                    ${{ each categoryGroup in parameters.categoryGroupsToTest }}:
                      ${{ categoryGroup }}:
                        CATEGORYGROUP: ${{ categoryGroup }}
                timeoutInMinutes: ${{ parameters.timeoutInMinutes }} # how long to run the job before automatically cancelling
                workspace:
                  clean: all
                displayName: ${{ coalesce(project.desc, project.name) }}
                pool: ${{ parameters.macosPool }}
                variables:
                  REQUIRED_XCODE: $(DEVICETESTS_REQUIRED_XCODE)
                  APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
                steps:
                  - template: ui-tests-steps.yml
                    parameters:
                      platform: catalyst
                      version: "15.3"
                      device: mac
                      path: ${{ project.mac }}
                      app: ${{ project.app }}
                      provisionatorChannel: ${{ parameters.provisionatorChannel }}
                      runtimeVariant : "CoreCLR"
                      testFilter: $(CATEGORYGROUP)
                      skipProvisioning: ${{ parameters.skipProvisioning }}
                  
                  # Collect and publish MacCatalyst snapshot diffs
                  - template: ui-tests-collect-snapshot-diffs.yml
                    parameters:
                      platform: 'MacCatalyst'
                      artifactName: 'uitest-snapshot-results-maccatalyst-$(System.StageName)-$(System.JobName)-$(System.JobAttempt)'
