# Pipeline for running GitHub Copilot PR Reviewer Agent
# This pipeline installs the Copilot CLI and invokes the PR reviewer agent
# to conduct automated code reviews on pull requests.
#
# For more information, see:
# https://github.com/dotnet/maui/wiki/PR-Reviewer-Agent

trigger: none  # Manual trigger only

pr: none  # Not triggered by PRs

parameters:
  - name: PRNumber
    displayName: 'Pull Request Number'
    type: number

  - name: Platform
    displayName: 'Target Platform'
    type: string
    default: 'android'
    values:
      - android
      - ios
      - catalyst
      - windows

  - name: androidPool
    type: object
    default:
      name: Azure Pipelines
      vmImage: ubuntu-22.04

  - name: iosPool
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: macPool
    type: object
    default:
      name: AcesShared

  - name: windowsPool
    type: object
    default:
      name: Azure Pipelines
      vmImage: windows-2022

variables:
  - template: /eng/pipelines/common/variables.yml@self
  - name: Codeql.Enabled
    value: false
  - name: Codeql.SkipTaskAutoInjection
    value: true
  - name: APPIUM_HOME
    value: $(System.DefaultWorkingDirectory)/.appium/
  - name: LogDirectory
    value: $(Build.ArtifactStagingDirectory)/logs

stages:
  - stage: ReviewPR
    displayName: 'Review Pull Request'
    jobs:
      - job: CopilotReview
        displayName: 'Run Copilot PR Reviewer Agent'
        ${{ if eq(parameters.Platform, 'android') }}:
          pool: ${{ parameters.androidPool }}
        ${{ elseif eq(parameters.Platform, 'ios') }}:
          pool: ${{ parameters.iosPool }}
        ${{ elseif eq(parameters.Platform, 'catalyst') }}:
          pool: ${{ parameters.macPool }}
        ${{ elseif eq(parameters.Platform, 'windows') }}:
          pool: ${{ parameters.windowsPool }}
        ${{ else }}:
          pool: ${{ parameters.androidPool }}  # fallback to android pool
        timeoutInMinutes: 360
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: false
            # persistCredentials is false — tasks that need GitHub access
            # (Setup, Post) use GH_TOKEN env var instead. This limits the
            # blast radius: Gate and CopilotReview tasks cannot push to the repo.

          # Validate Parameters
          # PRNumber is received via env var to avoid compile-time shell injection.
          # Anyone triggering this pipeline directly (AzDO UI/REST) could pass arbitrary
          # strings — so we validate before any further use.
          - bash: |
              echo "Validating PR Number parameter..."
              PR_NUM="${PARAM_PR_NUMBER}"
              if [ -z "${PR_NUM}" ]; then
                echo "##vso[task.logissue type=error]PRNumber parameter is required"
                exit 1
              fi
              if ! [[ "${PR_NUM}" =~ ^[1-9][0-9]*$ ]]; then
                echo "##vso[task.logissue type=error]PRNumber must be a positive integer, got: '${PR_NUM}'"
                exit 1
              fi
              echo "PR Number: ${PR_NUM}"
            displayName: 'Validate Parameters'
            env:
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}

          - bash: |
              echo "##vso[build.updatebuildnumber]PR ${PARAM_PR_NUMBER} ${{ parameters.Platform }}"
            displayName: 'Set Pipeline Run Title'
            env:
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}

          # Enable KVM for Android emulator on Linux (same as ui-tests-steps.yml / device-tests-steps.yml)
          - ${{ if eq(parameters.Platform, 'android') }}:
            - template: common/enable-kvm.yml

          # Provision SDKs (same parameters as ui-tests-steps.yml)
          - template: common/provision.yml
            parameters:
              skipXcode: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows')) }}
              skipProvisionator: true
              skipJdk: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidCommonSdks: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidPlatformApis: true
              onlyAndroidPlatformDefaultApis: true
              skipAndroidEmulatorImages: ${{ ne(parameters.Platform, 'android') }}
              # AVD is created by the inline 'Create AVD and boot Android Emulator' script below
              # with specific config (playstore image variant, partition shrink, ADB key pre-auth)
              # that ProvisionAndroidSdkAvdCreateAvds doesn't replicate.
              skipAndroidCreateAvds: true
              androidEmulatorApiLevel: '30'
              skipSimulatorSetup: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows'), eq(parameters.Platform, 'catalyst')) }}
              skipCertificates: true

          # Install .NET and workloads via build.ps1
          - pwsh: ./build.ps1 --target=dotnet --configuration="Release" --verbosity=diagnostic
            displayName: 'Install .NET and workloads'
            retryCountOnTaskFailure: 2
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)

          - pwsh: echo "##vso[task.prependpath]$(DotNet.Dir)"
            displayName: 'Add .NET to PATH'

          # Build MSBuild tasks (required for MAUI builds)
          - pwsh: ./build.ps1 --target=dotnet-buildtasks --configuration="Release" --verbosity=diagnostic
            displayName: 'Build MSBuild Tasks'
            retryCountOnTaskFailure: 1
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)
            
          # Restore .NET tools (includes xharness)
          - bash: dotnet tool restore
            displayName: 'Restore .NET Tools'

          # Set screen resolution on Windows (same as ui-tests-steps.yml)
          - ${{ if eq(parameters.Platform, 'windows') }}:
            - pwsh: |
                $scriptPath = Join-Path "$(System.DefaultWorkingDirectory)" "eng" "scripts" "Set-ScreenResolution.ps1"
                & $scriptPath -Width 1920 -Height 1080
              displayName: 'Set screen resolution'

          # Create AVD and boot Android Emulator
          - ${{ if eq(parameters.Platform, 'android') }}:
            # Free disk space on hosted agents (emulator needs ~7GB for userdata partition)
            - script: |
                echo "=== Disk space before cleanup ==="
                df -h /home
                echo "Removing unnecessary tools to free space..."
                sudo rm -rf /usr/share/dotnet /usr/local/share/powershell /usr/local/share/chromium 2>/dev/null || true
                sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/Python 2>/dev/null || true
                sudo rm -rf /usr/share/swift 2>/dev/null || true
                echo "=== Disk space after cleanup ==="
                df -h /home
              displayName: 'Free Disk Space for Emulator'

            - script: |
                export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
                export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

                echo "=== Creating AVD ==="
                echo "no" | avdmanager create avd -n Emulator_30 -k "system-images;android-30;google_apis_playstore;x86_64" --device "Nexus 5X" --force
                
                # Reduce userdata partition to fit on hosted agents (~4.2GB free)
                AVD_CONFIG="$HOME/.android/avd/Emulator_30.avd/config.ini"
                if [ -f "$AVD_CONFIG" ]; then
                  sed -i 's/disk.dataPartition.size=.*/disk.dataPartition.size=2048m/' "$AVD_CONFIG"
                  echo "Updated disk.dataPartition.size to 2048m"
                fi

                # Pre-authorize ADB keys (mirrors android.cake HandleVirtualDevice)
                echo "=== Pre-authorizing ADB keys ==="
                mkdir -p "$HOME/.android"
                if [ ! -f "$HOME/.android/adbkey" ]; then
                  adb keygen "$HOME/.android/adbkey" 2>/dev/null || true
                fi
                ADB_KEY_PUB="$HOME/.android/adbkey.pub"
                AVD_DIR="$HOME/.android/avd/Emulator_30.avd"
                if [ -f "$ADB_KEY_PUB" ] && [ -d "$AVD_DIR" ]; then
                  cp "$ADB_KEY_PUB" "$AVD_DIR/adbkey.pub"
                  echo "ADB key pre-authorized for emulator"
                fi
                
                echo "=== Starting Emulator ==="
                # Kill ALL stale emulator processes from previous step retries
                for STALE_PID in $(pgrep -f "qemu-system" 2>/dev/null || true); do
                  echo "Killing stale emulator PID $STALE_PID"
                  kill "$STALE_PID" 2>/dev/null || true
                done
                sleep 2
                for STALE_PID in $(pgrep -f "qemu-system" 2>/dev/null || true); do
                  kill -9 "$STALE_PID" 2>/dev/null || true
                done
                # Kill any stale adb server and restart
                adb kill-server 2>/dev/null || true
                sleep 1
                adb start-server
                
                # Retry loop: emulator sometimes fails to connect ADB on first launch
                MAX_LAUNCH_ATTEMPTS=2
                EMULATOR_PID=""
                for LAUNCH_ATTEMPT in $(seq 1 $MAX_LAUNCH_ATTEMPTS); do
                  echo "--- Emulator launch attempt $LAUNCH_ATTEMPT of $MAX_LAUNCH_ATTEMPTS ---"

                  if [ $LAUNCH_ATTEMPT -gt 1 ]; then
                    echo "Cleaning up before retry..."
                    if [ -n "$EMULATOR_PID" ] && kill -0 "$EMULATOR_PID" 2>/dev/null; then
                      kill "$EMULATOR_PID" 2>/dev/null || true
                      sleep 2
                      kill -0 "$EMULATOR_PID" 2>/dev/null && kill -9 "$EMULATOR_PID" 2>/dev/null || true
                    fi
                    sleep 3
                    adb kill-server 2>/dev/null || true
                    sleep 2
                    adb start-server
                    sleep 2
                  fi

                  nohup emulator -avd Emulator_30 -gpu swiftshader_indirect -no-window -no-snapshot -no-audio -no-boot-anim -partition-size 2048 > /tmp/emulator.log 2>&1 &
                  EMULATOR_PID=$!
                  echo "Emulator PID: $EMULATOR_PID"
                  
                  echo "Waiting for emulator device (adb wait-for-device, 120s timeout)..."
                  timeout 120 adb wait-for-device
                  if [ $? -eq 0 ]; then
                    # Capture device ID immediately while it's responsive
                    DETECTED_DEVICE=$(adb devices | grep "emulator.*device" | awk '{print $1}' | head -1)
                    if [ -z "$DETECTED_DEVICE" ]; then
                      DETECTED_DEVICE="emulator-5554"
                    fi
                    echo "Device detected: $DETECTED_DEVICE ($(adb devices -l | grep emulator || true))"
                    break
                  fi

                  echo "##vso[task.logissue type=warning]adb wait-for-device timed out (attempt $LAUNCH_ATTEMPT)"
                  adb devices -l
                  tail -30 /tmp/emulator.log

                  if [ $LAUNCH_ATTEMPT -eq $MAX_LAUNCH_ATTEMPTS ]; then
                    echo "##vso[task.logissue type=error]Emulator failed to connect after $MAX_LAUNCH_ATTEMPTS attempts"
                    exit 1
                  fi
                done

                timeout=300
                waited=0
                while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
                  sleep 5
                  waited=$((waited + 5))
                  if [ $waited -ge $timeout ]; then
                    echo "##vso[task.logissue type=error]Emulator did not finish booting after ${timeout}s"
                    exit 1
                  fi
                  # At 90 seconds, restart ADB server to recover from auth issues (mirrors android.cake)
                  if [ $waited -eq 90 ]; then
                    echo "Boot taking longer than expected (90/${timeout}s). Restarting ADB server..."
                    adb kill-server 2>/dev/null || true
                    sleep 2
                    adb start-server
                    sleep 2
                    echo "ADB server restarted. Continuing to wait..."
                  fi
                  # Re-ensure ADB keys every 60s during boot (mirrors android.cake PrepareDevice)
                  if [ $((waited % 60)) -eq 0 ] && [ $waited -gt 0 ]; then
                    if [ -f "$ADB_KEY_PUB" ] && [ -d "$AVD_DIR" ]; then
                      cp "$ADB_KEY_PUB" "$AVD_DIR/adbkey.pub" 2>/dev/null || true
                    fi
                  fi
                done
                echo "Boot completed, waiting for package manager..."

                timeout=120
                waited=0
                while ! adb shell pm list packages 2>/dev/null | grep -q "package:"; do
                  sleep 5
                  waited=$((waited + 5))
                  if [ $waited -ge $timeout ]; then
                    echo "##vso[task.logissue type=error]Package manager not ready after ${timeout}s"
                    exit 1
                  fi
                done

                DEVICE_ID="${DETECTED_DEVICE:-$(adb devices | grep 'emulator.*device' | awk '{print $1}' | head -1)}"
                if [ -z "$DEVICE_ID" ]; then
                  DEVICE_ID="emulator-5554"
                  echo "##[warning]Could not detect device ID, defaulting to $DEVICE_ID"
                fi
                echo "✅ Emulator fully booted: $DEVICE_ID"

                # Prepare emulator for CI use — keeps device responsive during idle period
                echo "=== Preparing emulator for CI ==="
                # Wait for device to stabilize after boot (transient offline state)
                DEVICE_READY=false
                for i in $(seq 1 20); do
                  if adb -s $DEVICE_ID shell echo ok 2>/dev/null | grep -q ok; then
                    DEVICE_READY=true
                    break
                  fi
                  echo "Device offline, retrying ($i/20)..."
                  sleep 5
                done

                if [ "$DEVICE_READY" = false ]; then
                  echo "##vso[task.logissue type=error]Emulator went offline after boot — device not responsive after 100s"
                  exit 1
                fi

                # Disable all animations (reduces CPU load and flakiness)
                adb -s $DEVICE_ID shell settings put global window_animation_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put global transition_animation_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put global animator_duration_scale 0.0 || true
                # Prevent screen from turning off (emulator simulates AC charging)
                adb -s $DEVICE_ID shell settings put system screen_off_timeout 2147483647 || true
                adb -s $DEVICE_ID shell svc power stayon true || true
                # Wake screen and dismiss any lock screen
                adb -s $DEVICE_ID shell input keyevent 82 || true
                sleep 1
                # Dismiss any "System UI has stopped" or crash dialogs
                adb -s $DEVICE_ID shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                # Clear logcat buffer so agent sees only fresh logs
                adb -s $DEVICE_ID logcat -c 2>/dev/null || true
                echo "Emulator preparation complete"

                echo "##vso[task.setvariable variable=DEVICE_UDID]$DEVICE_ID"
                echo "##vso[task.prependpath]$ANDROID_SDK_ROOT/platform-tools"
                echo "##vso[task.prependpath]$ANDROID_SDK_ROOT/emulator"
              displayName: 'Create AVD and Boot Android Emulator'
              retryCountOnTaskFailure: 3
              timeoutInMinutes: 15

          # Install Node.js and Appium (same as ui-tests-steps.yml)
          - task: UseNode@1
            inputs:
              version: "24.x"
            displayName: 'Install Node.js'

          - pwsh: |
              $skipAppiumDoctor = if ($IsMacOS -or $IsLinux) { "true" } else { "false" }
              dotnet build ./src/Provisioning/Provisioning.csproj -t:ProvisionAppium -p:SkipAppiumDoctor="$skipAppiumDoctor" -bl:"$(LogDirectory)/provision-appium.binlog"
            displayName: 'Install Appium'
            retryCountOnTaskFailure: 2
            timeoutInMinutes: 10
            env:
              APPIUM_HOME: $(APPIUM_HOME)

          - bash: |
              echo "Installing GitHub CLI..."
              # gh is pre-installed on Azure Pipelines hosted images (ubuntu, macOS, windows)
              # Attempt upgrade if available, otherwise install
              if command -v gh &> /dev/null; then
                echo "GitHub CLI already installed: $(gh --version | head -1)"
              elif command -v brew &> /dev/null; then
                brew install gh
              else
                echo "##vso[task.logissue type=error]GitHub CLI not found and no package manager available"
                exit 1
              fi
              gh --version
              echo "GitHub CLI ready"
            displayName: 'Install GitHub CLI'

          # NOTE: Removed `gh auth login` step. With the phased task design,
          # GH_TOKEN is passed as an env var only to Setup and Post tasks, and
          # `gh` uses GH_TOKEN directly without needing `gh auth login`. This
          # avoids persisting credentials in the agent's gh auth store where
          # Gate and CopilotReview tasks could access them.

          - bash: |
              echo "Installing GitHub Copilot CLI..."
              npm install -g @github/copilot
              # Ensure npm global bin is on PATH for subsequent steps (Linux UseNode installs to toolcache)
              COPILOT_BIN_DIR=$(dirname "$(which copilot)")
              echo "Copilot binary at: $COPILOT_BIN_DIR/copilot"
              echo "##vso[task.prependpath]$COPILOT_BIN_DIR"
              copilot --version || true
              echo "Copilot CLI installed successfully"
            displayName: 'Install GitHub Copilot CLI'

          # Boot iOS Simulator (only for iOS platform)
          # Match main CI ui-tests pipeline: defaultiOSVersion: '26.0'
          # Snapshots are at src/Controls/tests/TestCases.iOS.Tests/snapshots/ios-26
          # UITest.cs picks ios-26 baseline when platformVersion starts with "26."
          - bash: |
              echo "=== Booting iOS Simulator ==="
              
              # Prefer iOS 26 (main pipeline default), fallback to 18.x then 17.x
              RUNTIME=$(xcrun simctl list runtimes available --json | jq -r '
                [.runtimes[] | select(.name | test("iOS 26"))] | sort_by(.version) | last | .identifier // empty
              ')
              if [ -z "$RUNTIME" ]; then
                RUNTIME=$(xcrun simctl list runtimes available --json | jq -r '
                  [.runtimes[] | select(.name | test("iOS 18"))] | sort_by(.version) | last | .identifier // empty
                ')
              fi
              if [ -z "$RUNTIME" ]; then
                RUNTIME=$(xcrun simctl list runtimes available --json | jq -r '
                  [.runtimes[] | select(.name | test("iOS 17"))] | sort_by(.version) | last | .identifier // empty
                ')
              fi
              echo "Selected iOS runtime: $RUNTIME"
              
              # Look for iPhone Xs (matches UI test baselines - required for snapshot tests)
              UDID=$(xcrun simctl list devices available --json | jq -r --arg rt "$RUNTIME" '
                .devices[$rt] // [] |
                map(select(.name == "iPhone Xs")) |
                .[0].udid // empty
              ')
              
              # If iPhone Xs doesn't exist, try iPhone 11 Pro (same 1125×2436 resolution)
              if [ -z "$UDID" ]; then
                UDID=$(xcrun simctl list devices available --json | jq -r --arg rt "$RUNTIME" '
                  .devices[$rt] // [] |
                  map(select(.name == "iPhone 11 Pro")) |
                  .[0].udid // empty
                ')
                if [ -n "$UDID" ]; then
                  echo "Found existing iPhone 11 Pro (same resolution as iPhone Xs): $UDID"
                fi
              else
                echo "Found existing iPhone Xs: $UDID"
              fi
              
              # If neither exists, try to create them
              if [ -z "$UDID" ]; then
                echo "No matching device found - attempting to create one for runtime $RUNTIME..."
                
                # Try iPhone Xs first
                UDID=$(xcrun simctl create "iPhone Xs" com.apple.CoreSimulator.SimDeviceType.iPhone-Xs "$RUNTIME" 2>&1)
                if [ $? -ne 0 ]; then
                  echo "iPhone Xs device type unavailable: $UDID"
                  # Try iPhone 11 Pro (same 1125×2436 resolution)
                  UDID=$(xcrun simctl create "iPhone 11 Pro" com.apple.CoreSimulator.SimDeviceType.iPhone-11-Pro "$RUNTIME" 2>&1)
                  if [ $? -ne 0 ]; then
                    echo "##vso[task.logissue type=warning]Failed to create iPhone 11 Pro: $UDID"
                    # Last resort: first available iPhone
                    UDID=$(xcrun simctl list devices available --json | jq -r '
                      .devices | to_entries |
                      map(.value) | flatten |
                      map(select(.name | test("iPhone"))) |
                      .[0].udid
                    ')
                  else
                    echo "Created iPhone 11 Pro simulator: $UDID"
                  fi
                else
                  echo "Created iPhone Xs simulator: $UDID"
                fi
              fi
              
              if [ -z "$UDID" ]; then
                echo "##vso[task.logissue type=error]No iOS simulator found"
                exit 1
              fi
              
              # Shutdown any other booted simulators to avoid Appium connecting to wrong device
              xcrun simctl list devices booted --json | jq -r '
                .devices | to_entries | map(.value) | flatten |
                map(select(.state == "Booted" and .udid != "'"$UDID"'")) |
                .[].udid
              ' | while read OTHER_UDID; do
                echo "Shutting down other simulator: $OTHER_UDID"
                xcrun simctl shutdown "$OTHER_UDID" 2>/dev/null || true
              done
              
              echo "Booting simulator: $UDID"
              xcrun simctl boot "$UDID" 2>/dev/null || echo "Simulator may already be booted"
              sleep 10
              
              echo "Booted simulators:"
              xcrun simctl list devices booted
              
              echo "##vso[task.setvariable variable=DEVICE_UDID]$UDID"
              echo "iOS Simulator UDID: $UDID"
            displayName: 'Boot iOS Simulator'
            condition: eq('${{ parameters.Platform }}', 'ios')
            timeoutInMinutes: 5

          # Warm up the emulator right before the agent runs.
          # The emulator may have been idle for 15-30 min while Appium/Node/CLI were installed.
          # Without this, SystemUI can ANR when the agent first touches it.
          - bash: |
              set -e
              DEVICE_ID="$(DEVICE_UDID)"
              if [ -z "$DEVICE_ID" ]; then
                echo "No DEVICE_UDID set — skipping warmup"
                exit 0
              fi

              echo "=== Emulator warmup before agent ==="
              # Verify device is still connected
              if ! adb -s "$DEVICE_ID" shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
                echo "Device not responding. Restarting ADB server..."
                adb kill-server 2>/dev/null || true
                sleep 2
                adb start-server
                sleep 2
                timeout 90 adb wait-for-device
                # Wait for boot to complete after ADB reconnect
                waited=0
                while [ "$(adb -s "$DEVICE_ID" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
                  sleep 5; waited=$((waited+5))
                  [ $waited -ge 90 ] && { echo "##[warning]Emulator still not booted after ADB restart"; break; }
                done
              fi

              # Dismiss ANR dialogs and wake screen — run twice for reliability
              for PASS in 1 2; do
                echo "--- Warmup pass $PASS ---"
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_WAKEUP 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_MENU 2>/dev/null || true
                sleep 1

                # Dismiss system dialogs (ANR, crash, etc.)
                adb -s "$DEVICE_ID" shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_ENTER 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_BACK 2>/dev/null || true
                sleep 1
              done

              # Check for lingering ANR in window state
              if adb -s "$DEVICE_ID" shell dumpsys window 2>/dev/null | grep -qi "Application Not Responding\|ANR"; then
                echo "⚠️  ANR dialog still present — force-dismissing with HOME + BACK"
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_HOME 2>/dev/null || true
                sleep 2
                adb -s "$DEVICE_ID" shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_BACK 2>/dev/null || true
                sleep 1
              fi

              # Open and close Settings to exercise the system and confirm responsiveness
              adb -s "$DEVICE_ID" shell am start -a android.settings.SETTINGS 2>/dev/null || true
              sleep 3
              adb -s "$DEVICE_ID" shell am force-stop com.android.settings 2>/dev/null || true

              # Final dialog sweep
              adb -s "$DEVICE_ID" shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
              adb -s "$DEVICE_ID" shell input keyevent KEYCODE_BACK 2>/dev/null || true

              # Clear logcat so agent gets clean logs
              adb -s "$DEVICE_ID" logcat -c 2>/dev/null || true

              echo "✅ Emulator warmed up and responsive"
            displayName: 'Warm Up Android Emulator'
            condition: and(succeeded(), eq('${{ parameters.Platform }}', 'android'))
            timeoutInMinutes: 6
            retryCountOnTaskFailure: 2

          # ─────────────────────────────────────────────────────────
          #  Task 1 — SETUP: symlink copilot, git config, env prep,
          #  copy trusted scripts, invoke Review-PR.ps1 -Phase Setup
          #  env: GH_TOKEN (for branch checkout / PR merge)
          # ─────────────────────────────────────────────────────────
          - bash: |
              echo "═══ TASK 1: SETUP ═══"

              # Ensure copilot CLI is accessible to pwsh subprocess.
              if [[ "$(uname -o 2>/dev/null || uname -s)" == *"Msys"* ]] || [[ "$(uname -o 2>/dev/null || uname -s)" == *"Windows"* ]] || [[ "$(uname -o 2>/dev/null || uname -s)" == *"MINGW"* ]]; then
                COPILOT_PATH=$(which copilot 2>/dev/null || true)
                echo "copilot location: ${COPILOT_PATH:-not found}"
                if [ -z "$COPILOT_PATH" ]; then
                  echo "##vso[task.logissue type=error]copilot CLI not found on PATH. Failing early."
                  exit 1
                fi
              else
                COPILOT_PATH=$(which copilot 2>/dev/null || find /opt/hostedtoolcache/node -name copilot -type f 2>/dev/null | head -1)
                if [ -n "$COPILOT_PATH" ] && [ ! -f /usr/local/bin/copilot ]; then
                  sudo ln -sf "$COPILOT_PATH" /usr/local/bin/copilot
                  echo "Symlinked copilot to /usr/local/bin/copilot"
                fi
                COPILOT_PATH=$(which copilot 2>/dev/null || true)
                echo "copilot location: ${COPILOT_PATH:-not found}"
                if [ -z "$COPILOT_PATH" ]; then
                  echo "##vso[task.logissue type=error]copilot CLI not found on PATH. Failing early."
                  exit 1
                fi
              fi
              pwsh -NoProfile -c 'Write-Host "pwsh sees copilot at: $(Get-Command copilot -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)"'

              # Configure git identity
              git config user.email "copilot-ci@microsoft.com"
              git config user.name "Copilot CI"

              # Create Directory.Build.Override.props
              cp Directory.Build.Override.props.in Directory.Build.Override.props
              if [[ "$(uname)" == "Linux" ]]; then
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              elif [[ "$(uname)" == "Darwin" ]]; then
                sed -i '' 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              else
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              fi

              # Create artifacts directory
              mkdir -p $(Build.ArtifactStagingDirectory)/copilot-logs

              # Copy trusted scripts from the checked-out commit so later tasks
              # (which may be on a merged/modified worktree) use the same .github/
              # files that were reviewed and approved on main.
              TRUSTED="$(Build.ArtifactStagingDirectory)/trusted-github"
              mkdir -p "$TRUSTED"
              cp -r .github/scripts "$TRUSTED/scripts"
              cp -r .github/skills  "$TRUSTED/skills"
              cp -r eng/scripts     "$TRUSTED/eng-scripts"
              chmod -R a-w "$TRUSTED"
              echo "Trusted scripts copied to $TRUSTED"

              # Run Setup phase (branch checkout + PR merge)
              set +e
              pwsh -NoProfile .github/scripts/Review-PR.ps1 \
                -PRNumber "${PARAM_PR_NUMBER}" \
                -Platform "${{ parameters.Platform }}" \
                -Phase Setup \
                -TrustedScriptsDir "$TRUSTED" \
                -LogFile "$(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md"
              SETUP_EXIT=$?
              set -e

              if [ $SETUP_EXIT -ne 0 ]; then
                echo "##vso[task.logissue type=error]Setup phase failed with exit code $SETUP_EXIT"
                echo "##vso[task.setvariable variable=CopilotFailed]true"
              fi
            name: RunSetup
            displayName: 'Task 1: Setup (branch + merge)'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}

          # ─────────────────────────────────────────────────────────
          #  Task 2 — GATE: UI detection, test runs, regression,
          #  gate verification. GH_TOKEN is read-only here — needed
          #  by Detect-TestsInDiff.ps1 for PR metadata/label fetches.
          #  No COPILOT_GITHUB_TOKEN — the agent can't run here.
          # ─────────────────────────────────────────────────────────
          - bash: |
              echo "═══ TASK 2: GATE ═══"
              TRUSTED="$(Build.ArtifactStagingDirectory)/trusted-github"

              set +e
              pwsh -NoProfile "$TRUSTED/scripts/Review-PR.ps1" \
                -PRNumber "${PARAM_PR_NUMBER}" \
                -Platform "${{ parameters.Platform }}" \
                -Phase Gate \
                -TrustedScriptsDir "$TRUSTED" \
                -LogFile "$(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md"
              GATE_EXIT=$?
              set -e

              if [ $GATE_EXIT -ne 0 ]; then
                echo "##vso[task.logissue type=warning]Gate phase exited with code $GATE_EXIT"
                echo "##vso[task.setvariable variable=GateFailed]true"
              fi
            name: RunGate
            displayName: 'Task 2: Gate (test verification)'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}

          # ─────────────────────────────────────────────────────────
          #  Task 3 — COPILOT REVIEW: expert review + try-fix.
          #  env: COPILOT_GITHUB_TOKEN (for copilot agent).
          #  NO GH_TOKEN — the agent can't push or post comments.
          # ─────────────────────────────────────────────────────────
          - bash: |
              echo "═══ TASK 3: COPILOT REVIEW ═══"
              TRUSTED="$(Build.ArtifactStagingDirectory)/trusted-github"

              echo "Review platform: ${{ parameters.Platform }}"

              set +e
              pwsh -NoProfile "$TRUSTED/scripts/Review-PR.ps1" \
                -PRNumber "${PARAM_PR_NUMBER}" \
                -Platform "${{ parameters.Platform }}" \
                -Phase CopilotReview \
                -TrustedScriptsDir "$TRUSTED" \
                -LogFile "$(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md"
              REVIEW_EXIT=$?
              set -e

              if [ $REVIEW_EXIT -ne 0 ]; then
                echo "##vso[task.logissue type=error]CopilotReview phase failed with exit code $REVIEW_EXIT"
                echo "##vso[task.setvariable variable=CopilotFailed]true"
              fi
            name: RunReview
            displayName: 'Task 3: Copilot Review (expert review + try-fix)'
            env:
              COPILOT_GITHUB_TOKEN: $(COPILOT_TOKEN)
              DEVICE_UDID: $(DEVICE_UDID)
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}
              COMMENTS_VIA_FILE: "true"

          # ─────────────────────────────────────────────────────────
          #  Task 4 — POST: gate comment, AI summary, labels.
          #  env: GH_TOKEN (for posting comments).
          # ─────────────────────────────────────────────────────────
          - bash: |
              echo "═══ TASK 4: POST ═══"
              TRUSTED="$(Build.ArtifactStagingDirectory)/trusted-github"

              set +e
              pwsh -NoProfile "$TRUSTED/scripts/Review-PR.ps1" \
                -PRNumber "${PARAM_PR_NUMBER}" \
                -Platform "${{ parameters.Platform }}" \
                -Phase Post \
                -TrustedScriptsDir "$TRUSTED" \
                -LogFile "$(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md"
              POST_EXIT=$?
              set -e

              if [ $POST_EXIT -ne 0 ]; then
                echo "##vso[task.logissue type=error]Post phase failed with exit code $POST_EXIT"
                echo "##vso[task.setvariable variable=CopilotFailed]true"
              fi

              echo "Review output saved to $(Build.ArtifactStagingDirectory)/copilot-logs/"
            name: RunPost                       # Stage 3 (UpdateAISummaryComment) reads aiSummaryReviewId via $(stageDependencies.ReviewPR.CopilotReview.outputs['RunPost.aiSummaryReviewId']). Note: detectedCategories comes from RunGate, not RunPost.
            displayName: 'Task 4: Post (comments + labels)'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}
              DEFER_COMMENT_TO_STAGE3: "true"

          # Copy review artifacts into the CopilotLogs staging dir.
          # Uses pwsh (not bash) so paths resolve correctly on Windows.
          - pwsh: |
              $logsDir = "$(Build.ArtifactStagingDirectory)/copilot-logs"
              if (-not (Test-Path $logsDir)) { New-Item -ItemType Directory -Path $logsDir -Force | Out-Null }

              # CustomAgentLogsTmp (PRAgent content files for Stage 3 comment)
              if (Test-Path "CustomAgentLogsTmp") {
                Write-Host "Copying CustomAgentLogsTmp..."
                Copy-Item -Path "CustomAgentLogsTmp" -Destination $logsDir -Recurse -Force -ErrorAction SilentlyContinue
              } else {
                Write-Host "##[warning]CustomAgentLogsTmp not found — Stage 3 comment may be incomplete"
              }

              # agent-pr-session files
              if (Test-Path ".github/agent-pr-session") {
                Write-Host "Copying agent-pr-session..."
                Copy-Item -Path ".github/agent-pr-session" -Destination $logsDir -Recurse -Force -ErrorAction SilentlyContinue
              }

              # Review_Feedback files
              Get-ChildItem -Path . -Filter "Review_Feedback_*.md" -Recurse -ErrorAction SilentlyContinue |
                ForEach-Object { Copy-Item $_.FullName $logsDir -ErrorAction SilentlyContinue }

              Write-Host "Artifacts staged in $logsDir"
              Get-ChildItem $logsDir -Recurse -File | Select-Object -First 20 | ForEach-Object {
                Write-Host "  $($_.FullName.Substring($logsDir.Length))"
              }
            displayName: 'Copy review artifacts to staging'
            condition: succeededOrFailed()

          # Publish Copilot logs and session artifacts
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Copilot Logs'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/copilot-logs'
              artifact: 'CopilotLogs'
              publishLocation: 'pipeline'
            condition: succeededOrFailed()

          # Publish build logs if they exist
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Build Logs'
            inputs:
              targetPath: '$(LogDirectory)'
              artifact: 'BuildLogs'
              publishLocation: 'pipeline'
            condition: and(succeededOrFailed(), ne(variables['LogDirectory'], ''))

          # Fail the pipeline if any phase failed
          - bash: |
              FAILED=0
              if [ "$(CopilotFailed)" = "true" ]; then
                echo "##vso[task.logissue type=error]Copilot PR review failed. Check CopilotLogs artifact for details."
                FAILED=1
              fi
              if [ "$(GateFailed)" = "true" ]; then
                echo "##vso[task.logissue type=warning]Gate phase failed — test verification did not pass."
                FAILED=1
              fi
              exit $FAILED
            displayName: 'Check Review Result'
            condition: succeededOrFailed()

  # ─────────────────────────────────────────────────────────────────────────────
  #  STAGE: RunDeepUITests
  # ─────────────────────────────────────────────────────────────────────────────
  # After the Copilot review agent has detected UI test categories and posted
  # an initial AI summary review with in-process per-category results, this
  # stage re-runs those same categories on a real platform-appropriate pool
  # (Tahoe iOS sim / Ubuntu Android emu / Windows-2022 / macOS-14) instead of
  # whatever VM the Copilot agent happened to land on. Each category becomes
  # a sequential `BuildAndRunHostApp.ps1` invocation inside ONE job per
  # platform; we can't matrix-fan-out at runtime because matrix expansion is
  # compile-time in AzDO. The TRX files land in the drop-deep-uitests
  # artifact for the next stage to consume.
  #
  # Skipped via `condition:` when:
  #   - ReviewPR didn't emit detectedCategories (script crashed pre-STEP 2)
  #   - detectedCategories == 'NONE' (no UI-relevant changes)
  #
  # Note: this runs AFTER ReviewPR completes, not in parallel. Parallel
  # execution would require splitting STEP 2 (detection) into its own
  # pre-stage; that's a follow-up. The first cut is sequential to keep the
  # change small and incremental.
  - stage: RunDeepUITests
    displayName: 'Deep UI Tests (platform pool)'
    dependsOn: ReviewPR
    # Prefer AI-refreshed categories from CopilotReview (RunReview) when available,
    # falling back to Gate-detected categories (RunGate). RunReview is only set when
    # the Tier 3 AI refresh actually changed the categories; otherwise it's empty.
    condition: >-
      and(
        in(dependencies.ReviewPR.result, 'Succeeded', 'SucceededWithIssues', 'Failed'),
        ne(coalesce(dependencies.ReviewPR.outputs['CopilotReview.RunReview.detectedCategories'], dependencies.ReviewPR.outputs['CopilotReview.RunGate.detectedCategories']), ''),
        ne(coalesce(dependencies.ReviewPR.outputs['CopilotReview.RunReview.detectedCategories'], dependencies.ReviewPR.outputs['CopilotReview.RunGate.detectedCategories']), 'NONE')
      )
    jobs:
      - job: RunUITests
        displayName: 'Run detected UI test categories'
        variables:
          detectedCategories: $[ coalesce(stageDependencies.ReviewPR.CopilotReview.outputs['RunReview.detectedCategories'], stageDependencies.ReviewPR.CopilotReview.outputs['RunGate.detectedCategories']) ]
        # Use the SAME platform-pool selection logic as the CopilotReview
        # job — the deep-test agent should be the right OS for the
        # requested target platform.
        ${{ if eq(parameters.Platform, 'android') }}:
          pool: ${{ parameters.androidPool }}
        ${{ elseif eq(parameters.Platform, 'ios') }}:
          pool: ${{ parameters.iosPool }}
        ${{ elseif eq(parameters.Platform, 'catalyst') }}:
          pool: ${{ parameters.macPool }}
        ${{ elseif eq(parameters.Platform, 'windows') }}:
          pool: ${{ parameters.windowsPool }}
        ${{ else }}:
          pool: ${{ parameters.windowsPool }}
        timeoutInMinutes: 240
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: false

          # Bring in .NET + workloads + tasks DLL — same prerequisites the
          # CopilotReview job used. Reusing the install-dotnet template
          # keeps the SDK version pinned to global.json.
          - template: common/provision.yml
            parameters:
              skipXcode: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows'), eq(parameters.Platform, 'catalyst')) }}
              skipProvisionator: true
              skipJdk: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidCommonSdks: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidPlatformApis: true
              onlyAndroidPlatformDefaultApis: true
              skipAndroidEmulatorImages: ${{ ne(parameters.Platform, 'android') }}
              # AVD is created by the inline 'Create AVD and boot Android Emulator' script below
              # with specific config (playstore image variant, partition shrink, ADB key pre-auth)
              # that ProvisionAndroidSdkAvdCreateAvds doesn't replicate.
              skipAndroidCreateAvds: true
              androidEmulatorApiLevel: '30'
              skipSimulatorSetup: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows'), eq(parameters.Platform, 'catalyst')) }}
              skipCertificates: true
              ${{ if eq(parameters.Platform, 'catalyst') }}:
                openSslArgs: ''

          # Enable KVM for Android emulator on Linux agents (matches main CI)
          - ${{ if eq(parameters.Platform, 'android') }}:
            - template: common/enable-kvm.yml
            # Free disk space on hosted Ubuntu agents — the emulator + SDK +
            # workloads + AVD need ~15 GB but hosted agents start with limited
            # free space. Remove pre-installed tools we don't need.
            - bash: |
                echo "=== Disk before cleanup ==="
                df -h /
                sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /usr/local/share/boost /opt/ghc /usr/local/.ghcup \
                  /usr/share/swift /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/node \
                  /usr/local/lib/android/sdk/build-tools/[0-2]* /usr/local/lib/android/sdk/platforms/android-[0-2]* \
                  2>/dev/null || true
                sudo apt-get clean 2>/dev/null || true
                echo "=== Disk after cleanup ==="
                df -h /
              displayName: 'Free disk space for Android emulator'
            # Boot Android emulator with proper partition size and ADB setup.
            # Same step as ReviewPR stage — creates AVD, reduces partition to
            # 2048m (fits on hosted agents), pre-authorizes ADB keys, waits
            # for full boot + package manager. The emulator stays running for
            # BuildAndRunHostApp.ps1 which will find it via 'adb devices'.
            - script: |
                export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
                export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

                echo "=== Creating AVD ==="
                echo "no" | avdmanager create avd -n Emulator_30 -k "system-images;android-30;google_apis_playstore;x86_64" --device "Nexus 5X" --force
                AVD_CONFIG="$HOME/.android/avd/Emulator_30.avd/config.ini"
                [ -f "$AVD_CONFIG" ] && sed -i 's/disk.dataPartition.size=.*/disk.dataPartition.size=2048m/' "$AVD_CONFIG"

                mkdir -p "$HOME/.android"
                [ ! -f "$HOME/.android/adbkey" ] && adb keygen "$HOME/.android/adbkey" 2>/dev/null || true
                ADB_KEY_PUB="$HOME/.android/adbkey.pub"
                AVD_DIR="$HOME/.android/avd/Emulator_30.avd"
                [ -f "$ADB_KEY_PUB" ] && [ -d "$AVD_DIR" ] && cp "$ADB_KEY_PUB" "$AVD_DIR/adbkey.pub"

                # Kill ALL stale emulator processes from previous step retries
                for STALE_PID in $(pgrep -f "qemu-system" 2>/dev/null || true); do
                  echo "Killing stale emulator PID $STALE_PID"
                  kill "$STALE_PID" 2>/dev/null || true
                done
                sleep 2
                for STALE_PID in $(pgrep -f "qemu-system" 2>/dev/null || true); do
                  kill -9 "$STALE_PID" 2>/dev/null || true
                done

                adb kill-server 2>/dev/null || true; sleep 1; adb start-server
                nohup emulator -avd Emulator_30 -gpu swiftshader_indirect -no-window -no-snapshot -no-audio -no-boot-anim -partition-size 2048 > /tmp/emulator.log 2>&1 &
                echo "Emulator PID: $!"

                echo "Waiting for device..."
                timeout 120 adb wait-for-device || { echo "##[error]adb wait-for-device timed out"; tail -30 /tmp/emulator.log; exit 1; }

                echo "Waiting for boot_completed..."
                waited=0
                while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
                  sleep 5; waited=$((waited+5))
                  [ $waited -ge 300 ] && { echo "##[error]Boot timeout"; exit 1; }
                  [ $waited -eq 90 ] && { adb kill-server; sleep 2; adb start-server; sleep 2; }
                done

                echo "Waiting for package manager..."
                waited=0
                while ! adb shell pm list packages 2>/dev/null | grep -q "package:"; do
                  sleep 5; waited=$((waited+5))
                  [ $waited -ge 120 ] && { echo "##[error]PM timeout"; exit 1; }
                done

                DEVICE_ID=$(adb devices | grep "emulator.*device" | awk '{print $1}' | head -1)
                if [ -z "$DEVICE_ID" ]; then
                  DEVICE_ID="emulator-5554"
                  echo "##[warning]Could not detect device ID, defaulting to $DEVICE_ID"
                fi
                echo "✅ Emulator booted: $DEVICE_ID"
                adb -s $DEVICE_ID shell settings put global window_animation_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put global transition_animation_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put global animator_duration_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put system screen_off_timeout 2147483647 || true
                adb -s $DEVICE_ID shell svc power stayon true || true
                adb -s $DEVICE_ID shell input keyevent 82 || true
                adb -s $DEVICE_ID shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                echo "##vso[task.setvariable variable=DEVICE_UDID]$DEVICE_ID"
                echo "##vso[task.prependpath]$ANDROID_SDK_ROOT/platform-tools"
                echo "##vso[task.prependpath]$ANDROID_SDK_ROOT/emulator"
              displayName: 'Create AVD and Boot Android Emulator'
              retryCountOnTaskFailure: 3
              timeoutInMinutes: 15

          # ios-26 snapshot baselines were captured on iOS 26.4 (PR #35061).
          # Tahoe agents (macOS 26.4) have Xcode 26.3 which can download
          # iOS 26.4 simulator. provision.yml only installs 26.0 (for build).
          # Explicitly download 26.4 so visual tests match baselines exactly.
          - ${{ if eq(parameters.Platform, 'ios') }}:
            - script: |
                set -x
                echo "=== Current runtimes ==="
                xcrun simctl list runtimes

                echo "=== Trying to install iOS 26.4 ==="
                LATEST_XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
                if [ -n "$LATEST_XCODE" ]; then
                  echo "Using $LATEST_XCODE"
                  sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
                fi

                # Attempt 1: download latest iOS platform (no version specified)
                echo "--- Attempt 1: latest iOS ---"
                sudo xcodebuild -downloadPlatform iOS 2>&1 || true

                # Attempt 2: with universal architecture variant
                echo "--- Attempt 2: iOS 26.4 universal ---"
                sudo xcodebuild -downloadPlatform iOS -architectureVariant universal -buildVersion 26.4 2>&1 || true

                # Attempt 3: exact Apple build number
                echo "--- Attempt 3: build 23E244 ---"
                sudo xcodebuild -downloadPlatform iOS -buildVersion 23E244 2>&1 || true

                # Restore Xcode for build step
                RESTORE_XCODE=$(ls -d /Applications/Xcode_$(REQUIRED_XCODE)*.app 2>/dev/null | head -1)
                [ -n "$RESTORE_XCODE" ] && sudo xcode-select -s "$RESTORE_XCODE/Contents/Developer"

                echo "=== Final runtimes ==="
                xcrun simctl list runtimes
              displayName: 'Install iOS 26.4 simulator'
              continueOnError: true

          # Catalyst (MacCatalyst) runs directly on the Mac host — no device needed.
          # Mirrors main CI ui-tests-steps.yml: disable Notification Center
          # (intercepts UI interactions) and macOS text autocorrect.
          - ${{ if eq(parameters.Platform, 'catalyst') }}:
            - bash: |
                chmod +x $(System.DefaultWorkingDirectory)/eng/scripts/disable-notification-center.sh
                $(System.DefaultWorkingDirectory)/eng/scripts/disable-notification-center.sh
              displayName: 'Disable Notification Center'
              continueOnError: true
              timeoutInMinutes: 5

          # Disable macOS text autocorrect for iOS and Catalyst (mirrors main CI).
          # Autocapitalize/spellcheck can interfere with Appium text entry tests.
          - ${{ if or(eq(parameters.Platform, 'ios'), eq(parameters.Platform, 'catalyst')) }}:
            - task: PowerShell@2
              inputs:
                targetType: 'inline'
                script: |
                  defaults write -g NSAutomaticCapitalizationEnabled -bool false
                  defaults write -g NSAutomaticTextCompletionEnabled -bool false
                  defaults write -g NSAutomaticSpellingCorrectionEnabled -bool false
              displayName: 'Disable macOS text autocorrect'
              continueOnError: true

          # Windows UI tests run on the host desktop. Set screen resolution
          # to 1920x1080 (AzDO hosted agents default to 1024x768) so
          # controls are fully visible during Appium interactions.
          - ${{ if eq(parameters.Platform, 'windows') }}:
            - pwsh: |
                $scriptPath = Join-Path "$(System.DefaultWorkingDirectory)" "eng" "scripts" "Set-ScreenResolution.ps1"
                if (Test-Path $scriptPath) {
                  & $scriptPath -Width 1920 -Height 1080
                } else {
                  Write-Host "##[warning]Set-ScreenResolution.ps1 not found — using default resolution"
                }
              displayName: 'Set screen resolution (1920x1080)'
              continueOnError: true

          # Install .NET workloads (same as ReviewPR stage) — without this,
          # dotnet build fails with NETSDK1147 because the ios/android workloads
          # are not present after provision.yml (which only installs the SDK).
          - pwsh: ./build.ps1 --target=dotnet --configuration="Release" --verbosity=diagnostic
            displayName: 'Install .NET and workloads'
            retryCountOnTaskFailure: 2
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)

          - pwsh: echo "##vso[task.prependpath]$(DotNet.Dir)"
            displayName: 'Add .NET to PATH'

          - ${{ if eq(parameters.Platform, 'android') }}:
            - pwsh: |
                $sdk = $env:ANDROID_SDK_ROOT
                if (-not $sdk) { $sdk = $env:ANDROID_HOME }
                if (-not $sdk) { $sdk = "$env:HOME/Library/Android/sdk" }
                $pt = Join-Path $sdk "platform-tools"
                $em = Join-Path $sdk "emulator"
                Write-Host "Adding Android tools to PATH: $pt, $em"
                echo "##vso[task.prependpath]$pt"
                echo "##vso[task.prependpath]$em"
              displayName: 'Add Android SDK tools to PATH'

          - pwsh: ./build.ps1 --target=dotnet-buildtasks --configuration="Release" --verbosity=diagnostic
            displayName: 'Build MSBuild Tasks'
            retryCountOnTaskFailure: 1
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)

          # Install Node.js and Appium — required by the UITest.Appium
          # AppiumServerContext to boot a local Appium server. Same setup
          # the existing CopilotReview job uses (see lines 316-329 of this
          # file). Without these the test process throws
          # InvalidServerInstanceException("There is no installed nodes")
          # at the OneTimeSetUp boundary and ALL discovered tests fail.
          - task: UseNode@1
            inputs:
              version: "24.x"
            displayName: 'Install Node.js'

          - pwsh: |
              $skipAppiumDoctor = if ($IsMacOS -or $IsLinux) { "true" } else { "false" }
              dotnet build ./src/Provisioning/Provisioning.csproj -t:ProvisionAppium -p:SkipAppiumDoctor="$skipAppiumDoctor" -bl:"$(LogDirectory)/provision-appium.binlog"
            displayName: 'Install Appium'
            retryCountOnTaskFailure: 2
            timeoutInMinutes: 10
            env:
              APPIUM_HOME: $(APPIUM_HOME)

          - bash: |
              set -e
              git config user.email "copilot-ci@microsoft.com"
              git config user.name  "Copilot CI"
              # Merge the PR head commit so we run tests against the same
              # tree the Copilot reviewer saw. Mirror Review-PR.ps1 STEP 1
              # logic (squash-merge, fall back to head checkout on
              # conflict — but in the conflict case the ReviewPR stage
              # would have already failed and we wouldn't reach here).
              git fetch origin pull/${{ parameters.PRNumber }}/head:pr-${{ parameters.PRNumber }}
              git checkout -b deep-uitests-pr-${{ parameters.PRNumber }}
              git merge --squash pr-${{ parameters.PRNumber }} || {
                echo "Squash merge had conflicts — falling back to direct head checkout"
                git merge --abort 2>/dev/null || true
                git checkout pr-${{ parameters.PRNumber }}
              }
              git commit -m "PR ${{ parameters.PRNumber }} merge for deep UI tests" --allow-empty || true
            displayName: 'Merge PR for testing'

          # Bypass the iOS/MacCatalyst SDK's strict Xcode-version check.
          # Same patch the CopilotReview job performs (see lines ~571-580
          # of this file). Without it, .NET 10 iOS workload (which pins
          # to e.g. Xcode 26.0) refuses to build on agents that have
          # Xcode 26.1.1 selected — even though the produced app runs
          # fine on the simulator.
          - bash: |
              set -e
              if [ -f Directory.Build.Override.props.in ]; then
                cp Directory.Build.Override.props.in Directory.Build.Override.props
              fi
              if [ ! -f Directory.Build.Override.props ]; then
                printf '<?xml version="1.0" encoding="utf-8"?>\n<Project>\n</Project>\n' > Directory.Build.Override.props
              fi
              if [[ "$(uname)" == "Linux" ]]; then
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              elif [[ "$(uname)" == "Darwin" ]]; then
                sed -i '' 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              else
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              fi
              echo "===== Directory.Build.Override.props ====="
              cat Directory.Build.Override.props
            displayName: 'Disable Xcode version validation'

          - pwsh: |
              $ErrorActionPreference = 'Continue'
              $cats = "$(detectedCategories)"
              $platform = "${{ parameters.Platform }}"
              Write-Host "Detected categories from ReviewPR stage: $cats"
              Write-Host "Platform: $platform"

              if ([string]::IsNullOrWhiteSpace($cats) -or $cats -eq 'NONE') {
                Write-Host "Nothing to run — skipping"
                exit 0
              }

              $isRunAll = ($cats -eq 'ALL')
              if ($isRunAll) {
                Write-Host "Run-all mode detected — running without category filter"
                # Single-element list with empty string triggers one iteration
                # of the loop below without passing -Category to the runner.
                $catList = @('')
              } else {
                # Same per-category loop the in-process STEP 3 does, only
                # this time on a proper platform-pool agent. Each TRX lands
                # in its own subdir so the aggregator can split per category.
                $catList = @($cats -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
              }
              $outputRoot = "$(Build.ArtifactStagingDirectory)/deep-uitests"
              New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null

              # Dot-source the shared retry wrapper so Stage 2 gets the same
              # env-error detection, device recovery, and retry logic as Stage 1.
              $retryScript = ".github/scripts/shared/Invoke-UITestWithRetry.ps1"
              $hasRetryWrapper = Test-Path $retryScript

              $hadFailure = $false
              foreach ($cat in $catList) {
                $safeCat = if ([string]::IsNullOrEmpty($cat)) { 'ALL' } else { $cat -replace '[^A-Za-z0-9_.-]', '_' }
                $catDir = Join-Path $outputRoot "drop-${platform}_ui_tests-controls-$safeCat"
                New-Item -ItemType Directory -Force -Path $catDir | Out-Null
                $displayCat = if ([string]::IsNullOrEmpty($cat)) { '(all tests)' } else { $cat }
                Write-Host "============================================================"
                Write-Host " Running category: $displayCat (platform=$platform)"
                Write-Host "============================================================"
                $catLog = Join-Path $catDir "build-output.log"
                # Diagnostic: dump exact args before invocation so any quoting
                # issue or stray characters in the category value are visible
                # in the log.
                Write-Host "DEBUG: cat='$cat' (length=$($cat.Length))"
                Write-Host "DEBUG: platform='$platform' (length=$($platform.Length))"
                Write-Host "DEBUG: PWD='$(Get-Location)'"
                Write-Host "DEBUG: BuildAndRunHostApp.ps1 exists: $(Test-Path '.github/scripts/BuildAndRunHostApp.ps1')"
                try {
                  if ($hasRetryWrapper) {
                    # Use Invoke-UITestWithRetry for env-error retry + device recovery.
                    # Only pass -Category when we have a specific category (not run-all).
                    $retryParams = @{
                      Platform = $platform
                      RepoRoot = (Get-Location).Path
                      LogFile  = $catLog
                    }
                    if (-not [string]::IsNullOrEmpty($cat)) { $retryParams.Category = $cat }
                    if ($env:DEVICE_UDID) { $retryParams.DeviceUdid = $env:DEVICE_UDID }
                    $runResult = & $retryScript @retryParams
                    $exitCode = if ($runResult) { $runResult.ExitCode } else { -1 }
                    Write-Host "Attempts: $(if ($runResult) { $runResult.Attempts } else { '?' }) · Exit: $exitCode · EnvError: $(if ($runResult) { $runResult.EnvErrorHit } else { 'N/A' })"

                    # Copy the specific TRX file from the result into the category dir
                    if ($runResult -and $runResult.TrxResultFile -and (Test-Path $runResult.TrxResultFile)) {
                      $dest = Join-Path $catDir (Split-Path -Leaf $runResult.TrxResultFile)
                      if (-not (Test-Path $dest)) { Copy-Item $runResult.TrxResultFile $dest -ErrorAction SilentlyContinue }
                    }

                    if ($exitCode -ne 0) {
                      Write-Host "Category $cat exited with code $exitCode" -ForegroundColor Yellow
                      $hadFailure = $true
                    }
                  } else {
                    # Fallback: call BuildAndRunHostApp.ps1 directly
                    $argList = @(
                      '-NoProfile',
                      '-File', '.github/scripts/BuildAndRunHostApp.ps1',
                      '-Platform', $platform
                    )
                    if (-not [string]::IsNullOrEmpty($cat)) {
                      $argList += @('-Category', $cat)
                    }
                    if ($env:DEVICE_UDID) {
                      $argList += @('-DeviceUdid', $env:DEVICE_UDID)
                    }
                    Write-Host "DEBUG: invoking pwsh with args: $($argList -join ' | ')"
                    & pwsh @argList 2>&1 | Tee-Object -FilePath $catLog | ForEach-Object { Write-Host $_ }
                    if ($LASTEXITCODE -ne 0) {
                      Write-Host "Category $cat exited with code $LASTEXITCODE" -ForegroundColor Yellow
                      $hadFailure = $true
                    }
                  }
                } catch {
                  Write-Host "Test runner threw: $_" -ForegroundColor Red
                  $hadFailure = $true
                }
                # If the retry wrapper didn't produce a TRX (or we used fallback),
                # scan the TRX results directory for this category's TRX only.
                # Use filename matching instead of a time-based filter to avoid
                # picking up TRX files from other categories or missing slow runs.
                $existingTrx = @(Get-ChildItem -Path $catDir -Filter "*.trx" -ErrorAction SilentlyContinue)
                if ($existingTrx.Count -eq 0) {
                  # Look for TRX by category name pattern in common output locations
                  $trxSearchDirs = @(".", "TestResults", "src/Controls/tests/TestCases.Shared.Tests/TestResults")
                  foreach ($searchDir in $trxSearchDirs) {
                    if (Test-Path $searchDir) {
                      $found = Get-ChildItem -Path $searchDir -Filter "*$safeCat*.trx" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                      if ($found) {
                        $dest = Join-Path $catDir $found.Name
                        if (-not (Test-Path $dest)) { Copy-Item $found.FullName $dest -ErrorAction SilentlyContinue }
                        break
                      }
                    }
                  }
                }

                # Capture snapshot-diff PNGs that VisualRegressionTester writes
                # to $BUILD_ARTIFACTSTAGINGDIRECTORY/Controls.TestCases.Shared.Tests/snapshots-diff
                # (see ui-tests-collect-snapshot-diffs.yml for reference impl).
                # Move them into the per-category folder so they ship in the
                # drop-deep-uitests artifact alongside the TRX. Move (not copy)
                # so the next category's run starts with a clean diff folder.
                $snapDiffSrc = Join-Path "$(Build.ArtifactStagingDirectory)" "Controls.TestCases.Shared.Tests/snapshots-diff"
                if (Test-Path $snapDiffSrc) {
                  $snapDiffDest = Join-Path $catDir "snapshots-diff"
                  Write-Host "Moving snapshot-diffs from $snapDiffSrc -> $snapDiffDest"
                  Move-Item -Path $snapDiffSrc -Destination $snapDiffDest -Force -ErrorAction SilentlyContinue
                }
              }

              if ($hadFailure) {
                # Don't fail the stage — the AI summary review is the
                # deliverable; failed tests get reported there. Stage-level
                # failure would prevent the UpdateAISummaryComment stage
                # from running.
                Write-Host "##vso[task.logissue type=warning]One or more deep UI test categories failed (see TRX in drop-deep-uitests artifact)"
              }
              exit 0
            displayName: 'Run deep UI tests (per-category loop)'
            timeoutInMinutes: 220

          # Re-enable Notification Center after Catalyst tests (mirrors main CI cleanup)
          - ${{ if eq(parameters.Platform, 'catalyst') }}:
            - bash: |
                chmod +x $(System.DefaultWorkingDirectory)/eng/scripts/enable-notification-center.sh
                $(System.DefaultWorkingDirectory)/eng/scripts/enable-notification-center.sh
              displayName: 'Re-enable Notification Center'
              condition: succeededOrFailed()
              continueOnError: true
              timeoutInMinutes: 5

          - task: PublishPipelineArtifact@1
            displayName: 'Publish drop-deep-uitests'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/deep-uitests'
              artifact: 'drop-deep-uitests'
              publishLocation: 'pipeline'
            condition: succeededOrFailed()

  # ─────────────────────────────────────────────────────────────────────────────
  #  STAGE: PostAISummaryComment
  # ─────────────────────────────────────────────────────────────────────────────
  # Final stage. Depends on both ReviewPR (which posted the initial AI
  # summary review and emitted aiSummaryReviewId) and RunDeepUITests
  # (which produced the TRX artifacts on the right pool). Downloads the
  # artifacts, parses them via Aggregate-UITestArtifacts.ps1, and edits
  # the existing PR review to replace the in-process STEP 3 section
  # with the deep-test results.
  - stage: UpdateAISummaryComment
    displayName: 'Post AI Summary Review'
    dependsOn:
      - ReviewPR
      - RunDeepUITests
    condition: and(in(dependencies.RunDeepUITests.result, 'Succeeded', 'SucceededWithIssues', 'Failed', 'Skipped'), or(ne(dependencies.ReviewPR.outputs['CopilotReview.RunPost.aiSummaryReviewId'], ''), in(dependencies.RunDeepUITests.result, 'Succeeded', 'SucceededWithIssues', 'Failed')))
    jobs:
      - job: UpdateComment
        displayName: 'Post AI summary review with deep test results'
        # Job-level variables can use $[ stageDependencies... ] (cross-stage,
        # job context). The stage condition above already gated emptiness;
        # this just makes the value available as $(aiSummaryReviewId)
        # inside the steps.
        variables:
          aiSummaryReviewId: $[ stageDependencies.ReviewPR.CopilotReview.outputs['RunPost.aiSummaryReviewId'] ]
        pool:
          name: Azure Pipelines
          vmImage: ubuntu-22.04
        timeoutInMinutes: 30
        steps:
          - checkout: self
            persistCredentials: false

          - task: DownloadPipelineArtifact@2
            displayName: 'Download CopilotLogs'
            inputs:
              buildType: 'current'
              artifactName: 'CopilotLogs'
              targetPath: '$(Pipeline.Workspace)/CopilotLogs'
            # Continue if ReviewPR crashed before publishing CopilotLogs —
            # the DEFERRED fallback can still post deep test results alone.
            continueOnError: true

          - task: DownloadPipelineArtifact@2
            displayName: 'Download drop-deep-uitests'
            inputs:
              buildType: 'current'
              artifactName: 'drop-deep-uitests'
              targetPath: '$(Pipeline.Workspace)/drop-deep-uitests'
            # Always attempt download — continueOnError handles the case where
            # RunDeepUITests was skipped and no artifact exists. The previous
            # condition-based skip using deepTestsRan was unreliable because
            # AzDO's $[ in() ] expression can return unexpected values depending
            # on stage result propagation timing.
            continueOnError: true

          - pwsh: |
              $ErrorActionPreference = 'Continue'
              $artDir = "$(Pipeline.Workspace)/drop-deep-uitests"
              $copilotLogsDir = "$(Pipeline.Workspace)/CopilotLogs"
              $prNumber = "${{ parameters.PRNumber }}"
              $reviewId = "$(aiSummaryReviewId)"
              $isDeferred = ([string]::IsNullOrWhiteSpace($reviewId) -or $reviewId -eq 'DEFERRED')

              # Diagnostic logging for Stage 3 debugging
              Write-Host "=== Stage 3 Diagnostics ===" -ForegroundColor Cyan
              Write-Host "  reviewId: '$reviewId'"
              Write-Host "  isDeferred: $isDeferred"
              Write-Host "  artDir exists: $(Test-Path $artDir)"
              Write-Host "  copilotLogsDir exists: $(Test-Path $copilotLogsDir)"
              if (Test-Path $artDir) {
                $trxCount = @(Get-ChildItem -Path $artDir -Filter "*.trx" -Recurse -ErrorAction SilentlyContinue).Count
                Write-Host "  TRX files in artDir: $trxCount"
                Get-ChildItem -Path $artDir -Recurse -ErrorAction SilentlyContinue | Select-Object -First 10 | ForEach-Object {
                  Write-Host "    $($_.FullName.Substring($artDir.Length))" -ForegroundColor Gray
                }
              }

              if ([string]::IsNullOrWhiteSpace($reviewId)) {
                # Reviewer crashed before posting the initial review. If deep
                # tests produced results, fall back to DEFERRED mode to post
                # a degraded review with test results only.
                if (Test-Path $artDir) {
                  Write-Host "No AI summary review ID but deep test artifacts exist — falling back to DEFERRED mode"
                  $reviewId = 'DEFERRED'
                  $isDeferred = $true
                } else {
                  Write-Host "No AI summary review ID and no deep test artifacts — nothing to do"
                  exit 0
                }
              }

              # Aggregator returns @{ category -> @{ Total/Passed/Failed/.../Results } }
              # using the SAME shape the in-process STEP 3 renderer expects
              # so we can reuse the markdown generation pattern directly.
              $aggScript = ".github/scripts/shared/Aggregate-UITestArtifacts.ps1"
              if (-not (Test-Path $aggScript)) { throw "$aggScript missing" }

              # Dot-source shared functions (no Invoke-Expression)
              . .github/scripts/shared/Get-TrxResults.ps1
              . .github/scripts/shared/Get-CategoryFromArtifactName.ps1
              . .github/scripts/shared/Get-AggregatedTrxFromDirectory.ps1
              $byCat = Get-AggregatedTrxFromDirectory -RootDir $artDir
              if (-not $byCat -or $byCat.Count -eq 0) {
                Write-Host "Aggregator returned no categories"
                # No deep test results — but in DEFERRED mode we still need to
                # post the review-only comment (without deep section).
              }

              $deepBlock = ''
              if ($byCat -and $byCat.Count -gt 0) {

              # Render the new STEP 3 section.
              $totalPassed = 0; $totalFailed = 0
              $setupFailureCategories = 0; $setupImpactedTests = 0; $emptyCategories = 0
              $sb = [System.Text.StringBuilder]::new()
              [void]$sb.AppendLine()
              [void]$sb.AppendLine("### 🧪 UI Test Execution Results (deep, platform pool)")
              [void]$sb.AppendLine()
              [void]$sb.AppendLine("| Category | Tests | Snapshot diffs |")
              [void]$sb.AppendLine("|---|---|---|")
              $perCategoryFailures = [ordered]@{}
              $perCategorySetupFailures = [ordered]@{}
              foreach ($k in ($byCat.Keys | Sort-Object)) {
                $b = $byCat[$k]
                $totalPassed += [int]$b.Passed
                $totalFailed += [int]$b.Failed
                $tCount = [int]$b.Total
                $tPass  = [int]$b.Passed
                $tFail  = [int]$b.Failed
                $isSetupFailure = ($b.ContainsKey('SetupFailure') -and [bool]$b.SetupFailure)
                if ($isSetupFailure) {
                  $setupFailureCategories++
                  $setupImpactedTests += [int]$b.SetupFailureCount
                }
                if ($tCount -eq 0) {
                  $emptyCategories++
                }
                $col = if ($tCount -eq 0) { '0 tests' }
                       elseif ($isSetupFailure) { "$tPass/$tCount (setup failed; $tFail marked failed)" }
                       elseif ($tFail -gt 0) { "$tPass/$tCount ($tFail ❌)" }
                       else { "$tPass/$tCount ✓" }
                # Count snapshot-diff PNGs we shipped in this artifact subdir
                $catDir = Join-Path $artDir $b.ArtifactName
                $diffCount = 0
                if (Test-Path $catDir) {
                  $diffCount = @(Get-ChildItem -Path $catDir -Filter "*-diff.png" -Recurse -ErrorAction SilentlyContinue).Count
                }
                $diffCol = if ($diffCount -gt 0) { "$diffCount diff PNG$(if ($diffCount -eq 1) {'' } else {'s'})" } else { '—' }
                [void]$sb.AppendLine("| ``$k`` | $col | $diffCol |")

                # Capture failed test entries from the parsed TRX so we can
                # render a per-category disclosure section listing the actual
                # failing test names + the first line of their error message.
                if ($isSetupFailure) {
                  $perCategorySetupFailures[$k] = [pscustomobject]@{
                    Count          = [int]$b.SetupFailureCount
                    Message        = $b.SetupFailureMessage -as [string]
                    Stack          = $b.SetupFailureStack -as [string]
                    SignatureCount = [int]$b.SetupFailureSignatureCount
                  }
                  continue
                }
                $catFailed = @()
                foreach ($r in @($b.Results)) {
                  if ($r.status -eq 'Failed') {
                    $catFailed += [pscustomobject]@{
                      Name  = $r.name
                      Error = $r.error -as [string]
                      Stack = $r.stack -as [string]
                    }
                  }
                }
                if ($catFailed.Count -gt 0) {
                  $perCategoryFailures[$k] = $catFailed
                }
              }

              # Fixture setup failures usually mark every test in the fixture as
              # failed even though no individual test body ran. Render one
              # representative setup error instead of dozens of duplicate tests.
              if ($perCategorySetupFailures.Count -gt 0) {
                [void]$sb.AppendLine()
                foreach ($cat in $perCategorySetupFailures.Keys) {
                  $info = $perCategorySetupFailures[$cat]
                  $setupCount = [int]$info.Count
                  $setupTestText = if ($setupCount -eq 1) { '1 test' } else { "$setupCount tests" }
                  [void]$sb.AppendLine("<details><summary>⚠️ <code>$cat</code> — fixture setup failed for $setupTestText</summary>")
                  [void]$sb.AppendLine("<br/>")
                  [void]$sb.AppendLine()
                  [void]$sb.AppendLine("NUnit reported a `OneTimeSetUp`/fixture setup failure before test bodies ran; the TRX marked each affected test failed.")
                  if ([int]$info.SignatureCount -gt 1) {
                    [void]$sb.AppendLine()
                    [void]$sb.AppendLine("_Multiple setup failure signatures were present; showing the first one. See the TRX artifact for all details._")
                  }
                  $errText = if (-not [string]::IsNullOrWhiteSpace($info.Message)) { $info.Message.Trim() } else { '' }
                  $stackText = if (-not [string]::IsNullOrWhiteSpace($info.Stack)) { $info.Stack.Trim() } else { '' }
                  $combined = $errText
                  if ($stackText) { $combined = $combined + [Environment]::NewLine + $stackText }
                  if ($combined.Length -gt 1500) { $combined = $combined.Substring(0, 1500) + [Environment]::NewLine + '...' }
                  if ($combined) {
                    [void]$sb.AppendLine()
                    $fence = [string]::new([char]96, 3)
                    [void]$sb.AppendLine($fence)
                    [void]$sb.AppendLine($combined)
                    [void]$sb.AppendLine($fence)
                  }
                  [void]$sb.AppendLine()
                  [void]$sb.AppendLine("</details>")
                  [void]$sb.AppendLine()
                }
              }

              # Per-category failed-test disclosure sections (collapsed by
              # default to keep the comment compact).
              if ($perCategoryFailures.Count -gt 0) {
                [void]$sb.AppendLine()
                foreach ($cat in $perCategoryFailures.Keys) {
                  $items = $perCategoryFailures[$cat]
                  [void]$sb.AppendLine("<details><summary>❌ <code>$cat</code> — $($items.Count) failed test$(if ($items.Count -eq 1) {''} else {'s'})</summary>")
                  [void]$sb.AppendLine("<br/>")
                  [void]$sb.AppendLine()
                  foreach ($it in $items | Select-Object -First 30) {
                    $errText = if (-not [string]::IsNullOrWhiteSpace($it.Error)) { $it.Error.Trim() } else { '' }
                    $stackText = if (-not [string]::IsNullOrWhiteSpace($it.Stack)) { $it.Stack.Trim() } else { '' }
                    $combined = $errText
                    if ($stackText) { $combined = $combined + [Environment]::NewLine + $stackText }
                    if ($combined.Length -gt 1000) { $combined = $combined.Substring(0, 1000) + [Environment]::NewLine + '...' }
                    [void]$sb.AppendLine("<details><summary><code>$($it.Name)</code></summary>")
                    [void]$sb.AppendLine('<br/>')
                    [void]$sb.AppendLine()
                    if ($combined) {
                      $fence = [string]::new([char]96, 3)
                      [void]$sb.AppendLine($fence)
                      [void]$sb.AppendLine($combined)
                      [void]$sb.AppendLine($fence)
                    }
                    [void]$sb.AppendLine()
                    [void]$sb.AppendLine("</details>")
                    [void]$sb.AppendLine()
                  }
                  if ($items.Count -gt 30) {
                    [void]$sb.AppendLine("_(+$($items.Count - 30) more — see TRX in artifact)_")
                    [void]$sb.AppendLine()
                  }
                  [void]$sb.AppendLine("</details>")
                  [void]$sb.AppendLine()
                }
              }

              # Link to the published artifact so reviewers can download the
              # snapshot-diff PNGs to triage visual regressions.
              $buildId = "$(Build.BuildId)"
              $orgUri  = "$(System.CollectionUri)".TrimEnd('/')
              $project = "$(System.TeamProject)"
              $artifactUrl = "$orgUri/$project/_build/results?buildId=$buildId&view=artifacts&pathAsName=false&type=publishedArtifacts"
              [void]$sb.AppendLine("📎 [Download ``drop-deep-uitests`` artifact (TRX + snapshot diffs)]($artifactUrl)")
              [void]$sb.AppendLine()

              $resultIcon = if ($totalFailed -gt 0) { '❌' } elseif ($totalPassed -gt 0) { '✅' } else { '⏭️' }
              $categoryText = if ($byCat.Count -eq 1) { '1 category' } else { "$($byCat.Count) categories" }
              $regularFailed = [Math]::Max(0, $totalFailed - $setupImpactedTests)
              if ($setupFailureCategories -gt 0) {
                $setupCategoryText = if ($setupFailureCategories -eq 1) { '1 category setup failure' } else { "$setupFailureCategories category setup failures" }
                $setupImpactedText = if ($setupImpactedTests -eq 1) { '1 impacted test' } else { "$setupImpactedTests impacted tests" }
                if ($regularFailed -eq 0) {
                  $headerLine = "$resultIcon **Deep UI tests** — $totalPassed passed; $setupCategoryText ($setupImpactedText marked failed by TRX) across $categoryText on platform-pool agent (replaces in-process counts above)."
                } else {
                  $headerLine = "$resultIcon **Deep UI tests** — $totalPassed passed, $regularFailed failed, plus $setupCategoryText ($setupImpactedText marked failed by TRX) across $categoryText on platform-pool agent (replaces in-process counts above)."
                }
              } else {
                $headerLine = "$resultIcon **Deep UI tests** — $totalPassed passed, $totalFailed failed across $categoryText on platform-pool agent (replaces in-process counts above)."
              }
              if ($emptyCategories -gt 0) {
                $emptyText = if ($emptyCategories -eq 1) { '1 category reported 0 tests.' } else { "$emptyCategories categories reported 0 tests." }
                $headerLine = "$headerLine $emptyText"
              }

              $beginMarker = '<!-- DEEP_UITESTS_BEGIN -->'
              $endMarker   = '<!-- DEEP_UITESTS_END -->'
              $deepBlock   = "$beginMarker" + [Environment]::NewLine + "$headerLine" + [Environment]::NewLine + $sb.ToString() + "$endMarker"
              } # end if ($byCat.Count -gt 0)

              if ($isDeferred) {
                # Keep deferred mode even if a prior AI Summary exists. The
                # posting script preserves current-run artifacts, hides stale
                # generated comments/reviews, then posts a fresh summary review.
                Write-Host "Deferred AI Summary posting will hide stale generated artifacts before posting"
              }

              if ($isDeferred) {
                # ── DEFERRED MODE (first run): Post full review ──
                # Find the PRAgent content dir from CopilotLogs artifact
                $prAgentDir = Get-ChildItem -Path $copilotLogsDir -Recurse -Directory -Filter "PRAgent" | Select-Object -First 1
                if (-not $prAgentDir) {
                  Write-Host "PRAgent directory not found in CopilotLogs — falling back to posting deep results only"
                } else {
                  # Replace in-process results with deep results in uitests/content.md (if available)
                  if ($deepBlock) {
                    $uitestContent = Join-Path $prAgentDir.FullName "uitests/content.md"
                    if (Test-Path $uitestContent) {
                      $existing = Get-Content $uitestContent -Raw
                      # Strip in-process "SKIPPED" section — search for the header
                      $idx = -1
                      foreach ($marker in @('UI Test Execution Results', 'SKIPPED')) {
                        $found = $existing.IndexOf($marker)
                        if ($found -gt 0) {
                          # Back up to start of line
                          $lineStart = $existing.LastIndexOf([char]10, $found)
                          if ($lineStart -lt 0) { $lineStart = 0 } else { $lineStart++ }
                          $idx = $lineStart
                          break
                        }
                      }
                      if ($idx -gt 0) {
                        $existing = $existing.Substring(0, $idx).TrimEnd()
                      }
                      $existing = ($existing -split [Environment]::NewLine | Where-Object {
                        $_ -notmatch 'DEEP_UITESTS_BEGIN|DEEP_UITESTS_END'
                      }) -join [Environment]::NewLine
                      ($existing.TrimEnd() + [Environment]::NewLine + [Environment]::NewLine + $deepBlock) | Set-Content $uitestContent -Encoding UTF8
                      Write-Host "Replaced in-process results with deep results"
                    }
                  } else {
                    Write-Host "No deep results — posting review-only summary"
                  }

                  # Copy PRAgent dir to expected location for post-ai-summary-comment.ps1
                  $targetDir = "CustomAgentLogsTmp/PRState/$prNumber/PRAgent"
                  New-Item -ItemType Directory -Force -Path (Split-Path -Parent $targetDir) | Out-Null
                  Copy-Item -Path $prAgentDir.FullName -Destination $targetDir -Recurse -Force

                  # Post the full review
                  $postScript = ".github/scripts/post-ai-summary-comment.ps1"
                  if (Test-Path $postScript) {
                    Write-Host "Posting full AI summary review with deep results..."
                    $output = & $postScript -PRNumber $prNumber
                    $output | ForEach-Object { Write-Host $_ }
                    Write-Host "✅ Full AI summary review posted with deep results"
                  }

                  # Apply labels
                  $labelScript = ".github/scripts/shared/Update-AgentLabels.ps1"
                  if (Test-Path $labelScript) {
                    try {
                      . $labelScript
                      Apply-AgentLabels -PRNumber $prNumber -RepoRoot (Get-Location).Path
                      Write-Host "✅ Labels applied"
                    } catch {
                      Write-Host "⚠️ Label application failed: $_"
                    }
                  }
                }
              } else {
                # ── PATCH MODE: Update existing review with deep results ──
                if (-not $deepBlock) {
                  Write-Host "No deep results and review already exists — nothing to patch"
                  exit 0
                }
                $existing = (gh api "repos/dotnet/maui/pulls/$prNumber/reviews/$reviewId" --jq '.body') -join [Environment]::NewLine
                if ([string]::IsNullOrWhiteSpace($existing)) {
                  Write-Host "Could not fetch review body — aborting"
                  exit 0
                }

                $beginIdx = $existing.IndexOf($beginMarker)
                $endIdx   = $existing.IndexOf($endMarker)
                if ($beginIdx -ge 0 -and $endIdx -gt $beginIdx) {
                  $before = $existing.Substring(0, $beginIdx).TrimEnd()
                  $after  = $existing.Substring($endIdx + $endMarker.Length).TrimStart()
                  $newBody = $before + ([Environment]::NewLine + [Environment]::NewLine) + $deepBlock + $(if ($after) { ([Environment]::NewLine + [Environment]::NewLine) + $after } else { "" })
                } else {
                  $cleaned = $existing -split [Environment]::NewLine | Where-Object {
                    $_ -notmatch '^\s*[❌✅⏭️]\s*\*\*Deep UI tests\*\*'
                  }
                  $cleanedBody = ($cleaned -join [Environment]::NewLine)
                  $legacyMarker = '### 🧪 UI Test Execution Results'
                  $idx = $cleanedBody.IndexOf($legacyMarker)
                  $newBody = if ($idx -ge 0) {
                    $cleanedBody.Substring(0, $idx).TrimEnd() + ([Environment]::NewLine + [Environment]::NewLine) + $deepBlock
                  } else {
                    $cleanedBody.TrimEnd() + ([Environment]::NewLine + [Environment]::NewLine) + $deepBlock
                  }
                }

                $tmp = New-TemporaryFile
                @{ body = $newBody } | ConvertTo-Json -Depth 4 -Compress | Set-Content $tmp -Encoding UTF8
                gh api -X PATCH "repos/dotnet/maui/pulls/$prNumber/reviews/$reviewId" --input $tmp.FullName | Out-Null
                Write-Host "✅ Patched review $reviewId with deep UI test results ($totalPassed/$($totalPassed + $totalFailed))"
              }
            displayName: 'Post AI summary review'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)

  - stage: CleanupReviewLock
    displayName: 'Cleanup review lock'
    dependsOn:
      - ReviewPR
      - RunDeepUITests
      - UpdateAISummaryComment
    condition: always()
    jobs:
      - job: CleanupReviewLock
        displayName: 'Remove PR review in-progress label'
        pool:
          name: Azure Pipelines
          vmImage: ubuntu-22.04
        timeoutInMinutes: 5
        steps:
          - bash: |
              set -euo pipefail

              PR_NUM="${PARAM_PR_NUMBER}"
              if ! [[ "${PR_NUM}" =~ ^[1-9][0-9]*$ ]]; then
                echo "Skipping lock cleanup; invalid PR number: '${PR_NUM}'"
                exit 0
              fi

              echo "Removing s/agent-review-in-progress from PR #${PR_NUM} if present..."
              gh api \
                --method DELETE \
                "repos/dotnet/maui/issues/${PR_NUM}/labels/s%2Fagent-review-in-progress" >/dev/null 2>&1 || true
            displayName: 'Remove in-progress label'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)
              PARAM_PR_NUMBER: ${{ parameters.PRNumber }}
