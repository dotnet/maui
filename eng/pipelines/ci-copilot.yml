# Pipeline for running GitHub Copilot PR Reviewer Agent
# This pipeline installs the Copilot CLI and invokes the PR reviewer agent
# to conduct automated code reviews on pull requests.
#
# For more information, see:
# https://github.com/dotnet/maui/wiki/PR-Reviewer-Agent

trigger: none  # Manual trigger only

pr: none  # Not triggered by PRs

parameters:
  - name: PRNumber
    displayName: 'Pull Request Number'
    type: string
    default: ''

  - name: Platform
    displayName: 'Target Platform'
    type: string
    default: 'android'
    values:
      - android
      - ios
      - catalyst
      - windows

  - name: androidPool
    type: object
    default:
      name: Azure Pipelines
      vmImage: ubuntu-22.04

  - name: iosPool
    type: object
    default:
      name: AcesShared

  - name: macPool
    type: object
    default:
      name: AcesShared

  - name: windowsPool
    type: object
    default:
      name: Azure Pipelines
      vmImage: windows-2022

variables:
  - template: /eng/pipelines/common/variables.yml@self
  - name: Codeql.Enabled
    value: false
  - name: Codeql.SkipTaskAutoInjection
    value: true
  - name: APPIUM_HOME
    value: $(System.DefaultWorkingDirectory)/.appium/
  - name: LogDirectory
    value: $(Build.ArtifactStagingDirectory)/logs

stages:
  - stage: ReviewPR
    displayName: 'Review Pull Request'
    jobs:
      - job: CopilotReview
        displayName: 'Run Copilot PR Reviewer Agent'
        ${{ if eq(parameters.Platform, 'android') }}:
          pool: ${{ parameters.androidPool }}
        ${{ elseif eq(parameters.Platform, 'ios') }}:
          pool: ${{ parameters.iosPool }}
        ${{ elseif eq(parameters.Platform, 'catalyst') }}:
          pool: ${{ parameters.macPool }}
        ${{ elseif eq(parameters.Platform, 'windows') }}:
          pool: ${{ parameters.windowsPool }}
        ${{ else }}:
          pool: ${{ parameters.windowsPool }}  # fallback — should not be reached; AzDO parameter validation prevents unknown values
        timeoutInMinutes: 360
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true

          # Validate Parameters
          - bash: |
              echo "Validating PR Number parameter..."
              if [ -z "${{ parameters.PRNumber }}" ]; then
                echo "##vso[task.logissue type=error]PRNumber parameter is required"
                exit 1
              fi
              echo "PR Number: ${{ parameters.PRNumber }}"
            displayName: 'Validate Parameters'

          - bash: |
              echo "##vso[build.updatebuildnumber]PR ${{ parameters.PRNumber }} ${{ parameters.Platform }}"
            displayName: 'Set Pipeline Run Title'

          # Enable KVM for Android emulator on Linux (same as ui-tests-steps.yml / device-tests-steps.yml)
          - ${{ if eq(parameters.Platform, 'android') }}:
            - template: common/enable-kvm.yml

          # Provision SDKs (same parameters as ui-tests-steps.yml)
          - template: common/provision.yml
            parameters:
              skipXcode: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows')) }}
              skipProvisionator: true
              skipJdk: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidCommonSdks: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidPlatformApis: true
              onlyAndroidPlatformDefaultApis: true
              skipAndroidEmulatorImages: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidCreateAvds: true
              androidEmulatorApiLevel: '30'
              skipSimulatorSetup: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows'), eq(parameters.Platform, 'catalyst')) }}
              skipCertificates: true

          # Install .NET and workloads via build.ps1
          - pwsh: ./build.ps1 --target=dotnet --configuration="Release" --verbosity=diagnostic
            displayName: 'Install .NET and workloads'
            retryCountOnTaskFailure: 2
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)

          - pwsh: echo "##vso[task.prependpath]$(DotNet.Dir)"
            displayName: 'Add .NET to PATH'

          # Build MSBuild tasks (required for MAUI builds)
          - pwsh: ./build.ps1 --target=dotnet-buildtasks --configuration="Release" --verbosity=diagnostic
            displayName: 'Build MSBuild Tasks'
            retryCountOnTaskFailure: 1
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)
            
          # Restore .NET tools (includes xharness)
          - bash: dotnet tool restore
            displayName: 'Restore .NET Tools'

          # Set screen resolution on Windows (same as ui-tests-steps.yml)
          - ${{ if eq(parameters.Platform, 'windows') }}:
            - pwsh: |
                $scriptPath = Join-Path "$(System.DefaultWorkingDirectory)" "eng" "scripts" "Set-ScreenResolution.ps1"
                & $scriptPath -Width 1920 -Height 1080
              displayName: 'Set screen resolution'

          # Create AVD and boot Android Emulator
          - ${{ if eq(parameters.Platform, 'android') }}:
            # Free disk space on hosted agents (emulator needs ~7GB for userdata partition)
            - script: |
                echo "=== Disk space before cleanup ==="
                df -h /home
                echo "Removing unnecessary tools to free space..."
                sudo rm -rf /usr/share/dotnet /usr/local/share/powershell /usr/local/share/chromium 2>/dev/null || true
                sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/go /opt/hostedtoolcache/Python 2>/dev/null || true
                sudo rm -rf /usr/share/swift 2>/dev/null || true
                echo "=== Disk space after cleanup ==="
                df -h /home
              displayName: 'Free Disk Space for Emulator'

            - script: |
                export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
                export PATH="$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"

                echo "=== Creating AVD ==="
                echo "no" | avdmanager create avd -n Emulator_30 -k "system-images;android-30;google_apis_playstore;x86_64" --device "Nexus 5X" --force
                
                # Reduce userdata partition to fit on hosted agents (~4.2GB free)
                AVD_CONFIG="$HOME/.android/avd/Emulator_30.avd/config.ini"
                if [ -f "$AVD_CONFIG" ]; then
                  sed -i 's/disk.dataPartition.size=.*/disk.dataPartition.size=2048m/' "$AVD_CONFIG"
                  echo "Updated disk.dataPartition.size to 2048m"
                fi

                # Pre-authorize ADB keys (mirrors android.cake HandleVirtualDevice)
                echo "=== Pre-authorizing ADB keys ==="
                mkdir -p "$HOME/.android"
                if [ ! -f "$HOME/.android/adbkey" ]; then
                  adb keygen "$HOME/.android/adbkey" 2>/dev/null || true
                fi
                ADB_KEY_PUB="$HOME/.android/adbkey.pub"
                AVD_DIR="$HOME/.android/avd/Emulator_30.avd"
                if [ -f "$ADB_KEY_PUB" ] && [ -d "$AVD_DIR" ]; then
                  cp "$ADB_KEY_PUB" "$AVD_DIR/adbkey.pub"
                  echo "ADB key pre-authorized for emulator"
                fi
                
                echo "=== Starting Emulator ==="
                # Kill any stale adb server and restart
                adb kill-server 2>/dev/null || true
                sleep 1
                adb start-server
                
                # Retry loop: emulator sometimes fails to connect ADB on first launch
                MAX_LAUNCH_ATTEMPTS=2
                EMULATOR_PID=""
                for LAUNCH_ATTEMPT in $(seq 1 $MAX_LAUNCH_ATTEMPTS); do
                  echo "--- Emulator launch attempt $LAUNCH_ATTEMPT of $MAX_LAUNCH_ATTEMPTS ---"

                  if [ $LAUNCH_ATTEMPT -gt 1 ]; then
                    echo "Cleaning up before retry..."
                    if [ -n "$EMULATOR_PID" ] && kill -0 "$EMULATOR_PID" 2>/dev/null; then
                      kill "$EMULATOR_PID" 2>/dev/null || true
                      sleep 2
                      kill -0 "$EMULATOR_PID" 2>/dev/null && kill -9 "$EMULATOR_PID" 2>/dev/null || true
                    fi
                    sleep 3
                    adb kill-server 2>/dev/null || true
                    sleep 2
                    adb start-server
                    sleep 2
                  fi

                  nohup emulator -avd Emulator_30 -gpu swiftshader_indirect -no-window -no-snapshot -no-audio -no-boot-anim -partition-size 2048 > /tmp/emulator.log 2>&1 &
                  EMULATOR_PID=$!
                  echo "Emulator PID: $EMULATOR_PID"
                  
                  echo "Waiting for emulator device (adb wait-for-device, 120s timeout)..."
                  timeout 120 adb wait-for-device
                  if [ $? -eq 0 ]; then
                    echo "Device detected: $(adb devices -l | grep emulator)"
                    break
                  fi

                  echo "##vso[task.logissue type=warning]adb wait-for-device timed out (attempt $LAUNCH_ATTEMPT)"
                  adb devices -l
                  tail -30 /tmp/emulator.log

                  if [ $LAUNCH_ATTEMPT -eq $MAX_LAUNCH_ATTEMPTS ]; then
                    echo "##vso[task.logissue type=error]Emulator failed to connect after $MAX_LAUNCH_ATTEMPTS attempts"
                    exit 1
                  fi
                done

                timeout=300
                waited=0
                while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
                  sleep 5
                  waited=$((waited + 5))
                  if [ $waited -ge $timeout ]; then
                    echo "##vso[task.logissue type=error]Emulator did not finish booting after ${timeout}s"
                    exit 1
                  fi
                  # At 90 seconds, restart ADB server to recover from auth issues (mirrors android.cake)
                  if [ $waited -eq 90 ]; then
                    echo "Boot taking longer than expected (90/${timeout}s). Restarting ADB server..."
                    adb kill-server 2>/dev/null || true
                    sleep 2
                    adb start-server
                    sleep 2
                    echo "ADB server restarted. Continuing to wait..."
                  fi
                  # Re-ensure ADB keys every 60s during boot (mirrors android.cake PrepareDevice)
                  if [ $((waited % 60)) -eq 0 ] && [ $waited -gt 0 ]; then
                    if [ -f "$ADB_KEY_PUB" ] && [ -d "$AVD_DIR" ]; then
                      cp "$ADB_KEY_PUB" "$AVD_DIR/adbkey.pub" 2>/dev/null || true
                    fi
                  fi
                done
                echo "Boot completed, waiting for package manager..."

                timeout=120
                waited=0
                while ! adb shell pm list packages 2>/dev/null | grep -q "package:"; do
                  sleep 5
                  waited=$((waited + 5))
                  if [ $waited -ge $timeout ]; then
                    echo "##vso[task.logissue type=error]Package manager not ready after ${timeout}s"
                    exit 1
                  fi
                done

                DEVICE_ID=$(adb devices | grep "emulator.*device" | awk '{print $1}')
                echo "✅ Emulator fully booted: $DEVICE_ID"

                # Prepare emulator for CI use — keeps device responsive during idle period
                echo "=== Preparing emulator for CI ==="
                # Wait for device to stabilize after boot (transient offline state)
                DEVICE_READY=false
                for i in $(seq 1 20); do
                  if adb -s $DEVICE_ID shell echo ok 2>/dev/null | grep -q ok; then
                    DEVICE_READY=true
                    break
                  fi
                  echo "Device offline, retrying ($i/20)..."
                  sleep 5
                done

                if [ "$DEVICE_READY" = false ]; then
                  echo "##vso[task.logissue type=error]Emulator went offline after boot — device not responsive after 100s"
                  exit 1
                fi

                # Disable all animations (reduces CPU load and flakiness)
                adb -s $DEVICE_ID shell settings put global window_animation_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put global transition_animation_scale 0.0 || true
                adb -s $DEVICE_ID shell settings put global animator_duration_scale 0.0 || true
                # Prevent screen from turning off (emulator simulates AC charging)
                adb -s $DEVICE_ID shell settings put system screen_off_timeout 2147483647 || true
                adb -s $DEVICE_ID shell svc power stayon true || true
                # Wake screen and dismiss any lock screen
                adb -s $DEVICE_ID shell input keyevent 82 || true
                sleep 1
                # Dismiss any "System UI has stopped" or crash dialogs
                adb -s $DEVICE_ID shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                # Clear logcat buffer so agent sees only fresh logs
                adb -s $DEVICE_ID logcat -c 2>/dev/null || true
                echo "Emulator preparation complete"

                echo "##vso[task.setvariable variable=DEVICE_UDID]$DEVICE_ID"
                echo "##vso[task.prependpath]$ANDROID_SDK_ROOT/platform-tools"
                echo "##vso[task.prependpath]$ANDROID_SDK_ROOT/emulator"
              displayName: 'Create AVD and Boot Android Emulator'
              retryCountOnTaskFailure: 3
              timeoutInMinutes: 15

          # Install Node.js and Appium (same as ui-tests-steps.yml)
          - task: UseNode@1
            inputs:
              version: "24.x"
            displayName: 'Install Node.js'

          - pwsh: |
              $skipAppiumDoctor = if ($IsMacOS -or $IsLinux) { "true" } else { "false" }
              dotnet build ./src/Provisioning/Provisioning.csproj -t:ProvisionAppium -p:SkipAppiumDoctor="$skipAppiumDoctor" -bl:"$(LogDirectory)/provision-appium.binlog"
            displayName: 'Install Appium'
            retryCountOnTaskFailure: 2
            timeoutInMinutes: 10
            env:
              APPIUM_HOME: $(APPIUM_HOME)

          - bash: |
              echo "Installing GitHub CLI..."
              # gh is pre-installed on Azure Pipelines hosted images (ubuntu, macOS, windows)
              # Attempt upgrade if available, otherwise install
              if command -v gh &> /dev/null; then
                echo "GitHub CLI already installed: $(gh --version | head -1)"
              elif command -v brew &> /dev/null; then
                brew install gh
              else
                echo "##vso[task.logissue type=error]GitHub CLI not found and no package manager available"
                exit 1
              fi
              gh --version
              echo "GitHub CLI ready"
            displayName: 'Install GitHub CLI'

          - bash: |
              echo "Authenticating with GitHub CLI..."
              if [ -z "$GH_TOKEN" ]; then
                echo "##vso[task.logissue type=error]GH_TOKEN env var (from pipeline variable GH_COMMENT_TOKEN) is not set. Please configure the pipeline variable."
                exit 1
              fi
              gh auth status
              if [ $? -ne 0 ]; then
                echo "$GH_TOKEN" | gh auth login --with-token 2>/dev/null || true
                if ! gh auth status; then
                  echo "##vso[task.logissue type=error]GitHub CLI authentication failed"
                  exit 1
                fi
              fi
              echo "GitHub CLI authenticated successfully"
            displayName: 'Authenticate GitHub CLI'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)

          - bash: |
              echo "Installing GitHub Copilot CLI..."
              npm install -g @github/copilot
              # Ensure npm global bin is on PATH for subsequent steps (Linux UseNode installs to toolcache)
              COPILOT_BIN_DIR=$(dirname "$(which copilot)")
              echo "Copilot binary at: $COPILOT_BIN_DIR/copilot"
              echo "##vso[task.prependpath]$COPILOT_BIN_DIR"
              copilot --version || true
              echo "Copilot CLI installed successfully"
            displayName: 'Install GitHub Copilot CLI'


          # Boot iOS Simulator (only for iOS platform)
          # Match main CI ui-tests pipeline: defaultiOSVersion: '26.0'
          # Snapshots are at src/Controls/tests/TestCases.iOS.Tests/snapshots/ios-26
          # UITest.cs picks ios-26 baseline when platformVersion starts with "26."
          - bash: |
              echo "=== Booting iOS Simulator ==="
              
              # Prefer iOS 26 (main pipeline default), fallback to 18.x then 17.x
              RUNTIME=$(xcrun simctl list runtimes available --json | jq -r '
                [.runtimes[] | select(.name | test("iOS 26"))] | sort_by(.version) | last | .identifier // empty
              ')
              if [ -z "$RUNTIME" ]; then
                RUNTIME=$(xcrun simctl list runtimes available --json | jq -r '
                  [.runtimes[] | select(.name | test("iOS 18"))] | sort_by(.version) | last | .identifier // empty
                ')
              fi
              if [ -z "$RUNTIME" ]; then
                RUNTIME=$(xcrun simctl list runtimes available --json | jq -r '
                  [.runtimes[] | select(.name | test("iOS 17"))] | sort_by(.version) | last | .identifier // empty
                ')
              fi
              echo "Selected iOS runtime: $RUNTIME"
              
              # Look for iPhone Xs (matches UI test baselines - required for snapshot tests)
              UDID=$(xcrun simctl list devices available --json | jq -r --arg rt "$RUNTIME" '
                .devices[$rt] // [] |
                map(select(.name == "iPhone Xs")) |
                .[0].udid // empty
              ')
              
              # If iPhone Xs doesn't exist, try iPhone 11 Pro (same 1125×2436 resolution)
              if [ -z "$UDID" ]; then
                UDID=$(xcrun simctl list devices available --json | jq -r --arg rt "$RUNTIME" '
                  .devices[$rt] // [] |
                  map(select(.name == "iPhone 11 Pro")) |
                  .[0].udid // empty
                ')
                if [ -n "$UDID" ]; then
                  echo "Found existing iPhone 11 Pro (same resolution as iPhone Xs): $UDID"
                fi
              else
                echo "Found existing iPhone Xs: $UDID"
              fi
              
              # If neither exists, try to create them
              if [ -z "$UDID" ]; then
                echo "No matching device found - attempting to create one for runtime $RUNTIME..."
                
                # Try iPhone Xs first
                UDID=$(xcrun simctl create "iPhone Xs" com.apple.CoreSimulator.SimDeviceType.iPhone-Xs "$RUNTIME" 2>&1)
                if [ $? -ne 0 ]; then
                  echo "iPhone Xs device type unavailable: $UDID"
                  # Try iPhone 11 Pro (same 1125×2436 resolution)
                  UDID=$(xcrun simctl create "iPhone 11 Pro" com.apple.CoreSimulator.SimDeviceType.iPhone-11-Pro "$RUNTIME" 2>&1)
                  if [ $? -ne 0 ]; then
                    echo "##vso[task.logissue type=warning]Failed to create iPhone 11 Pro: $UDID"
                    # Last resort: first available iPhone
                    UDID=$(xcrun simctl list devices available --json | jq -r '
                      .devices | to_entries |
                      map(.value) | flatten |
                      map(select(.name | test("iPhone"))) |
                      .[0].udid
                    ')
                  else
                    echo "Created iPhone 11 Pro simulator: $UDID"
                  fi
                else
                  echo "Created iPhone Xs simulator: $UDID"
                fi
              fi
              
              if [ -z "$UDID" ]; then
                echo "##vso[task.logissue type=error]No iOS simulator found"
                exit 1
              fi
              
              # Shutdown any other booted simulators to avoid Appium connecting to wrong device
              xcrun simctl list devices booted --json | jq -r '
                .devices | to_entries | map(.value) | flatten |
                map(select(.state == "Booted" and .udid != "'"$UDID"'")) |
                .[].udid
              ' | while read OTHER_UDID; do
                echo "Shutting down other simulator: $OTHER_UDID"
                xcrun simctl shutdown "$OTHER_UDID" 2>/dev/null || true
              done
              
              echo "Booting simulator: $UDID"
              xcrun simctl boot "$UDID" 2>/dev/null || echo "Simulator may already be booted"
              sleep 10
              
              echo "Booted simulators:"
              xcrun simctl list devices booted
              
              echo "##vso[task.setvariable variable=DEVICE_UDID]$UDID"
              echo "iOS Simulator UDID: $UDID"
            displayName: 'Boot iOS Simulator'
            condition: eq('${{ parameters.Platform }}', 'ios')
            timeoutInMinutes: 5

          # Warm up the emulator right before the agent runs.
          # The emulator may have been idle for 15-30 min while Appium/Node/CLI were installed.
          # Without this, SystemUI can ANR when the agent first touches it.
          - bash: |
              set -e
              DEVICE_ID="$(DEVICE_UDID)"
              if [ -z "$DEVICE_ID" ]; then
                echo "No DEVICE_UDID set — skipping warmup"
                exit 0
              fi

              echo "=== Emulator warmup before agent ==="
              # Verify device is still connected
              if ! adb -s "$DEVICE_ID" shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
                echo "Device not responding. Restarting ADB server..."
                adb kill-server 2>/dev/null || true
                sleep 2
                adb start-server
                sleep 2
                timeout 60 adb wait-for-device
              fi

              # Dismiss ANR dialogs and wake screen — run twice for reliability
              for PASS in 1 2; do
                echo "--- Warmup pass $PASS ---"
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_WAKEUP 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_MENU 2>/dev/null || true
                sleep 1

                # Dismiss system dialogs (ANR, crash, etc.)
                adb -s "$DEVICE_ID" shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_ENTER 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_BACK 2>/dev/null || true
                sleep 1
              done

              # Check for lingering ANR in window state
              if adb -s "$DEVICE_ID" shell dumpsys window 2>/dev/null | grep -qi "Application Not Responding\|ANR"; then
                echo "⚠️  ANR dialog still present — force-dismissing with HOME + BACK"
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_HOME 2>/dev/null || true
                sleep 2
                adb -s "$DEVICE_ID" shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
                adb -s "$DEVICE_ID" shell input keyevent KEYCODE_BACK 2>/dev/null || true
                sleep 1
              fi

              # Open and close Settings to exercise the system and confirm responsiveness
              adb -s "$DEVICE_ID" shell am start -a android.settings.SETTINGS 2>/dev/null || true
              sleep 3
              adb -s "$DEVICE_ID" shell am force-stop com.android.settings 2>/dev/null || true

              # Final dialog sweep
              adb -s "$DEVICE_ID" shell am broadcast -a android.intent.action.CLOSE_SYSTEM_DIALOGS 2>/dev/null || true
              adb -s "$DEVICE_ID" shell input keyevent KEYCODE_BACK 2>/dev/null || true

              # Clear logcat so agent gets clean logs
              adb -s "$DEVICE_ID" logcat -c 2>/dev/null || true

              echo "✅ Emulator warmed up and responsive"
            displayName: 'Warm Up Android Emulator'
            condition: and(succeeded(), eq('${{ parameters.Platform }}', 'android'))
            timeoutInMinutes: 3

          - bash: |
              echo "Running Copilot PR Reviewer Agent via Review-PR.ps1..."
              echo "Reviewing PR #${{ parameters.PRNumber }}..."
              # Ensure copilot CLI is accessible to pwsh subprocess.
              # npm global install on Linux goes to UseNode@1 toolcache path which may not
              # be on PATH inside pwsh even when exported from bash. Create a symlink in
              # /usr/local/bin (Unix) or verify PATH (Windows).
              if [[ "$(uname -o 2>/dev/null || uname -s)" == *"Msys"* ]] || [[ "$(uname -o 2>/dev/null || uname -s)" == *"Windows"* ]] || [[ "$(uname -o 2>/dev/null || uname -s)" == *"MINGW"* ]]; then
                # Windows (Git Bash): npm global bin is usually already on PATH
                echo "Windows detected — verifying copilot is on PATH..."
                COPILOT_PATH=$(which copilot 2>/dev/null || true)
                echo "copilot location: ${COPILOT_PATH:-not found}"
                if [ -z "$COPILOT_PATH" ]; then
                  echo "##vso[task.logissue type=error]copilot CLI not found on PATH. Failing early."
                  exit 1
                fi
              else
                # Linux/macOS: symlink to /usr/local/bin
                COPILOT_PATH=$(which copilot 2>/dev/null || find /opt/hostedtoolcache/node -name copilot -type f 2>/dev/null | head -1)
                if [ -n "$COPILOT_PATH" ] && [ ! -f /usr/local/bin/copilot ]; then
                  sudo ln -sf "$COPILOT_PATH" /usr/local/bin/copilot
                  echo "Symlinked copilot to /usr/local/bin/copilot"
                fi
                COPILOT_PATH=$(which copilot 2>/dev/null || true)
                echo "copilot location: ${COPILOT_PATH:-not found}"
                if [ -z "$COPILOT_PATH" ]; then
                  echo "##vso[task.logissue type=error]copilot CLI not found on PATH. Failing early."
                  exit 1
                fi
              fi
              # Verify pwsh can find it
              pwsh -NoProfile -c 'Write-Host "pwsh sees copilot at: $(Get-Command copilot -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)"'
              
              # Configure git identity (required for merge operations on self-hosted agents)
              git config user.email "copilot-ci@microsoft.com"
              git config user.name "Copilot CI"
              echo "Git identity configured"
              
              # Create Directory.Build.Override.props to skip Xcode version check (not needed on Windows)
              cp Directory.Build.Override.props.in Directory.Build.Override.props
              if [[ "$(uname)" == "Linux" ]]; then
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              elif [[ "$(uname)" == "Darwin" ]]; then
                sed -i '' 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              else
                # Windows (Git Bash) — GNU sed, same as Linux
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              fi
              
              # Create artifacts directory for Copilot outputs
              mkdir -p $(Build.ArtifactStagingDirectory)/copilot-logs
              
              # Invoke the PR reviewer using our PowerShell script
              # The script will merge the PR into the current branch
              # -PostSummaryComment and -RunFinalize handle posting comments
              set +e
              pwsh -NoProfile .github/scripts/Review-PR.ps1 -PRNumber ${{ parameters.PRNumber }} -Platform ${{ parameters.Platform }} -LogFile "$(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md"
              COPILOT_EXIT_CODE=$?
              set -e
              
              echo "Review-PR.ps1 exit code: $COPILOT_EXIT_CODE"
              
              # Terminate any orphaned copilot CLI processes that could hold this step's
              # stdout fd open and prevent the bash step from exiting.
              # Only target processes whose command line includes the copilot CLI path.
              echo "Cleaning up orphaned copilot processes..."
              SELF_PID=$$
              for proc in $(pgrep -f "[c]opilot" 2>/dev/null || true); do
                if [ -n "$proc" ] && [ "$proc" != "$SELF_PID" ]; then
                  PROC_CMD=$(ps -p "$proc" -o args= 2>/dev/null || true)
                  if echo "$PROC_CMD" | grep -q "copilot"; then
                    echo "  Stopping copilot process $proc: $PROC_CMD"
                    kill "$proc" 2>/dev/null || true
                  fi
                fi
              done
              
              # Copy any Copilot session files
              if [ -d "$HOME/.copilot" ]; then
                echo "Copying Copilot session state..."
                cp -r "$HOME/.copilot" $(Build.ArtifactStagingDirectory)/copilot-logs/copilot-session-state || true
              fi
              
              # Copy CustomAgentLogsTmp if it exists
              if [ -d "CustomAgentLogsTmp" ]; then
                echo "Copying CustomAgentLogsTmp..."
                cp -r CustomAgentLogsTmp $(Build.ArtifactStagingDirectory)/copilot-logs/ || true
              fi
              
              # Copy any Review_Feedback files
              find . -name "Review_Feedback_*.md" -type f -exec cp {} $(Build.ArtifactStagingDirectory)/copilot-logs/ \; 2>/dev/null || true
              
              # Copy any .github/agent-pr-session files
              if [ -d ".github/agent-pr-session" ]; then
                echo "Copying agent-pr-session..."
                cp -r .github/agent-pr-session $(Build.ArtifactStagingDirectory)/copilot-logs/ || true
              fi
              
              # Check for failure indicators in output
              if [ $COPILOT_EXIT_CODE -ne 0 ]; then
                echo "##vso[task.logissue type=error]Review-PR.ps1 exited with code $COPILOT_EXIT_CODE"
                # Don't exit yet - let artifacts be published first
                echo "##vso[task.setvariable variable=CopilotFailed]true"
              fi
              
              # Check output for common failure patterns
              if grep -qi "error\|failed\|exception" $(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md 2>/dev/null; then
                if grep -qi "simulator.*not\|emulator.*not\|workload.*not\|sdk.*not found" $(Build.ArtifactStagingDirectory)/copilot-logs/copilot_review_output.md 2>/dev/null; then
                  echo "##vso[task.logissue type=warning]Copilot encountered environment issues. Check artifacts for details."
                fi
              fi
              
              echo "Review output saved to $(Build.ArtifactStagingDirectory)/copilot-logs/"
            name: RunReview                       # referenceable name so the new RunDeepUITests / UpdateAISummaryComment stages can read this step's output variables (detectedCategories, detectedPlatform) via $(stageDependencies.ReviewPR.CopilotReview.outputs['RunReview.<var>'])
            displayName: 'Run PR Reviewer Agent'
            env:
              COPILOT_GITHUB_TOKEN: $(COPILOT_TOKEN)
              GH_TOKEN: $(GH_COMMENT_TOKEN)
              DEVICE_UDID: $(DEVICE_UDID)
              COMMENTS_VIA_FILE: "true"

          # Publish Copilot logs and session artifacts
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Copilot Logs'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/copilot-logs'
              artifact: 'CopilotLogs'
              publishLocation: 'pipeline'
            condition: succeededOrFailed()

          # Publish build logs if they exist
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Build Logs'
            inputs:
              targetPath: '$(LogDirectory)'
              artifact: 'BuildLogs'
              publishLocation: 'pipeline'
            condition: and(succeededOrFailed(), ne(variables['LogDirectory'], ''))

          # Fail the pipeline if Copilot failed
          - bash: |
              if [ "$(CopilotFailed)" = "true" ]; then
                echo "##vso[task.logissue type=error]Copilot PR review failed. Check CopilotLogs artifact for details."
                exit 1
              fi
            displayName: 'Check Copilot Result'
            condition: succeededOrFailed()

  # ─────────────────────────────────────────────────────────────────────────────
  #  STAGE: RunDeepUITests
  # ─────────────────────────────────────────────────────────────────────────────
  # After the Copilot review agent has detected UI test categories and posted
  # an initial AI summary comment with in-process per-category results, this
  # stage re-runs those same categories on a real platform-appropriate pool
  # (Tahoe iOS sim / Ubuntu Android emu / Windows-2022 / macOS-14) instead of
  # whatever VM the Copilot agent happened to land on. Each category becomes
  # a sequential `BuildAndRunHostApp.ps1` invocation inside ONE job per
  # platform; we can't matrix-fan-out at runtime because matrix expansion is
  # compile-time in AzDO. The TRX files land in the drop-deep-uitests
  # artifact for the next stage to consume.
  #
  # Skipped via `condition:` when:
  #   - ReviewPR didn't emit detectedCategories (script crashed pre-STEP 2)
  #   - detectedCategories == 'NONE' (no UI-relevant changes)
  #
  # Note: this runs AFTER ReviewPR completes, not in parallel. Parallel
  # execution would require splitting STEP 2 (detection) into its own
  # pre-stage; that's a follow-up. The first cut is sequential to keep the
  # change small and incremental.
  - stage: RunDeepUITests
    displayName: 'Deep UI Tests (platform pool)'
    dependsOn: ReviewPR
    # IMPORTANT: stage-level conditions use `dependencies.<stage>.outputs[<job>.<step>.<var>]`,
    # NOT `stageDependencies.<stage>.<job>.outputs[<step>.<var>]` (the latter
    # form only works for JOB-level conditions / variables). Mismatching this
    # path causes the condition to evaluate against an unset variable and
    # silently skip the stage even when the upstream output WAS emitted.
    condition: and(in(dependencies.ReviewPR.result, 'Succeeded', 'SucceededWithIssues'), ne(dependencies.ReviewPR.outputs['CopilotReview.RunReview.detectedCategories'], ''), ne(dependencies.ReviewPR.outputs['CopilotReview.RunReview.detectedCategories'], 'NONE'))
    jobs:
      - job: RunUITests
        displayName: 'Run detected UI test categories'
        # Within a JOB (cross-stage), the lookup is via stageDependencies.
        # variables defined at job level can use $[ stageDependencies... ]
        # but at stage level they'd need $[ dependencies... ].
        variables:
          detectedCategories: $[ stageDependencies.ReviewPR.CopilotReview.outputs['RunReview.detectedCategories'] ]
        # Use the SAME platform-pool selection logic as the CopilotReview
        # job — the deep-test agent should be the right OS for the
        # requested target platform.
        ${{ if eq(parameters.Platform, 'android') }}:
          pool: ${{ parameters.androidPool }}
        ${{ elseif eq(parameters.Platform, 'ios') }}:
          pool: ${{ parameters.iosPool }}
        ${{ elseif eq(parameters.Platform, 'catalyst') }}:
          pool: ${{ parameters.macPool }}
        ${{ elseif eq(parameters.Platform, 'windows') }}:
          pool: ${{ parameters.windowsPool }}
        ${{ else }}:
          pool: ${{ parameters.windowsPool }}
        timeoutInMinutes: 240
        steps:
          - checkout: self
            fetchDepth: 0

          # Bring in .NET + workloads + tasks DLL — same prerequisites the
          # CopilotReview job used. Reusing the install-dotnet template
          # keeps the SDK version pinned to global.json.
          - template: common/provision.yml
            parameters:
              skipXcode: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows')) }}
              skipProvisionator: true
              skipJdk: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidCommonSdks: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidPlatformApis: true
              onlyAndroidPlatformDefaultApis: true
              skipAndroidEmulatorImages: ${{ ne(parameters.Platform, 'android') }}
              skipAndroidCreateAvds: true
              androidEmulatorApiLevel: '30'
              skipSimulatorSetup: ${{ or(eq(parameters.Platform, 'android'), eq(parameters.Platform, 'windows'), eq(parameters.Platform, 'catalyst')) }}
              skipCertificates: true

          # Install .NET workloads (same as ReviewPR stage) — without this,
          # dotnet build fails with NETSDK1147 because the ios/android workloads
          # are not present after provision.yml (which only installs the SDK).
          - pwsh: ./build.ps1 --target=dotnet --configuration="Release" --verbosity=diagnostic
            displayName: 'Install .NET and workloads'
            retryCountOnTaskFailure: 2
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)

          - pwsh: echo "##vso[task.prependpath]$(DotNet.Dir)"
            displayName: 'Add .NET to PATH'

          - pwsh: ./build.ps1 --target=dotnet-buildtasks --configuration="Release" --verbosity=diagnostic
            displayName: 'Build MSBuild Tasks'
            retryCountOnTaskFailure: 1
            env:
              DOTNET_TOKEN: $(dotnetbuilds-internal-container-read-token)
              PRIVATE_BUILD: $(PrivateBuild)

          # Install Node.js and Appium — required by the UITest.Appium
          # AppiumServerContext to boot a local Appium server. Same setup
          # the existing CopilotReview job uses (see lines 316-329 of this
          # file). Without these the test process throws
          # InvalidServerInstanceException("There is no installed nodes")
          # at the OneTimeSetUp boundary and ALL discovered tests fail.
          - task: UseNode@1
            inputs:
              version: "24.x"
            displayName: 'Install Node.js'

          - pwsh: |
              $skipAppiumDoctor = if ($IsMacOS -or $IsLinux) { "true" } else { "false" }
              dotnet build ./src/Provisioning/Provisioning.csproj -t:ProvisionAppium -p:SkipAppiumDoctor="$skipAppiumDoctor" -bl:"$(LogDirectory)/provision-appium.binlog"
            displayName: 'Install Appium'
            retryCountOnTaskFailure: 2
            timeoutInMinutes: 10
            env:
              APPIUM_HOME: $(APPIUM_HOME)

          - bash: |
              set -e
              git config user.email "copilot-ci@microsoft.com"
              git config user.name  "Copilot CI"
              # Merge the PR head commit so we run tests against the same
              # tree the Copilot reviewer saw. Mirror Review-PR.ps1 STEP 1
              # logic (squash-merge, fall back to head checkout on
              # conflict — but in the conflict case the ReviewPR stage
              # would have already failed and we wouldn't reach here).
              git fetch origin pull/${{ parameters.PRNumber }}/head:pr-${{ parameters.PRNumber }}
              git checkout -b deep-uitests-pr-${{ parameters.PRNumber }}
              git merge --squash pr-${{ parameters.PRNumber }} || {
                echo "Squash merge had conflicts — falling back to direct head checkout"
                git merge --abort 2>/dev/null || true
                git checkout pr-${{ parameters.PRNumber }}
              }
              git commit -m "PR ${{ parameters.PRNumber }} merge for deep UI tests" --allow-empty || true
            displayName: 'Merge PR for testing'

          # Bypass the iOS/MacCatalyst SDK's strict Xcode-version check.
          # Same patch the CopilotReview job performs (see lines ~571-580
          # of this file). Without it, .NET 10 iOS workload (which pins
          # to e.g. Xcode 26.0) refuses to build on agents that have
          # Xcode 26.1.1 selected — even though the produced app runs
          # fine on the simulator.
          - bash: |
              set -e
              if [ -f Directory.Build.Override.props.in ]; then
                cp Directory.Build.Override.props.in Directory.Build.Override.props
              fi
              if [ ! -f Directory.Build.Override.props ]; then
                printf '<?xml version="1.0" encoding="utf-8"?>\n<Project>\n</Project>\n' > Directory.Build.Override.props
              fi
              if [[ "$(uname)" == "Linux" ]]; then
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              elif [[ "$(uname)" == "Darwin" ]]; then
                sed -i '' 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              else
                sed -i 's|</Project>|  <PropertyGroup><ValidateXcodeVersion>false</ValidateXcodeVersion></PropertyGroup>\n</Project>|' Directory.Build.Override.props
              fi
              echo "===== Directory.Build.Override.props ====="
              cat Directory.Build.Override.props
            displayName: 'Disable Xcode version validation'

          - pwsh: |
              $ErrorActionPreference = 'Continue'
              $cats = "$(detectedCategories)"
              $platform = "${{ parameters.Platform }}"
              Write-Host "Detected categories from ReviewPR stage: $cats"
              Write-Host "Platform: $platform"

              if ([string]::IsNullOrWhiteSpace($cats) -or $cats -eq 'NONE') {
                Write-Host "Nothing to run — skipping"
                exit 0
              }

              # Same per-category loop the in-process STEP 3 does, only
              # this time on a proper platform-pool agent. Each TRX lands
              # in its own subdir so the aggregator can split per category.
              $catList = @($cats -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
              $outputRoot = "$(Build.ArtifactStagingDirectory)/deep-uitests"
              New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null

              $hadFailure = $false
              foreach ($cat in $catList) {
                $safeCat = $cat -replace '[^A-Za-z0-9_.-]', '_'
                $catDir = Join-Path $outputRoot "drop-${platform}_ui_tests-controls-$safeCat"
                New-Item -ItemType Directory -Force -Path $catDir | Out-Null
                Write-Host "============================================================"
                Write-Host " Running category: $cat (platform=$platform)"
                Write-Host "============================================================"
                $catLog = Join-Path $catDir "build-output.log"
                # Diagnostic: dump exact args before invocation so any quoting
                # issue or stray characters in the category value are visible
                # in the log.
                Write-Host "DEBUG: cat='$cat' (length=$($cat.Length))"
                Write-Host "DEBUG: platform='$platform' (length=$($platform.Length))"
                Write-Host "DEBUG: PWD='$(Get-Location)'"
                Write-Host "DEBUG: BuildAndRunHostApp.ps1 exists: $(Test-Path '.github/scripts/BuildAndRunHostApp.ps1')"
                try {
                  # Splat parameters via hashtable to avoid any backtick
                  # line-continuation quirks. Tee output to the catLog file
                  # while still streaming to console.
                  $argList = @(
                    '-NoProfile',
                    '-File', '.github/scripts/BuildAndRunHostApp.ps1',
                    '-Platform', $platform,
                    '-Category', $cat
                  )
                  Write-Host "DEBUG: invoking pwsh with args: $($argList -join ' | ')"
                  & pwsh @argList 2>&1 | Tee-Object -FilePath $catLog | ForEach-Object { Write-Host $_ }
                  if ($LASTEXITCODE -ne 0) {
                    Write-Host "Category $cat exited with code $LASTEXITCODE" -ForegroundColor Yellow
                    $hadFailure = $true
                  }
                } catch {
                  Write-Host "BuildAndRunHostApp.ps1 threw: $_" -ForegroundColor Red
                  $hadFailure = $true
                }
                # Copy any TRX file that landed in the working dir into the
                # category drop folder so the aggregator finds it.
                Get-ChildItem -Path . -Filter "*.trx" -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.LastWriteTime -gt (Get-Date).AddMinutes(-30) } |
                  ForEach-Object {
                    $dest = Join-Path $catDir $_.Name
                    if (-not (Test-Path $dest)) { Copy-Item $_.FullName $dest -ErrorAction SilentlyContinue }
                  }

                # Capture snapshot-diff PNGs that VisualRegressionTester writes
                # to $BUILD_ARTIFACTSTAGINGDIRECTORY/Controls.TestCases.Shared.Tests/snapshots-diff
                # (see ui-tests-collect-snapshot-diffs.yml for reference impl).
                # Move them into the per-category folder so they ship in the
                # drop-deep-uitests artifact alongside the TRX. Move (not copy)
                # so the next category's run starts with a clean diff folder.
                $snapDiffSrc = Join-Path "$(Build.ArtifactStagingDirectory)" "Controls.TestCases.Shared.Tests/snapshots-diff"
                if (Test-Path $snapDiffSrc) {
                  $snapDiffDest = Join-Path $catDir "snapshots-diff"
                  Write-Host "Moving snapshot-diffs from $snapDiffSrc -> $snapDiffDest"
                  Move-Item -Path $snapDiffSrc -Destination $snapDiffDest -Force -ErrorAction SilentlyContinue
                }
              }

              if ($hadFailure) {
                # Don't fail the stage — the AI summary comment is the
                # deliverable; failed tests get reported there. Stage-level
                # failure would prevent the UpdateAISummaryComment stage
                # from running.
                Write-Host "##vso[task.logissue type=warning]One or more deep UI test categories failed (see TRX in drop-deep-uitests artifact)"
              }
            displayName: 'Run deep UI tests (per-category loop)'
            timeoutInMinutes: 220

          - task: PublishPipelineArtifact@1
            displayName: 'Publish drop-deep-uitests'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/deep-uitests'
              artifact: 'drop-deep-uitests'
              publishLocation: 'pipeline'
            condition: succeededOrFailed()

  # ─────────────────────────────────────────────────────────────────────────────
  #  STAGE: UpdateAISummaryComment
  # ─────────────────────────────────────────────────────────────────────────────
  # Final stage. Depends on both ReviewPR (which posted the initial AI
  # summary comment and emitted aiSummaryCommentId) and RunDeepUITests
  # (which produced the TRX artifacts on the right pool). Downloads the
  # artifacts, parses them via Aggregate-UITestArtifacts.ps1, and edits
  # the existing PR comment to replace the in-process STEP 3 section
  # with the deep-test results.
  - stage: UpdateAISummaryComment
    displayName: 'Update AI Summary with Deep UI Test Results'
    dependsOn:
      - ReviewPR
      - RunDeepUITests
    # Stage-level condition uses dependencies.<stage>.outputs[<job>.<step>.<var>]
    # (NOT stageDependencies.<stage>.<job>.outputs[<step>.<var>] — that
    # syntax only works at job level). See RunDeepUITests for full
    # explanation.
    condition: and(in(dependencies.RunDeepUITests.result, 'Succeeded', 'SucceededWithIssues', 'Failed'), ne(dependencies.ReviewPR.outputs['CopilotReview.RunReview.aiSummaryCommentId'], ''))
    jobs:
      - job: UpdateComment
        displayName: 'Edit AI summary comment with deep test results'
        # Job-level variables can use $[ stageDependencies... ] (cross-stage,
        # job context). The stage condition above already gated emptiness;
        # this just makes the value available as $(aiSummaryCommentId)
        # inside the steps.
        variables:
          aiSummaryCommentId: $[ stageDependencies.ReviewPR.CopilotReview.outputs['RunReview.aiSummaryCommentId'] ]
        pool:
          name: Azure Pipelines
          vmImage: ubuntu-22.04
        timeoutInMinutes: 30
        steps:
          - checkout: self

          - task: DownloadPipelineArtifact@2
            displayName: 'Download drop-deep-uitests'
            inputs:
              buildType: 'current'
              artifactName: 'drop-deep-uitests'
              targetPath: '$(Pipeline.Workspace)/drop-deep-uitests'

          - pwsh: |
              $ErrorActionPreference = 'Continue'
              $artDir = "$(Pipeline.Workspace)/drop-deep-uitests"
              $commentId = "$(aiSummaryCommentId)"
              $prNumber = "${{ parameters.PRNumber }}"

              if ([string]::IsNullOrWhiteSpace($commentId)) {
                Write-Host "No AI summary comment ID — nothing to edit"
                exit 0
              }
              if (-not (Test-Path $artDir)) {
                Write-Host "drop-deep-uitests not present at $artDir — nothing to update"
                exit 0
              }

              # Aggregator returns @{ category -> @{ Total/Passed/Failed/.../Results } }
              # using the SAME shape the in-process STEP 3 renderer expects
              # so we can reuse the markdown generation pattern directly.
              $aggScript = ".github/scripts/shared/Aggregate-UITestArtifacts.ps1"
              if (-not (Test-Path $aggScript)) { throw "$aggScript missing" }

              # The aggregator normally calls `az pipelines runs artifact list`.
              # Here we already have the artifact downloaded — invoke its
              # internal directory-walker function directly.
              $aggSrc = Get-Content -Raw -Path $aggScript
              $reviewSrc = Get-Content -Raw -Path .github/scripts/Review-PR.ps1
              foreach ($fn in @('Get-TrxResults','Get-CategoryFromArtifactName','Get-AggregatedTrxFromDirectory')) {
                $rx = [regex]::Match(($aggSrc + "`n" + $reviewSrc), "(?ms)^function\s+$fn\s*\{.*?^\}", 'Multiline')
                if ($rx.Success) { Invoke-Expression $rx.Value }
              }
              $byCat = Get-AggregatedTrxFromDirectory -RootDir $artDir
              if (-not $byCat -or $byCat.Count -eq 0) {
                Write-Host "Aggregator returned no categories — leaving comment as-is"
                exit 0
              }

              # Render the new STEP 3 section.
              $totalPassed = 0; $totalFailed = 0
              $sb = [System.Text.StringBuilder]::new()
              [void]$sb.AppendLine()
              [void]$sb.AppendLine("### 🧪 UI Test Execution Results (deep, platform pool)")
              [void]$sb.AppendLine()
              [void]$sb.AppendLine("| Category | Tests | Snapshot diffs |")
              [void]$sb.AppendLine("|---|---|---|")
              $perCategoryFailures = [ordered]@{}
              foreach ($k in ($byCat.Keys | Sort-Object)) {
                $b = $byCat[$k]
                $totalPassed += [int]$b.Passed
                $totalFailed += [int]$b.Failed
                $tCount = [int]$b.Total
                $tPass  = [int]$b.Passed
                $tFail  = [int]$b.Failed
                $col = if ($tCount -eq 0) { '—' }
                       elseif ($tFail -gt 0) { "$tPass/$tCount ($tFail ❌)" }
                       else { "$tPass/$tCount ✓" }
                # Count snapshot-diff PNGs we shipped in this artifact subdir
                $catDir = Join-Path $artDir $b.ArtifactName
                $diffCount = 0
                if (Test-Path $catDir) {
                  $diffCount = @(Get-ChildItem -Path $catDir -Filter "*-diff.png" -Recurse -ErrorAction SilentlyContinue).Count
                }
                $diffCol = if ($diffCount -gt 0) { "$diffCount diff PNG$(if ($diffCount -eq 1) {'' } else {'s'})" } else { '—' }
                [void]$sb.AppendLine("| ``$k`` | $col | $diffCol |")

                # Capture failed test entries from the parsed TRX so we can
                # render a per-category disclosure section listing the actual
                # failing test names + the first line of their error message.
                $catFailed = @()
                foreach ($r in @($b.Results)) {
                  if ($r.status -eq 'Failed') {
                    $catFailed += [pscustomobject]@{
                      Name  = $r.name
                      Error = ($r.error -split "`n" | Select-Object -First 1) -as [string]
                    }
                  }
                }
                if ($catFailed.Count -gt 0) {
                  $perCategoryFailures[$k] = $catFailed
                }
              }

              # Per-category failed-test disclosure sections (collapsed by
              # default to keep the comment compact).
              if ($perCategoryFailures.Count -gt 0) {
                [void]$sb.AppendLine()
                foreach ($cat in $perCategoryFailures.Keys) {
                  $items = $perCategoryFailures[$cat]
                  [void]$sb.AppendLine("<details><summary>❌ <code>$cat</code> — $($items.Count) failed test$(if ($items.Count -eq 1) {''} else {'s'})</summary>")
                  [void]$sb.AppendLine()
                  [void]$sb.AppendLine("| Test | First-line error |")
                  [void]$sb.AppendLine("|---|---|")
                  foreach ($it in $items | Select-Object -First 50) {
                    $err = if ([string]::IsNullOrWhiteSpace($it.Error)) { '—' } else { ($it.Error -replace '\|', '\|') }
                    if ($err.Length -gt 200) { $err = $err.Substring(0, 200) + '…' }
                    [void]$sb.AppendLine("| ``$($it.Name)`` | $err |")
                  }
                  if ($items.Count -gt 50) {
                    [void]$sb.AppendLine("| _(+$($items.Count - 50) more — see TRX in artifact)_ | |")
                  }
                  [void]$sb.AppendLine()
                  [void]$sb.AppendLine("</details>")
                  [void]$sb.AppendLine()
                }
              }

              # Link to the published artifact so reviewers can download the
              # snapshot-diff PNGs to triage visual regressions.
              $buildId = "$(Build.BuildId)"
              $orgUri  = "$(System.CollectionUri)".TrimEnd('/')
              $project = "$(System.TeamProject)"
              $artifactUrl = "$orgUri/$project/_build/results?buildId=$buildId&view=artifacts&pathAsName=false&type=publishedArtifacts"
              [void]$sb.AppendLine("📎 [Download `drop-deep-uitests` artifact (TRX + snapshot diffs)]($artifactUrl)")
              [void]$sb.AppendLine()

              $resultIcon = if ($totalFailed -gt 0) { '❌' } elseif ($totalPassed -gt 0) { '✅' } else { '⏭️' }
              $headerLine = "$resultIcon **Deep UI tests** — $totalPassed passed, $totalFailed failed across $($byCat.Count) categor$(if ($byCat.Count -eq 1) {'y'} else {'ies'}) on platform-pool agent (replaces in-process counts above)."

              # Fetch the existing comment body and splice in the deep
              # section. We wrap the deep section in HTML comment markers
              # so subsequent builds REPLACE (not append) — preventing the
              # "Deep UI tests appears 3 times" duplication observed when
              # multiple builds run on the same PR.
              $existing = (gh api "repos/dotnet/maui/issues/comments/$commentId" --jq '.body') -join "`n"
              if ([string]::IsNullOrWhiteSpace($existing)) {
                Write-Host "Could not fetch comment body — aborting"
                exit 0
              }

              $beginMarker = '<!-- DEEP_UITESTS_BEGIN -->'
              $endMarker   = '<!-- DEEP_UITESTS_END -->'
              $deepBlock   = "$beginMarker`n$headerLine`n$($sb.ToString())$endMarker"

              $beginIdx = $existing.IndexOf($beginMarker)
              $endIdx   = $existing.IndexOf($endMarker)
              if ($beginIdx -ge 0 -and $endIdx -gt $beginIdx) {
                # Already wrapped — replace the block in place.
                $before = $existing.Substring(0, $beginIdx).TrimEnd()
                $after  = $existing.Substring($endIdx + $endMarker.Length).TrimStart()
                $newBody = $before + "`n`n" + $deepBlock + $(if ($after) { "`n`n" + $after } else { "" })
              } else {
                # Strip any pre-existing unwrapped "Deep UI tests" lines and
                # the legacy in-process table marker, then append the wrapped
                # block. This recovers cleanly from comments that were
                # written by older runs that didn't use the markers.
                $cleaned = $existing -split "`n" | Where-Object {
                  $_ -notmatch '^\s*[❌✅⏭️]\s*\*\*Deep UI tests\*\*'
                }
                $cleanedBody = ($cleaned -join "`n")
                $legacyMarker = '### 🧪 UI Test Execution Results'
                $idx = $cleanedBody.IndexOf($legacyMarker)
                $newBody = if ($idx -ge 0) {
                  $cleanedBody.Substring(0, $idx).TrimEnd() + "`n`n" + $deepBlock
                } else {
                  $cleanedBody.TrimEnd() + "`n`n" + $deepBlock
                }
              }

              $tmp = New-TemporaryFile
              @{ body = $newBody } | ConvertTo-Json -Depth 4 -Compress | Set-Content $tmp -Encoding UTF8
              gh api -X PATCH "repos/dotnet/maui/issues/comments/$commentId" --input $tmp.FullName | Out-Null
              Write-Host "✅ Patched comment $commentId with deep UI test results ($totalPassed/$($totalPassed + $totalFailed))"
            displayName: 'Aggregate TRX + edit AI summary comment'
            env:
              GH_TOKEN: $(GH_COMMENT_TOKEN)
