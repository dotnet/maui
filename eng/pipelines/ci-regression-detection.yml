# Regression Detection Pipeline
# Runs targeted UI tests and/or device tests based on detected or specified categories.
# Intended to be triggered manually or by automation (e.g., gh-aw category detection workflow).
#
# Usage examples:
#   - Run UI tests for Button and Label categories only:
#     uiTestCategories: 'Button,Label'
#   - Run device tests alongside UI tests:
#     uiTestCategories: 'Shell,Navigation'
#     runDeviceTests: true

trigger: none
pr: none

variables:
  - template: /eng/pipelines/common/variables.yml@self

parameters:

  - name: uiTestCategories
    displayName: 'UI Test Categories (comma-separated, e.g. Button,Label,Shell)'
    type: string
    default: ''

  - name: runDeviceTests
    displayName: 'Run Device Tests (Helix)'
    type: boolean
    default: false

  - name: BuildNativeAOT
    displayName: 'Build NativeAOT artifacts'
    type: boolean
    default: false

  - name: RunNativeAOT
    displayName: 'Run NativeAOT UI Tests'
    type: boolean
    default: false

  # ── Public pools (dnceng-public) ──────────────────────────────────────────

  - name: androidPoolPublic
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: androidPoolLinuxPublic
    type: object
    default:
      name: MAUI-DNCENG
      demands:
        - ImageOverride -equals 1ESPT-Ubuntu22.04

  - name: iosPoolPublic
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: windowsBuildPoolPublic
    type: object
    default:
      name: NetCore-Public
      demands:
        - ImageOverride -equals 1es-windows-2022-open

  - name: windowsPoolPublic
    type: object
    default:
      name: NetCore-Public
      demands:
        - ImageOverride -equals 1es-windows-2022-open

  - name: macosPoolPublic
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-14

  # ── Internal pools (dnceng) ───────────────────────────────────────────────

  - name: androidPoolInternal
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-15-arm64

  - name: androidPoolLinuxInternal
    type: object
    default:
      name: MAUI-DNCENG
      demands:
        - ImageOverride -equals 1ESPT-Ubuntu22.04

  - name: iosPoolInternal
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-15-arm64

  - name: windowsBuildPoolInternal
    type: object
    default:
      name: NetCore1ESPool-Internal
      demands:
        - ImageOverride -equals 1es-windows-2022

  - name: windowsPoolInternal
    type: object
    default:
      name: NetCore1ESPool-Internal
      demands:
        - ImageOverride -equals 1es-windows-2022

  - name: macosPoolInternal
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-14

  # ── Device test pools ─────────────────────────────────────────────────────

  - name: macOSTestPoolPublic
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: macOSTestPoolInternal
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-15-arm64

  - name: macOSPoolDevicePublic
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: macOSPoolDeviceInternal
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-15-arm64

stages:

  # ═══════════════════════════════════════════════════════════════════════════
  #  UI TESTS — filtered by uiTestCategories parameter
  # ═══════════════════════════════════════════════════════════════════════════

  - ${{ if ne(parameters.uiTestCategories, '') }}:
    - template: common/ui-tests.yml
      parameters:
        # Pass the user-specified categories as a single group.
        # The ui-tests-steps.yml template splits on comma and builds the
        # TestCategory=X|TestCategory=Y filter automatically.
        categoryGroupsToTest:
          - '${{ parameters.uiTestCategories }}'
        # Pool selection — same logic as ci-uitests.yml
        ${{ if eq(variables['System.TeamProject'], 'internal') }}:
          androidPool: ${{ parameters.androidPoolInternal }}
          androidLinuxPool: ${{ parameters.androidPoolLinuxInternal }}
          iosPool: ${{ parameters.iosPoolInternal }}
          windowsPool: ${{ parameters.windowsPoolInternal }}
          windowsBuildPool: ${{ parameters.windowsBuildPoolInternal }}
          macosPool: ${{ parameters.macosPoolInternal }}
        ${{ else }}:
          androidPool: ${{ parameters.androidPoolPublic }}
          androidLinuxPool: ${{ parameters.androidPoolLinuxPublic }}
          iosPool: ${{ parameters.iosPoolPublic }}
          windowsPool: ${{ parameters.windowsPoolPublic }}
          windowsBuildPool: ${{ parameters.windowsBuildPoolPublic }}
          macosPool: ${{ parameters.macosPoolPublic }}
        BuildNativeAOT: ${{ parameters.BuildNativeAOT }}
        RunNativeAOT: ${{ parameters.RunNativeAOT }}
        androidApiLevels: [ 30 ]
        iosVersions: [ 'latest' ]
        projects:
          - name: controls
            desc: Controls
            androidApiLevelsExclude: [25]
            android: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.Android.Tests/Controls.TestCases.Android.Tests.csproj
            app: $(Pipeline.Workspace)/Controls.TestCases.HostApp/
            iosVersionsExclude: [ '12.4']
            ios: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.iOS.Tests/Controls.TestCases.iOS.Tests.csproj
            winui: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.WinUI.Tests/Controls.TestCases.WinUI.Tests.csproj
            mac: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.Mac.Tests/Controls.TestCases.Mac.Tests.csproj

  # ═══════════════════════════════════════════════════════════════════════════
  #  DEVICE TESTS — full Helix run (parallelized across queues)
  # ═══════════════════════════════════════════════════════════════════════════

  - ${{ if eq(parameters.runDeviceTests, true) }}:
    - template: /eng/pipelines/arcade/stage-device-tests.yml@self
      parameters:
        ${{ if eq(variables['System.TeamProject'], 'internal') }}:
          buildPool: ${{ parameters.macOSPoolDeviceInternal }}
          testPool: ${{ parameters.windowsPoolInternal }}
          windowsBuildPool: ${{ parameters.windowsPoolInternal }}
          windowsTestPool: ${{ parameters.windowsPoolInternal }}
          runAsPublic: false
          HelixAccessToken: $(HelixApiAccessToken)
          HelixInternal: true
        ${{ else }}:
          buildPool: ${{ parameters.macOSPoolDevicePublic }}
          testPool: ${{ parameters.windowsPoolPublic }}
          windowsBuildPool: ${{ parameters.windowsPoolPublic }}
          windowsTestPool: ${{ parameters.windowsPoolPublic }}
          runAsPublic: true
        runWindowsTests: true
        TargetFrameworkVersion: net10.0
        prepareSteps:
        - template: /eng/pipelines/common/provision.yml@self
          parameters:
            checkoutDirectory: '$(System.DefaultWorkingDirectory)'
            skipJdk: false
            skipAndroidCommonSdks: false
            skipAndroidPlatformApis: false
            onlyAndroidPlatformDefaultApis: true
            skipAndroidEmulatorImages: true
            skipAndroidCreateAvds: true
            skipProvisioning: true
            skipXcode: false
            skipSimulatorSetup: false
