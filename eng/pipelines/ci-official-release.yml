trigger: none
pr: none

parameters:
- name: ghRepo
  displayName: GitHub repository name
  type: string
  default: maui

- name: ghOwner
  displayName: GitHub repository owner
  type: string
  default: dotnet

- name: commitHash
  displayName: Commit hash to download nupkgs from
  type: string
  default: skip

- name: pushWorkloadSet
  displayName: Push workload set channel stage
  type: boolean
  default: true

- name: pushNugetOrg
  displayName: Push to NuGet.org stage
  type: boolean
  default: true

- name: pushPackages
  displayName: "If false, prepare a dry-run artifact without publishing"
  type: boolean
  default: true

- name: nugetIncludeFilters
  displayName: "[OPTIONAL] Semi-colon (';') separated list of nuget packages to include"
  type: string
  default: skip

- name: nugetExcludeFilters
  displayName: "[OPTIONAL] Semi-colon (';') separated list of nuget packages to exclude"
  type: string
  default: skip

- name: VM_IMAGE_HOST
  type: object
  default:
    name: NetCore1ESPool-Internal
    demands:
      - ImageOverride -equals 1es-windows-2022
    os: windows

variables:
- template: /eng/common/templates/variables/pool-providers.yml@self
- group: AzureDevOps-Artifact-Feeds-Pats

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  ${{ if ne(variables['Build.Reason'], 'PullRequest') }}:
    template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  ${{ else }}:
    template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool: ${{ parameters.VM_IMAGE_HOST }}
    sdl:
      binskim:
        scanOutputDirectoryOnly: true
      codeql:
        runSourceLanguagesInSourceAnalysis: true
      policheck:
        enabled: true
      spotBugs:
        enabled: false
        justification: 'Failing with "Could not successfully find the java tool launcher"'
      suppression:
        suppressionFile: $(Build.SourcesDirectory)\eng\automation\guardian\source.gdnsuppress
    stages:
    - ${{ if or(eq(parameters.commitHash, 'skip'), and(eq(parameters.pushWorkloadSet, false), eq(parameters.pushNugetOrg, false))) }}:
      - stage: skip_release
        displayName: Skip release
        dependsOn: []
        jobs:
        - job: skip_release
          displayName: Skip release
          steps:
          - checkout: none
          - script: echo No release operations were requested.
            displayName: Skip release

    - ${{ if and(ne(parameters.commitHash, 'skip'), or(eq(parameters.pushWorkloadSet, true), eq(parameters.pushNugetOrg, true))) }}:
      - stage: prepare_release
        displayName: Prepare release artifacts
        dependsOn: []
        jobs:
        - job: prepare_release
          displayName: Gather and classify release packages
          timeoutInMinutes: 240
          workspace:
            clean: all
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: Publish workload packs
              targetPath: '$(Build.ArtifactStagingDirectory)\MauiPacksForNuGet'
              artifactName: MauiPacksForNuGet
            - output: pipelineArtifact
              displayName: Publish workload manifests
              targetPath: '$(Build.ArtifactStagingDirectory)\MauiManifestsForNuGet'
              artifactName: MauiManifestsForNuGet
          steps:
          - checkout: self
            clean: true
            persistCredentials: false

          - task: AzureCLI@2
            name: prepareRelease
            displayName: Resolve BAR build and prepare packages
            inputs:
              azureSubscription: "Darc: Maestro Production"
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'

                function Get-Filters([string] $value) {
                  if ([string]::IsNullOrWhiteSpace($value) -or $value -eq 'skip') {
                    return @()
                  }

                  return @($value -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
                }

                function Test-AnyFilter([string] $name, [string[]] $filters) {
                  foreach ($filter in $filters) {
                    if ($name -like $filter) {
                      return $true
                    }
                  }

                  return $false
                }

                function Get-PackageIdentity([System.IO.FileInfo] $package) {
                  $archive = [System.IO.Compression.ZipFile]::OpenRead($package.FullName)
                  try {
                    $nuspec = @($archive.Entries | Where-Object { $_.FullName -like '*.nuspec' })
                    if ($nuspec.Count -ne 1) {
                      throw "Expected one nuspec in '$($package.FullName)', found $($nuspec.Count)."
                    }

                    $reader = [System.IO.StreamReader]::new($nuspec[0].Open())
                    try {
                      [xml] $document = $reader.ReadToEnd()
                    }
                    finally {
                      $reader.Dispose()
                    }

                    $idNode = $document.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']/*[local-name()='id']")
                    $versionNode = $document.SelectSingleNode("/*[local-name()='package']/*[local-name()='metadata']/*[local-name()='version']")
                    if (!$idNode -or !$versionNode -or
                        [string]::IsNullOrWhiteSpace($idNode.InnerText) -or
                        [string]::IsNullOrWhiteSpace($versionNode.InnerText)) {
                      throw "Package '$($package.FullName)' has no ID or version."
                    }

                    return [pscustomobject]@{
                      id = $idNode.InnerText
                      version = $versionNode.InnerText
                      fileName = $package.Name
                    }
                  }
                  finally {
                    $archive.Dispose()
                  }
                }

                Add-Type -AssemblyName System.IO.Compression.FileSystem
                Write-Host "Getting BAR ID for commit: $env:COMMIT_HASH"
                . $(Build.SourcesDirectory)\eng\common\tools.ps1
                $darc = Get-Darc
                $buildJson = & $darc get-build --ci --repo "$env:GH_REPO" --commit "$env:COMMIT_HASH" --output-format json --azdev-pat $(System.AccessToken)
                if ($LASTEXITCODE -ne 0) {
                  throw "Darc failed to resolve the BAR build for commit '$env:COMMIT_HASH'."
                }

                $barId = $buildJson | ConvertFrom-Json | Select-Object -ExpandProperty id -First 1
                if (!$barId) {
                  throw "Could not find a BAR build for commit '$env:COMMIT_HASH' on repo '$env:GH_REPO'."
                }

                $dropPath = "$(Build.StagingDirectory)\nupkgs"
                Write-Host "Gathering BAR build '$barId' into '$dropPath'."
                & $darc gather-drop --ci --id $barId -o "$dropPath" --azdev-pat $(System.AccessToken) --include-released --verbose
                if ($LASTEXITCODE -ne 0) {
                  throw "Darc gather-drop failed for BAR build '$barId'."
                }

                $shippingPath = Join-Path $dropPath 'shipping\packages'
                if (!(Test-Path $shippingPath -PathType Container)) {
                  throw "Darc gather-drop did not create the expected package directory '$shippingPath'."
                }

                $allPackages = @(Get-ChildItem -Path $shippingPath -Filter '*.nupkg' -File -Recurse)
                if ($allPackages.Count -eq 0) {
                  throw "Darc gather-drop produced no shipping NuGet packages."
                }

                $includeFilters = @(Get-Filters $env:NUGET_INCLUDE_FILTERS)
                $excludeFilters = @(Get-Filters $env:NUGET_EXCLUDE_FILTERS)
                $packPackages = @($allPackages | Where-Object {
                  $_.Name -notlike '*Manifest*.nupkg' -and
                  ($includeFilters.Count -eq 0 -or (Test-AnyFilter $_.Name $includeFilters)) -and
                  !($excludeFilters.Count -gt 0 -and (Test-AnyFilter $_.Name $excludeFilters))
                })
                $manifestPackages = @($allPackages | Where-Object {
                  $_.Name -like '*Manifest*.nupkg' -and
                  !($excludeFilters.Count -gt 0 -and (Test-AnyFilter $_.Name $excludeFilters))
                })
                if ($packPackages.Count -eq 0) {
                  throw "Package filtering selected no workload packs."
                }
                if ($manifestPackages.Count -eq 0) {
                  throw "Package filtering selected no workload manifests."
                }

                $packsPath = '$(Build.ArtifactStagingDirectory)\MauiPacksForNuGet'
                $manifestsPath = '$(Build.ArtifactStagingDirectory)\MauiManifestsForNuGet'
                New-Item -ItemType Directory -Force -Path $packsPath, $manifestsPath | Out-Null

                foreach ($packageSet in @(
                  @{ Name = 'Workload packs'; Packages = $packPackages; Path = $packsPath },
                  @{ Name = 'Workload manifests'; Packages = $manifestPackages; Path = $manifestsPath }
                )) {
                  $identities = @($packageSet.Packages | ForEach-Object { Get-PackageIdentity $_ })
                  $duplicates = @($identities | Group-Object id, version | Where-Object Count -gt 1)
                  if ($duplicates.Count -gt 0) {
                    throw "$($packageSet.Name) contains duplicate package identities: $($duplicates.Name -join ', ')."
                  }

                  Write-Host "$($packageSet.Name): $($identities.Count)"
                  $identities | Sort-Object id, version | Format-Table id, version, fileName | Out-String | Write-Host
                  $packageSet.Packages | Copy-Item -Destination $packageSet.Path
                  ConvertTo-Json -InputObject @($identities | Sort-Object id, version) -Depth 3 |
                    Set-Content -Path (Join-Path $packageSet.Path 'expected-packages.json') -Encoding utf8
                }

                $manifestPack = $manifestPackages | Select-Object -First 1
                $workloadSetsChannel = ''
                $workloadSetsFeed = ''
                if ($manifestPack.Name -like '*.Manifest-8.0*') {
                  $workloadSetsChannel = '.NET 8 Workload Release'
                  $workloadSetsFeed = 'dotnet8-workloads'
                }
                elseif ($manifestPack.Name -like '*.Manifest-9.0*') {
                  $workloadSetsChannel = '.NET 9 Workload Release'
                  $workloadSetsFeed = 'dotnet9-workloads'
                }
                elseif ($manifestPack.Name -like '*.Manifest-10.0*') {
                  $workloadSetsChannel = '.NET 10 Workload Release'
                  $workloadSetsFeed = 'dotnet10-workloads'
                }
                elseif ($manifestPack.Name -like '*.Manifest-11.0*') {
                  $workloadSetsChannel = '.NET 11 Workload Release'
                  $workloadSetsFeed = 'dotnet11-workloads'
                }
                if (!$workloadSetsChannel -or !$workloadSetsFeed) {
                  throw "Could not determine the workload set channel or feed from '$($manifestPack.Name)'."
                }

                Write-Host "##vso[task.setvariable variable=BarId;isOutput=true]$barId"
                Write-Host "##vso[task.setvariable variable=WorkloadSetsChannel;isOutput=true]$workloadSetsChannel"
                Write-Host "##vso[task.setvariable variable=WorkloadSetsFeed;isOutput=true]$workloadSetsFeed"
            env:
              COMMIT_HASH: ${{ parameters.commitHash }}
              GH_REPO: ${{ parameters.ghRepo }}
              NUGET_INCLUDE_FILTERS: ${{ parameters.nugetIncludeFilters }}
              NUGET_EXCLUDE_FILTERS: ${{ parameters.nugetExcludeFilters }}

      - ${{ if eq(parameters.pushWorkloadSet, true) }}:
        - stage: publish_maestro
          displayName: Publish to Workload Set channel
          dependsOn: prepare_release
          jobs:
          - job: publish_maestro
            displayName: Publish to Workload Set channel
            timeoutInMinutes: 240
            workspace:
              clean: all
            variables:
              BarId: $[ stageDependencies.prepare_release.prepare_release.outputs['prepareRelease.BarId'] ]
              WorkloadSetsChannel: $[ stageDependencies.prepare_release.prepare_release.outputs['prepareRelease.WorkloadSetsChannel'] ]
              WorkloadSetsFeed: $[ stageDependencies.prepare_release.prepare_release.outputs['prepareRelease.WorkloadSetsFeed'] ]
            steps:
            - checkout: self
              clean: true
              persistCredentials: false

            - task: AzureCLI@2
              displayName: Add build to workload set channel
              inputs:
                azureSubscription: "Darc: Maestro Production"
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  $ErrorActionPreference = 'Stop'
                  . $(Build.SourcesDirectory)\eng\common\tools.ps1
                  $darc = Get-Darc
                  Write-Host "Adding build ID '$(BarId)' to channel '$(WorkloadSetsChannel)' and feed '$(WorkloadSetsFeed)'."
                  & $darc add-build-to-channel --ci --channel "$(WorkloadSetsChannel)" --id "$(BarId)" --skip-assets-publishing --azdev-pat $(System.AccessToken) --verbose
                  if ($LASTEXITCODE -ne 0) {
                    throw "Darc failed to add BAR build '$(BarId)' to workload set channel '$(WorkloadSetsChannel)'."
                  }

      - ${{ if and(eq(parameters.pushNugetOrg, true), eq(parameters.pushPackages, true)) }}:
        - stage: stage_push_packs
          displayName: Release packs
          dependsOn: prepare_release
          jobs:
          - job: push_packs_approval
            displayName: Wait to push packs
            timeoutInMinutes: 240
            pool: server
            steps:
            - task: ManualValidation@0
              timeoutInMinutes: 120
              inputs:
                instructions: 'Press "Resume" to push workload packs to NuGet.org.'
                onTimeout: reject

          - job: push_packs
            displayName: Push packs to NuGet.org
            timeoutInMinutes: 90
            dependsOn: push_packs_approval
            condition: eq(dependencies.push_packs_approval.result, 'Succeeded')
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
              - input: pipelineArtifact
                artifactName: MauiPacksForNuGet
                targetPath: '$(Pipeline.Workspace)\MauiPacksForNuGet'
            steps:
            - checkout: none

            - task: 1ES.PublishNuget@1
              displayName: Push workload packs to NuGet.org
              retryCountOnTaskFailure: 2
              inputs:
                useDotNetTask: false
                packagesToPush: '$(Pipeline.Workspace)\MauiPacksForNuGet\*.nupkg'
                packageParentPath: '$(Pipeline.Workspace)\MauiPacksForNuGet'
                nuGetFeedType: external
                publishFeedCredentials: 'nuget.org (dotnetframework)'
                allowPackageConflicts: true

            - pwsh: |
                $ErrorActionPreference = 'Stop'
                $expected = @(Get-Content '$(Pipeline.Workspace)\MauiPacksForNuGet\expected-packages.json' -Raw | ConvertFrom-Json)
                $missing = @()
                for ($attempt = 1; $attempt -le 30; $attempt++) {
                  $missing = @($expected | Where-Object {
                    $id = $_.id.ToLowerInvariant()
                    $version = $_.version.ToLowerInvariant()
                    $url = "https://api.nuget.org/v3-flatcontainer/$id/$version/$id.$version.nupkg"
                    try {
                      (Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing).StatusCode -ne 200
                    }
                    catch {
                      $true
                    }
                  })
                  if ($missing.Count -eq 0) {
                    Write-Host "Verified all $($expected.Count) workload packs on NuGet.org."
                    exit 0
                  }
                  if ($attempt -lt 30) {
                    Write-Host "Waiting for $($missing.Count) workload packs to become available on NuGet.org (attempt $attempt of 30)."
                    Start-Sleep -Seconds 20
                  }
                }

                $details = $missing | ForEach-Object { "$($_.id) $($_.version)" }
                throw "The following workload packs are not available from NuGet.org: $($details -join ', ')"
              displayName: Verify workload packs on NuGet.org

        - stage: stage_push_manifests
          displayName: Release manifests
          dependsOn: stage_push_packs
          condition: succeeded()
          jobs:
          - job: push_manifests_approval
            displayName: Wait to push manifests
            timeoutInMinutes: 240
            pool: server
            steps:
            - task: ManualValidation@0
              timeoutInMinutes: 120
              inputs:
                instructions: 'Packs are verified on NuGet.org. Press "Resume" to push workload manifests.'
                onTimeout: reject

          - job: push_manifests
            displayName: Push manifests to NuGet.org
            timeoutInMinutes: 90
            dependsOn: push_manifests_approval
            condition: eq(dependencies.push_manifests_approval.result, 'Succeeded')
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
              - input: pipelineArtifact
                artifactName: MauiManifestsForNuGet
                targetPath: '$(Pipeline.Workspace)\MauiManifestsForNuGet'
            steps:
            - checkout: none

            - task: 1ES.PublishNuget@1
              displayName: Push workload manifests to NuGet.org
              retryCountOnTaskFailure: 2
              inputs:
                useDotNetTask: false
                packagesToPush: '$(Pipeline.Workspace)\MauiManifestsForNuGet\*.nupkg'
                packageParentPath: '$(Pipeline.Workspace)\MauiManifestsForNuGet'
                nuGetFeedType: external
                publishFeedCredentials: 'nuget.org (dotnetframework)'
                allowPackageConflicts: true

            - pwsh: |
                $ErrorActionPreference = 'Stop'
                $expected = @(Get-Content '$(Pipeline.Workspace)\MauiManifestsForNuGet\expected-packages.json' -Raw | ConvertFrom-Json)
                $missing = @()
                for ($attempt = 1; $attempt -le 30; $attempt++) {
                  $missing = @($expected | Where-Object {
                    $id = $_.id.ToLowerInvariant()
                    $version = $_.version.ToLowerInvariant()
                    $url = "https://api.nuget.org/v3-flatcontainer/$id/$version/$id.$version.nupkg"
                    try {
                      (Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing).StatusCode -ne 200
                    }
                    catch {
                      $true
                    }
                  })
                  if ($missing.Count -eq 0) {
                    Write-Host "Verified all $($expected.Count) workload manifests on NuGet.org."
                    exit 0
                  }
                  if ($attempt -lt 30) {
                    Write-Host "Waiting for $($missing.Count) workload manifests to become available on NuGet.org (attempt $attempt of 30)."
                    Start-Sleep -Seconds 20
                  }
                }

                $details = $missing | ForEach-Object { "$($_.id) $($_.version)" }
                throw "The following workload manifests are not available from NuGet.org: $($details -join ', ')"
              displayName: Verify workload manifests on NuGet.org
